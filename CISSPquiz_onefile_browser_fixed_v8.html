 "D"], "explanation": "OpenSAMMは、セキュアソフトウェア開発のためのフレームワークです。\\nソフトウェア開発のライフサイクル全体を、戦略・指標、建設、検証、運用の4つのビジネス機能に分類しています。\\n具体的には、以下のような活動が各機能に含まれます（OWASP OpenSAMM v1.1）。\\n\\n戦略・指標：セキュリティ方針、指標、教育・トレーニング\\n建設：脅威モデリング、セキュアアーキテクチャ、セキュアコーディング\\n検証：設計レビュー、コードレビュー、セキュリティテスト\\n運用：脆弱性管理、環境強化、オペレーショナルイネーブルメント\\n\\n\\nつまり、OpenSAMMの4つの機能は、ソフトウェア開発の全工程をカバーする包括的なモデルだと言えます。", "wrongReasons": NaN, "trap": "情報セキュリティの基本原則としてはCIAが最も広く知られています。\\nしかし、CIAだけでは情報セキュリティの全体像を捉えきれないという指摘もあります。\\nPARKERIAN HEXADは、CIAを拡張し、真正性や否認防止などの要素を加えることで、情報セキュリティをより包括的に捉えようとする考え方です。\\n情報セキュリティを議論する際は、CIAを出発点としつつ、PARKERIAN HEXADなどの拡張モデルも視野に入れると良いでしょう。", "domain": "3"}, {"number": "81", "question": "NIST SP800-12のシステム開発の3原則の説明のうち、適切でないものを以下から一つ選びなさい。", "choices": ["A. セキュリティへの配慮は設計時に組み込まれるべきである。事後の付加では十分でない。", "B. ソフトウェアの設計では、すべての可能性のある例外条件を考慮すべきである。", "C. システムのデフォルト設定は、最大権限を許可するようにするべきである。", "D. セキュリティは各要素だけでなく、システム全体で検証されるべきである。"], "answer": ["C"], "explanation": "NIST SP800-12では、システム開発の３原則の一つとして\"Least privilege\"（最小権限）の原則を挙げています。\\nこれは、ユーザーやプロセスに与える権限は、その業務に必要な最小限にとどめるべきだという考え方です。\\n逆に最大権限を付与することは、悪用のリスクを高め、セキュリティ上の重大な脆弱性を生む可能性があります。\\nしたがって、デフォルト設定で最大権限を許可するべきだという選択肢Cの記述は、NIST SP800-12の原則に反するものと言えます。", "wrongReasons": "A：セキュリティは設計段階から考慮されるべきで、後付けでは不十分だという原則は、NIST SP800-12に合致しています。\nB：例外条件の考慮は、セキュアなソフトウェア設計の基本です。NIST SP800-12でも重視されているポイントです。\nD：システム全体でのセキュリティ検証の重要性は、NIST SP800-12でも繰り返し強調されています。", "trap": "「最小権限の原則」は、情報セキュリティの基本原則の一つとして知られていますが、開発の文脈では見落とされがちな側面もあります。\\n特にデフォルト設定は、利便性を優先するあまり、必要以上の権限を与えてしまうことが少なくありません。\\nセキュアシステム開発の原則を正しく理解し、設計・実装の各局面で適切に適用することが肝要です。", "domain": "3"}, {"number": "82", "question": "ISO/IEC 21827（SSE-CMM）のセキュリティ評価の指標として適切でないものを、以下から一つ選びなさい。", "choices": ["A. 組織の社会的評判", "B. セキュリティ要件の充足度", "C. セキュリティ実装の正当性", "D. 費用対効果"], "answer": ["A"], "explanation": "SSE-CMM（Systems Security Engineering Capability Maturity Model）は、セキュアシステム開発の組織的成熟度を評価するためのモデルです。\\nSSE-CMMでは、セキュリティ評価の指標として以下のようなものが挙げられています（ISO/IEC 21827）。\\n\\nセキュリティ要件に対する適合性\\nセキュリティ実装の正当性（verification）\\nセキュリティプロセスの有効性と効率性\\nセキュリティ施策の費用対効果\\n\\n\\n一方で、組織の社会的評判は、セキュリティの直接的な指標とは言えません。ブランドイメージなどに影響する可能性はありますが、システムのセキュリティレベルとは必ずしも相関しないためです。", "wrongReasons": "B：セキュリティ要件の充足度は、SSE-CMMの中核的な評価指標の一つです。\nC：セキュリティ実装の正当性検証は、セキュアシステム開発のプロセス評価において重要な位置を占めます。\nD：セキュリティ対策の費用対効果は、SSE-CMMにおいても重視される評価軸です。", "trap": "組織の社会的評判は、セキュリティ事故の発生などによって大きく毀損される可能性があります。\\nその意味では、セキュリティ活動の結果として、間接的に影響を受ける指標と言えなくもありません。\\nしかし、システムのセキュリティレベルを直接的に測る尺度としては適切でないというのが、SSE-CMMの立場だと理解しましょう。", "domain": "3"}, {"number": "83", "question": "無線LANアクセスポイントのデバイス認証規格である「Wi-Fi Protected Access(WPA3)」で新たに導入された要素に含まれるものをすべて選びなさい。（複数選択可）", "choices": ["A. OWE (Opportunistic Wireless Encryption)", "B. WPA3-Enterprise", "C. PSK2 (Pre-Shared Key version 2)", "D. MAC address authentication"], "answer": ["A", "B", "C"], "explanation": "WPA3は、2018年6月にWi-Fi Allianceによって公開された無線LANの最新セキュリティ規格です。\\nWPA3では、以下のような新機能が導入されています（Wi-Fi Alliance WPA3 Specification）。\\n\\nOWE：公衆Wi-Fiなどオープンネットワークでの通信を自動で暗号化する機能\\nWPA3-Enterprise：SAE（Simultaneous Authentication of Equals）と呼ばれる認証方式を採用し、パスワードの安全性を強化\\n\\nPSK2：辞書攻撃に対する耐性を持つ新しいPSK（Pre-Shared Key）認証方式\\nこれらの新機能により、WPA2で課題とされていたセキュリティの弱点の多くが改善されました。\\n一方で、MAC address authenticationは、WPA3の新機能ではなく、むしろWPA3以前から存在していた比較的脆弱な認証方式です。", "wrongReasons": "D：MAC address authenticationは、クライアントデバイスのMACアドレスを用いた認証方式ですが、MACアドレスは容易に偽装可能であるため、セキュリティ上の弱点が指摘されています。WPA3の新機能ではありません。", "trap": "WPA3では、個人向け（WPA3-Personal）と企業向け（WPA3-Enterprise）の2つの運用モードが提供されています。\\nそのため、WPA3の新機能を問われた場合、両モードに共通の機能なのか、どちらか一方に特化した機能なのかを見極めることが重要です。\\n本問では、OWEは両モードで利用可能な機能、PSK2はWPA3-Personal特有の機能、SAEはWPA3-Enterprise特有の機能と、それぞれ異なる位置づけになっています。", "domain": "3"}, {"number": "84", "question": "システム開発のセキュリティ要件として「利用者の利便性を損なわない」ことの重要性を示す概念として最適なものを、以下から一つ選びなさい。", "choices": ["A. 完全性", "B. 可用性", "C. 機密性", "D. 真正性"], "answer": ["B"], "explanation": "情報セキュリティでは、機密性、完全性、可用性のCIAトライアドが基本的な要件とされています。\\nこのうち可用性（Availability）は、「認可された利用者が、必要な時に情報資産を利用できること」を意味します（ISO/IEC 27000）。\\nつまり可用性は、セキュリティ対策によってシステムの利便性や使いやすさが損なわれないようにするという概念に通じるものです。\\n利用者の利便性に配慮することは、可用性を担保するために不可欠な視点だと言えるでしょう。", "wrongReasons": "A：完全性は、情報資産の正確性と完全性を保護することを目的とした概念です。\nC：機密性は、認可されていない個人、エンティティ、プロセスに対して情報を非公開にすることを目的とした概念です。\nD：真正性は、エンティティの同一性が主張通りであることを確実にすることを目的とした概念です。", "trap": "機密性、完全性、可用性は、いずれも情報セキュリティの重要な要件ですが、それぞれ重視するポイントが異なります。\\n機密性や完全性を追求するあまり、可用性を損ねてしまうケースも少なくありません。\\nセキュリティ対策とシステムの利便性・使いやすさのバランスを取ることが、今日のシステム開発には求められていると言えるでしょう。", "domain": "3"}, {"number": "85", "question": "Androidアプリケーションのセキュアコーディングチェックリストにおいて、脆弱性対策の観点から推奨されない記述を以下から一つ選びなさい。", "choices": ["A. ログイン情報をローカルストレージに保存する", "B. ユーザーからの入力値は常にサーバ側で検証する", "C. 暗号化やハッシュ化に使用する鍵は、ソースコードに直接埋め込まない", "D. WebViewの利用時は、アプリ内ブラウザのJavaScriptを無効化する"], "answer": ["A"], "explanation": "Androidアプリケーションのセキュアコーディングにおいては、機密情報の適切な取り扱いが重要なポイントの一つです。\\nログイン情報（ユーザー名やパスワード）は、不正アクセスに悪用されるリスクが高い機密情報です。\\nしたがって、ログイン情報をローカルストレージ（端末内のストレージ）に保存することは、セキュリティの観点から推奨されません（OWASP Mobile Top 10）。\\nもし保存する必要がある場合は、強力な暗号化を施すなど、十分なセキュリティ対策を講じる必要があります。", "wrongReasons": "B：ユーザー入力の検証は、サーバ側で行うことが原則です。クライアント側の検証は改ざんされる可能性があるためです。\nC：暗号化鍵をソースコードに直接埋め込むと、アプリケーションの解析によって鍵が流出するリスクがあります。鍵は安全に管理する必要があります。\nD：WebViewでJavaScriptを有効にすると、クロスサイトスクリプティング（XSS）攻撃の危険性が高まります。セキュリティ上の理由から、JavaScriptは無効化することが推奨されます。", "trap": "ローカルストレージは、利便性の観点からデータの保存先としてよく利用されます。\\nしかし、ローカルストレージに保存されたデータは、端末の盗難・紛失や、マルウェアによる不正取得のリスクがあります。\\n特に機密性の高いデータを扱う場合は、ローカルストレージの使用を避け、より安全な方法を検討することが肝要です。", "domain": "3"}, {"number": "86", "question": "脅威モデリングの手法である「STRIDE」において、「E」が表す脅威は何か？", "choices": ["A. Escalation of privilege", "B. Eavesdropping", "C. Elevation of privilege", "D. Exposure of data"], "answer": ["C"], "explanation": "STRIDEは、Microsoft社が開発した脅威モデリングの手法です。\\nSTRIDEは、Spoofing（なりすまし）、Tampering（改ざん）、Repudiation（否認）、Information Disclosure（情報漏洩）、Denial of Service（サービス拒否）、Elevation of Privilege（権限昇格）の頭文字を取ったものです。\\nしたがって、「E」が表すのはElevation of Privilege（権限昇格）です。\\n権限昇格は、ユーザーまたはプロセスが、本来許可されているよりも高い権限を不正に取得することを指します。", "wrongReasons": "A：Escalation of privilegeは、Elevation of privilegeと同義ですが、一般的にはElevation of privilegeの方がよく使われます。\nB：Eavesdroppingは、STRIDEのIで表される、Information Disclosure（情報漏洩）に含まれる脅威の一つです。\nD：Exposure of dataも、Information Disclosure（情報漏洩）を指す表現の一つですが、STRIDEではIが使われます。", "trap": "Elevation of PrivilegeとEscalation of Privilegeは、どちらも「権限昇格」を意味する言葉ですが、STRIDEの文脈ではElevation of Privilegeが使われます。\\nまた、EavesdroppingやExposure of dataは、Information Disclosure（情報漏洩）の一部と捉えることができますが、STRIDEではあくまでも「I」として表現されます。", "domain": "3"}, {"number": "87", "question": "ソフトウェアのテストに関する以下の記述のうち、適切でないものを選びなさい。", "choices": ["A. ホワイトボックステストでは、テスト対象のソースコードを参照しながらテストを行う。", "B. ブラックボックステストでは、テスト対象の内部構造を考慮せずにテストを行う。", "C. グレーボックステストは、ホワイトボックステストとブラックボックステストの中間的なアプローチである。", "D. ホワイトボックステストは、主にユーザビリティの検証を目的として行われる。"], "answer": ["D"], "explanation": "ソフトウェアテストには、大きく分けてホワイトボックステスト、ブラックボックステスト、グレーボックステストの3種類があります。\\nホワイトボックステストは、テスト対象のソースコードを参照しながら行うテスト手法です。\\nホワイトボックステストの主な目的は、ソースコードの網羅性を確認することにあります。\\nつまり、ホワイトボックステストは、主にソフトウェアの内部構造や実装の正しさを検証するために行われるのであって、ユーザビリティの検証が主目的ではありません。", "wrongReasons": "A：ホワイトボックステストでは、テスト対象のソースコードを参照しながらテストを行うという記述は正しいです。\nB：ブラックボックステストでは、テスト対象の内部構造を考慮せずにテストを行うという記述は正しいです。\nC：グレーボックステストは、ホワイトボックステストとブラックボックステストの中間的なアプローチであるという記述は正しいです。", "trap": "ホワイトボックステストは、ソフトウェアの内部構造に焦点を当てたテスト手法ですが、これは主にソフトウェアの品質や信頼性を確保するために行われます。\\nユーザビリティの検証は、主にブラックボックステストやグレーボックステストで行われます。\\nホワイトボックステ再試行S続ける編集ストとユーザビリティテストの目的を混同しないように注意が必要です。", "domain": "3"}, {"number": "88", "question": "以下のうち、ソフトウェアのセキュリティ要件定義において考慮すべき項目はどれか？（複数選択可）", "choices": ["A. ビジネス要件", "B. 法的およびコンプライアンス要件", "C. エンドユーザーの利便性", "D. 組織の文化および価値観"], "answer": ["A", "B", "C"], "explanation": "セキュリティ要件定義は、ソフトウェア開発の初期段階で行われる重要なプロセスです。\\nセキュリティ要件定義では、ソフトウェアが満たすべきセキュリティ上の要求事項を明確にします。\\nその際、ビジネス要件、法的およびコンプライアンス要件、エンドユーザーの利便性などを考慮する必要があります（OWASP SAMM）。\\nビジネス要件を考慮することで、ソフトウェアがビジネス目標に合致したセキュリティ機能を持つことを確実にできます。\\n法的およびコンプライアンス要件を考慮することで、ソフトウェアが関連法規制に準拠していることを確認できます。\\nエンドユーザーの利便性を考慮することで、セキュリティ機能がユーザビリティを損なわないようにできます。", "wrongReasons": "D：組織の文化および価値観は、セキュリティ要件定義において直接的に考慮すべき項目ではありません。セキュリティ文化の醸成は重要ですが、セキュリティ要件自体には直結しません。", "trap": "セキュリティ要件定義では、ソフトウェアのセキュリティだけでなく、ビジネス面やユーザビリティ面での要求事項もバランス良く考慮する必要があります。\\nセキュリティを重視するあまり、ビジネス要件やユーザビリティを損なってしまっては本末転倒です。\\nセキュリティとビジネス、ユーザビリティのトレードオフを適切に管理することが、セキュリティ要件定義の肝要なポイントと言えます。", "domain": "3"}, {"number": "89", "question": "機密性、可用性に次いで、情報セキュリティの3大要素の一つとされるものは何か？", "choices": ["A. 機密性", "B. 可用性", "C. 完全性", "D. 真正性"], "answer": ["C"], "explanation": "情報セキュリティの3大要素としては、機密性（Confidentiality）、完全性（Integrity）、可用性（Availability）が知られています。\\n機密性は、情報が許可されていない個人、エンティティ、プロセスに対して非公開または未公開であることを確保することを指します。\\n完全性は、情報の正確さと完全さを保護することを指します。つまり、情報が不適切に変更されたり破壊されたりすることから保護することです。\\n可用性は、情報が必要なときに許可されたユーザーがアクセスできることを確保することを指します。\\nこれらの3つの要素は、情報セキュリティの中核をなすものであり、しばしば「CIAトライアド」と呼ばれます（NIST SP 800-12）。", "wrongReasons": "A：機密性は情報セキュリティの3大要素の一つですが、問題文が求めているのは機密性と可用性に次ぐ3つ目の要素です。\nB：可用性も情報セキュリティの3大要素の一つですが、問題文が求めているのは機密性と可用性に次ぐ3つ目の要素です。\nD：真正性は重要な情報セキュリティの概念ですが、一般的にCIAトライアドには含まれません。", "trap": "CIAトライアドは、情報セキュリティを議論する上で最も基本的かつ重要な概念です。\\nしかし、CIAトライアドは情報セキュリティの全てを網羅しているわけではありません。真正性、否認防止、責任追跡性など、他にも重要な概念があります。\\nCIAトライアドを出発点としつつ、情報セキュリティの多様な側面を理解することが重要です。", "domain": "3"}, {"number": "90", "question": "クライアントサーバーシステムにおいて、サーバーの応答が生成されたこと、または応答を受信したことをクライアントが証明できるようにするセキュリティサービスは何か？", "choices": ["A. 認証", "B. 否認防止", "C. アクセス制御", "D. 監査"], "answer": ["B"], "explanation": "問題文が説明しているのは、否認防止（Non-repudiation）というセキュリティサービスです。\\n否認防止とは、ある行為が行われたこと、またはイベントが発生したことを、後になって関係者が否定できないようにすることを指します（ISO/IEC 27000）。\\n本問のケースでは、サーバーが応答を生成したこと、またはクライアントが応答を受信したことを、後から否定できないようにすることが求められています。\\nこれは、まさに否認防止の目的に合致します。\\n否認防止は、電子商取引などの分野で特に重要視されるセキュリティサービスの一つです。", "wrongReasons": "A：認証は、主体の識別情報の検証を行うプロセスを指します。本問のケースとは直接関係がありません。\nC：アクセス制御は、リソースへのアクセスを制限し、許可されたユーザーのみにアクセスを許可することを指します。本問の状況とは関係がありません。\nD：監査は、システムの活動や使用状況を記録し、後でレビューできるようにすることを指します。否認防止とは異なる概念です。", "trap": "否認防止は、認証、アクセス制御、監査などと並ぶ重要なセキュリティサービスですが、他の概念と混同されやすい面があります。\\n特に、認証と否認防止は密接に関連していますが、認証が「主体の識別情報の検証」であるのに対し、否認防止は「行為やイベントの発生を否定できないようにすること」と、目的が異なります。\\nセキュリティサービスの目的と機能を正確に理解し、問題文の要求に合ったサービスを選択できるようにしましょう。", "domain": "3"}, {"number": "91", "question": "システム開発プロセスにおいて、脆弱性を最も効率的かつ経済的に修正できるのはどのフェーズか？", "choices": ["A. 要件定義", "B. 設計", "C. 実装", "D. テスト"], "answer": ["A"], "explanation": "システム開発における脆弱性の修正コストは、開発プロセスの早期ほど小さく、後期になるほど大きくなります。\\nこれは、開発の後半になるほど、変更による影響範囲が広くなり、多くの工程をやり直す必要が出てくるためです。\\n特に、要件定義フェーズで脆弱性を発見・修正できれば、設計や実装への影響を最小限に抑えられます（NIST SP 800-64）。\\nしたがって、脆弱性修正の効率性と経済性の観点からは、要件定義フェーズが最も望ましいタイミングだと言えます。", "wrongReasons": "B：設計フェーズでの脆弱性修正は、要件定義フェーズよりもコストがかかります。設計変更により、実装やテストにも影響が及ぶためです。\nC：実装フェーズになると、脆弱性の修正コストはさらに高くなります。修正のために、設計の見直しや、他の機能の修正が必要になることがあるためです。\nD：テストフェーズで脆弱性が見つかると、修正のために前工程に戻る必要があり、大きな手戻りコストが発生します。", "trap": "要件定義フェーズは、システム開発の最も初期の段階であり、具体的な設計や実装には着手していません。\\nそのため、要件定義での脆弱性発見は、技術的な詳細よりも、むしろビジネス要件とセキュリティ要件の整合性の観点から行われます。\\n具体的には、要件定義書のレビューや、要件に対するリスクアセスメントなどを通じて、潜在的な脆弱性を洗い出していきます。", "domain": "3"}, {"number": "92", "question": "クリティカルなインフラ施設に適用される物理的セキュリティ対策の原則として、適切なものを次から選べ。", "choices": ["A. 防衛の深さ（Defence in Depth）", "B. 最小特権の原則", "C. フェイルセーフ", "D. 職務の分掌"], "answer": ["A"], "explanation": "防衛の深さ（Defence in Depth）は、物理的セキュリティ対策の基本原則の一つです。\\nこの原則は、単一の防御ラインに依存するのではなく、複数の防御ラインを重層的に配置することを意味します。\\n具体的には、敷地の境界、建物の外周、建物の内部、重要エリア、といった具合に、外側から内側に向けて複数の防御ラインを設けます（NIST SP 800-53）。\\nこれにより、一つの防御ラインが突破されても、次の防御ラインで脅威を食い止められる可能性が高まります。\\nクリティカルなインフラ施設では、単一障害点を避け、多層防御により高い物理的セキュリティを確保することが肝要です。", "wrongReasons": "B：最小特権の原則は、ユーザーやプロセスに与える権限を最小限に留めるという、アクセス制御の原則です。物理的セキュリティとは直接関係がありません。\nC：フェイルセーフは、システムの故障時に安全側に制御するという設計思想で、物理的セキュリティの文脈ではあまり使われません。\nD：職務の分掌は、複数人の関与を必要とすることで不正を防止する内部統制の手法です。物理的セキュリティとは直接の関係がありません。", "trap": "防衛の深さは、情報セキュリティの分野でも重要な原則として知られています。\\n情報システムの防御では、ファイアウォール、IDS/IPS、エンドポイント保護など、複数のセキュリティ対策を重層的に組み合わせることが防衛の深さの具体例になります。\\n物理的セキュリティにおいては、フェンス、壁、扉、警備員、監視カメラなどが、防御ラインを構成する要素になります。", "domain": "3"}, {"number": "93", "question": "ソフトウェア開発におけるセキュリティテストの説明として、最も適切でないものを次の選択肢から選べ。", "choices": ["A. 脆弱性スキャンは、既知の脆弱性をソフトウェアが含んでいないかを自動でチェックする。", "B. 侵入テスト（ペネトレーションテスト）は、実際の攻撃者の視点からソフトウェアの弱点を見つけ出そうとする。", "C. ファジングは、無効なデータや予期しないデータを大量にソフトウェアに入力し、その振る舞いを観察する。", "D. コードレビューは、自動化ツールを用いてソースコードを解析し、潜在的な脆弱性を特定する。"], "answer": ["D"], "explanation": "コードレビューは、開発者や専門家が手動でソースコードを読み、潜在的な脆弱性やセキュリティ上の問題を特定・修正するプロセスです。\\nコードレビューの目的は、自動化ツールでは発見しにくい論理的なエラーや、仕様との不整合を見つけ出すことにあります（SEI CERT Coding Standards）。\\nつまり、コードレビューの本質は「手動」のプロセスであり、自動化ツールはあくまで補助的に使われるものです。\\nしたがって、コードレビューを「自動化ツールを用いてソースコードを解析する」と説明するのは適切ではありません。", "wrongReasons": "A：脆弱性スキャンは、既知の脆弱性のシグネチャをもとに、ソフトウェアの脆弱性を自動で検出するセキュリティテストの手法です。\nB：侵入テスト（ペネトレーションテスト）は、実際の攻撃者の視点に立ち、ソフトウェアのセキュリティホールを探し出す手法です。\nC：ファジングは、ランダムに生成した大量のデータをソフトウェアに入力し、クラッシュやエラーなどの異常動作を見つけ出す手法です。", "trap": "コードレビューにおいても、静的解析ツールなどの自動化ツールが活用されることがあります。\\nしかし、これらのツールはあくまでコードレビューを補助するためのものであり、コードレビュー自体を自動化するものではありません。\\n自動化ツールでは検出しにくい問題を、人間の目と経験で見つけ出すことがコードレビューの本質的な価値だと理解しましょう。", "domain": "3"}, {"number": "94", "question": "情報セキュリティの文脈における「悪意のある者」を表す用語として、最も一般的なものを次の選択肢から選べ。", "choices": ["A. ブラックハット", "B. グレーハット", "C. 脅威エージェント", "D. 非倫理的ハッカー"], "answer": ["C"], "explanation": "「脅威エージェント（Threat Agent）」は、情報システムに対して潜在的に悪影響を及ぼす可能性のある人、システム、または出来事を表す用語です（NIST SP 800-30）。\\n脅威エージェントには、悪意のあるハッカー、内部不正者、スパイ、テロリスト、競合他社などが含まれます。\\nまた、自然災害や機器の故障なども、広い意味での脅威エージェントと見なすことができます。\\n情報セキュリティの文脈では、「脅威エージェント」が最も一般的かつ包括的な用語として使われています。", "wrongReasons": "A：「ブラックハット」は、悪意を持ってシステムに不正アクセスする者を指す俗語的な表現です。一般的な用語とは言えません。\nB：「グレーハット」は、善意からシステムの脆弱性を探すものの、時に法律やモラルに反する行為に及ぶ者を指す表現です。必ずしも悪意があるとは限りません。\nD：「非倫理的ハッカー」は、倫理に反する方法でシステムにアクセスする者を指す表現ですが、一般的な用語ではありません。", "trap": "「ブラックハット」「グレーハット」「ホワイトハット」などの表現は、ハッカーの動機や手段の違いを表すために使われることがあります。\\nしかし、これらの表現は俗語的であり、情報セキュリティの専門用語としては適切ではありません。\\n情報セキュリティの文脈で「悪意のある者」について議論する際は、「脅威エージェント」という用語を使うのが最も無難で正確だと言えます。", "domain": "3"}, {"number": "95", "question": "情報セキュリティの「3要素（CIA）」と「PARKERIAN HEXAD」の両方に含まれる要素はどれか？（複数選択可）", "choices": ["A. 機密性（Confidentiality）", "B. 可用性（Availability）", "C. 否認防止（Non-repudiation）", "D. 完全性（Integrity）", "E. 真正性（Authenticity）"], "answer": ["A", "B", "D"], "explanation": "情報セキュリティの「3要素（CIA）」とは、機密性（Confidentiality）、完全性（Integrity）、可用性（Availability）を指します。\\n一方、「PARKERIAN HEXAD」は、CIAに加えて、真正性（Authenticity）、否認防止（Non-repudiation）、管理性（Control）を加えた6つの要素で構成されます。\\nしたがって、CIAとPARKERIAN HEXADの両方に含まれる要素は、機密性（Confidentiality）、完全性（Integrity）、可用性（Availability）の3つです。", "wrongReasons": "C：否認防止（Non-repudiation）は、PARKERIAN HEXADには含まれますが、CIAには含まれません。\nE：真正性（Authenticity）も、PARKERIAN HEXADには含まれますが、CIAには含まれません。", "trap": "情報セキュリティの基本原則としては、CIAが最も広く知られています。\\nしかし、CIAだけでは情報セキュリティの全体像を捉えきれないという指摘もあります。\\nPARKERIAN HEXADは、CIAを拡張し、真正性や否認防止などの要素を加えることで、情報セキュリティをより包括的に捉えようとする考え方です。\\n情報セキュリティを議論する際は、CIAを出発点としつつ、PARKERIAN HEXADなどの拡張モデルも視野に入れると良いでしょう。", "domain": "3"}, {"number": "96", "question": "ある企業が外部とのVPN接続に使用しているIPsecトンネルモードについて、セキュリティ監査を行っています。監査人が指摘すべき設定上の問題点として、最も適切なものはどれでしょうか。", "choices": ["A. ESPが使用されていない", "B. トランスポートモードが使用されていない", "C. AHが使用されていない", "D. IKEv1が使用されている"], "answer": ["A"], "explanation": "IPsecのトンネルモードでは、ESPの使用が必須とされています。ESP (Encapsulating Security Payload)は、IPsecの中核をなすプロトコルの一つで、データの機密性と認証を提供します。\\nトンネルモードにおいて、ESPはIPデータグラム全体（ヘッダを含む）を暗号化・カプセル化します。これにより、送信元・宛先IPアドレスを含むデータ全体が保護されます。\\nESPが使用されていない設定は、IPsecトンネルモードのセキュリティ要件を満たしていないと判断できます。監査人としては、ESPの使用を推奨すべきです。\\n(NIST SP 800-77 \"Guide to IPsec VPNs\" 等を参照)", "wrongReasons": "B：トンネルモードはIPsec VPNでの一般的な使用法であり、問題ではありません。トランスポートモードは主にエンドツーエンドの通信で用いられます。\nC：AH(Authentication Header)はESPと併用可能ですが、必須ではありません。AHはデータの認証とメッセージインテグリティを提供します。\nD：IKEv1は、IPsecの鍵交換プロトコルとして利用可能です。IKEv2の方が新しく望ましいですが、IKEv1の使用自体は直ちにセキュリティ上の問題とは言えません。", "trap": "トンネルモードとトランスポートモードの違いがポイントです。トンネルモードはVPNでの使用に適しており、ESPの利用が不可欠です。\\nAHとESPの役割の違いも理解しておく必要があります。ESPがデータの機密性を守るのに対し、AHはデータ認証とインテグリティを担います。", "domain": "4"}, {"number": "97", "question": "会社の営業部門から、機密性の高い顧客情報を記録したファイルをメールで外部の取引先に送信したいという要望が出ています。セキュリティ管理者として、次の選択肢の中から、それぞれ適切と思われるものをすべて選んでください。", "choices": ["A. 社内ルールを定めてメールの添付ファイル送信を全面禁止する", "B. 承認されたファイル暗号化ソフトの使用を義務付ける", "C. S/MIMEによるメールの暗号化を推奨する", "D. メールのDKIMによる署名と検証を義務付ける"], "answer": ["B", "C"], "explanation": "機密性の高い情報をメールで送信する場合、適切なセキュリティ対策が不可欠です。\\n選択肢Bのように、承認されたファイル暗号化ソフト（例：PGP, GPG）を使用してファイルを暗号化することで、送信中の情報漏洩リスクを低減できます。\\n選択肢Cで挙げたS/MIME (Secure/Multipurpose Internet Mail Extensions)は、デジタル署名と暗号化の機能を備えたメールセキュリティ標準規格です。暗号化によりメッセージの機密性を、デジタル署名により発信元の認証とメッセージの完全性を確保できます。S/MIMEの利用は、機密情報をメールで送信する際の有効な選択肢と言えます。", "wrongReasons": "A：業務上の必要性がある場合、メールの添付ファイル送信を全面禁止するのは現実的ではありません。適切なセキュリティ対策を講じた上で、業務に支障のない範囲で許容することが求められます。\nD：DKIM (DomainKeys Identified Mail)は、送信ドメインの認証技術であり、メールの発信元が詐称されていないことを保証します。しかし、DKIMはメッセージ自体の機密性を守るものではないため、機密情報の保護には直接寄与しません。", "trap": "S/MIMEはメールの暗号化とデジタル署名の標準規格ですが、DKIMはあくまでドメイン認証の仕組みです。両者の違いを理解しておくことが肝要です。\\n添付ファイルの暗号化とメール本文の暗号化は、別の対策として考える必要があります。S/MIMEはメール本文の暗号化に使えますが、添付ファイルの暗号化には別途専用のソフトが必要になります。", "domain": "4"}, {"number": "98", "question": "イーサネットにおけるDNS名前解決の仕組みについて、正しいものはどれですか。", "choices": ["A. DNSサーバーはIPアドレスをMACアドレスに変換する", "B. 各ノードはDNSクエリをブロードキャストで送信する", "C. ホスト名からIPアドレスへの変換にARPが使われる", "D. DNSキャッシュはTTLによって更新間隔を制御する"], "answer": ["D"], "explanation": "イーサネットにおけるDNS (Domain Name System)の役割は、ホスト名からIPアドレスへの変換（名前解決）を行うことです。\\nDNSキャッシュは、一度解決したホスト名とIPアドレスの対応関係を一定期間保持します。これにより、同じホスト名の問い合わせに対して高速に応答できます。\\nこのDNSキャッシュの各エントリには、TTL (Time-To-Live)が設定されています。TTLは、そのエントリがキャッシュ上に保持される時間を秒単位で示します。TTLが過ぎると、エントリは削除され、次の問い合わせ時に再度名前解決が行われます。\\nこのTTLの仕組みにより、DNSキャッシュの更新間隔が制御されています。TTLは、権威DNSサーバー上のゾーンファイルで設定されます。\\n(RFC 1034, 1035等を参照)", "wrongReasons": "A：DNSの役割はホスト名からIPアドレスへの変換です。IPアドレスからMACアドレスへの変換は、ARPの役割です。\nB：DNSクエリはUDPを使って、ポート53でユニキャスト送信されます。ブロードキャスト送信ではありません。\nC：APR (Address Resolution Protocol)は、同一ネットワーク内でIPアドレスからMACアドレスへの変換を行います。ホスト名からIPアドレスへの変換は、DNSの役割です。", "trap": "DNSとARPの役割の違いを混同しないように注意が必要です。DNSはホスト名からIPアドレス、ARPはIPアドレスからMACアドレスへの変換を担当します。\\nDNSキャッシュのTTLは、権威DNSサーバー側で設定されます。クライアント側のDNSキャッシュは、このTTLに従ってエントリを保持・削除します。", "domain": "4"}, {"number": "99", "question": "ある企業のネットワークにおいて、STPが適切に設定されていないために、スイッチ間でブロードキャストストームが発生しています。ネットワーク管理者が取るべき対応として、最も適切なものを次の選択肢から一つ選びなさい。", "choices": ["A. スイッチ間のすべてのリンクを物理的に切断する", "B. スイッチのSTP設定を見直し、適切に設定し直す", "C. ブロードキャストドメインを分割するためにサブネットを導入する", "D. ポートセキュリティを有効化し、MACアドレスの学習数を制限する"], "answer": ["B"], "explanation": "ブロードキャストストームは、主にレイヤ2ループが原因で発生します。レイヤ2ループは、スイッチ間の冗長接続が不適切に設定されている場合に生じます。\\nSTP (Spanning Tree Protocol)は、レイヤ2ネットワークにおけるループを防止するためのプロトコルです。STPは、冗長パスを論理的にブロックすることで、ループフリーなトポロジを構築します。\\n設問の状況では、STPが適切に設定されていないために、ブロードキャストパケットがループしてストームを引き起こしています。\\nしたがって、根本的な解決策は、スイッチのSTP設定を見直し、適切に設定し直すことです。具体的には、ブリッジ優先度、パスコスト、ポート優先度などのSTPパラメータを最適化します。\\n適切なSTP設定により、ループが排除され、ブロードキャストストームが収束します。\\n(IEEE 802.1D等を参照)", "wrongReasons": "A：スイッチ間のリンクを物理的に切断すると、ネットワークの冗長性が失われ、可用性が低下します。根本的な解決にはなりません。\nC：ブロードキャストドメインを分割することは、ブロードキャストトラフィックの削減には有効ですが、レイヤ2ループの解消にはつながりません。\nD：ポートセキュリティは、不正なMACアドレスの接続を防ぐセキュリティ機能です。ブロードキャストストームの抑制効果は限定的です。", "trap": "ブロードキャストストームの原因が、物理的なループなのか、論理的なループ（STP設定の不備）なのかを見極めることが肝要です。\\nブロードキャストドメインの分割（サブネット化）は、ブロードキャストトラフィックの削減には有効ですが、レイヤ2ループの防止とは直接関係しません。", "domain": "4"}, {"number": "100", "question": "IPsecのAH (Authentication Header)が提供するセキュリティサービスとして、当てはまるものを次の選択肢からすべて選びなさい。", "choices": ["A. 送信元IPアドレスの認証", "B. ペイロードの暗号化", "C. 外部IPヘッダの保護", "D. リプレイ攻撃の防止"], "answer": ["A", "C", "D"], "explanation": "IPsecのAH (Authentication Header)は、認証とデータインテグリティを提供するプロトコルです。\\n具体的には、以下のセキュリティサービスを実現します：\\n\\n送信元IPアドレスの認証（選択肢A）：AHは、IPヘッダに含まれる送信元IPアドレスの正当性を検証します。これにより、IPスプーフィング攻撃を防止できます。\\n外部IPヘッダの保護（選択肢C）：AHは、外部IPヘッダ（AHの前にあるIPヘッダ）の一部のフィールドを保護します。これにより、ヘッダの改ざんを検知できます。\\nリプレイ攻撃の防止（選択肢D）：AHは、シーケンス番号を使ってパケットの重複を検知し、リプレイ攻撃を防ぎます。\\n\\n\\nただし、AHはペイロードの暗号化は行いません（選択肢B）。ペイロードの機密性保護はESP (Encapsulating Security Payload)の役割です。\\n(RFC 4302, NIST SP 800-77等を参照)", "wrongReasons": "B：AHはペイロードの暗号化を提供しません。機密性保護が必要な場合は、ESPを使う必要があります。", "trap": "AHとESPの機能の違いを理解することが重要です。AHは認証とデータインテグリティ、ESPは機密性保護が主な役割です。\\nAHは外部IPヘッダを保護しますが、内部IPヘッダ（カプセル化された元のIPヘッダ）は保護しません。", "domain": "4"}, {"number": "101", "question": "あるグローバル企業が、各国の拠点間をつなぐWANを新規に構築することになりました。経路制御プロトコルの選定を行う際に、最も考慮すべき要素はどれですか。", "choices": ["A. 経路集約の柔軟性", "B. コンバージェンス時間", "C. ルーティングテーブルのサイズ", "D. プロトコルのオーバーヘッド"], "answer": ["B"], "explanation": "WANにおける経路制御プロトコルの選定では、コンバージェンス時間が最も重要な考慮要素の一つです。\\nコンバージェンスとは、ネットワークトポロジの変更（リンクの切断、ルータの故障など）が発生した際に、全ルータが新しいトポロジ情報を学習し、ルーティングテーブルを更新するまでの過程を指します。\\nコンバージェンス時間が長いと、トポロジ変更中にパケットが宛先に到達できず、通信断やパケットロスが長時間続くことになります。特にWANではリンク切断などの影響が大きいため、高速なコンバージェンスが求められます。\\nこの観点から、OSPF (Open Shortest Path First)やEIGRP (Enhanced Interior Gateway Routing Protocol)などのリンク状態型/ハイブリッド型プロトコルが、ディスタンスベクトル型プロトコル（RIPなど）よりも好まれる傾向にあります。\\nもちろん他の要素も考慮は必要ですが、コンバージェンス時間が経路制御の安定性に直結するため、最重要視されることが一般的です。", "wrongReasons": "A：経路集約の柔軟性は、ルーティングテーブルのスリム化や管理のしやすさには寄与しますが、コンバージェンスとは直接関係しません。\nC：ルーティングテーブルのサイズは、ルータのメモリ消費量に影響しますが、コンバージェンス時間との相関は少ないです。\nD：プロトコルのオーバーヘッドは、帯域消費の点では無視できませんが、やはりコンバージェンス時間ほどの重要度はありません。", "trap": "経路制御プロトコルの選定では、多くの要素のバランスを取る必要があります。コンバージェンス時間、スケーラビリティ、運用管理性、相互運用性などを総合的に勘案することが肝要です。\\nただし、特にWANのようなミッションクリティカルな環境では、コンバージェンス時間の重要性が突出していることを理解しておくことが大切です。", "domain": "4"}, {"number": "102", "question": "SSL/TLSによるセキュアな通信を行う際、クライアント認証を行うために利用される技術を次の選択肢からすべて選びなさい。", "choices": ["A. プリシェアードキー", "B. クライアント証明書", "C. サーバー証明書", "D. 相互認証"], "answer": ["B", "D"], "explanation": "SSL/TLSでは、サーバー認証が必須ですが、クライアント認証はオプションです。クライアント認証を行う場合、次の技術が使われます：\\n\\nクライアント証明書（選択肢B）：クライアントは、自身の公開鍵を含むデジタル証明書をサーバーに提示します。これにより、サーバーはクライアントの身元を確認できます。\\n相互認証（選択肢D）：サーバーとクライアントが互いの身元を証明書で確認し合うプロセスを、相互認証または双方向認証と呼びます。クライアント認証では、サーバー認証に加えて、クライアント側の証明書検証が行われます。\\n\\n\\nクライアント証明書は、認証局（CA）によって発行されます。サーバーは、クライアント証明書の有効性をCAの公開鍵で検証します。\\n相互認証により、なりすましや中間者攻撃のリスクを低減できます。ただし、クライアント証明書の配布・管理のコストがかかるため、必要に応じて採用を判断します。\\n(RFC 5246, NIST SP 800-52等を参照)", "wrongReasons": "A：プリシェアードキー（事前共有鍵）は、VPNなどで使われる対称鍵暗号の一種です。SSL/TLSのクライアント認証では使われません。\nC：サーバー証明書は、サーバー認証に使われます。クライアント認証には、クライアント証明書が必要です。", "trap": "SSL/TLSでは、サーバー認証が必須、クライアント認証がオプションであることを覚えておくことが重要です。\\n相互認証は、サーバー認証とクライアント認証の両方を含むプロセスを指します。単にクライアント認証と言う場合もありますが、厳密には相互認証の一部です。", "domain": "4"}, {"number": "103", "question": "ファイアウォールのNAT（Network Address Translation）機能を説明した記述として、最も適切なものはどれですか。", "choices": ["A. グローバルIPアドレスをプライベートIPアドレスに変換する", "B. プライベートIPアドレスをグローバルIPアドレスに変換する", "C. MACアドレスをIPアドレスに変換する", "D. IPv4アドレスをIPv6アドレスに変換する"], "answer": ["B"], "explanation": "NAT（Network Address Translation）は、IPアドレスを別のIPアドレスに変換する技術です。ファイアウォールのNAT機能は、主に以下の目的で使用されます：\\n\\nプライベートIPアドレスをグローバルIPアドレスに変換する（選択肢B）：組織内部で使われるプライベートIPアドレス（RFC 1918で定義）を、インターネット上で一意なグローバルIPアドレスに変換します。これにより、限られたグローバルIPアドレスを効率的に使えます。\\n内部ネットワーク構成の隠蔽：NATにより、内部ネットワークのIPアドレス体系を外部から隠蔽できます。これは、情報漏洩の防止と、ネットワークへの攻撃の難易度を上げる効果があります。\\n\\n\\n一般的に、ファイアウォールのNATでは、内部のプライベートIPアドレスを外部のグローバルIPアドレスに変換します。逆の変換（グローバル→プライベート）は、通常は行いません。\\nNATには、1対1のスタティックNATと、複数対1のダイナミックNAT（NAPT：Network Address Port Translation、IPマスカレードとも呼ばれる）があります。\\n(RFC 2663, 3022等を参照)", "wrongReasons": "A：NATでは通常、プライベートIPアドレスからグローバルIPアドレスへの変換が行われます。その逆ではありません。\nC：MACアドレスとIPアドレスの変換は、NATの機能ではありません。MACアドレスの解決にはARPが使われます。\nD：IPv4アドレスとIPv6アドレスの変換は、NATの一般的な用途ではありません。これは、IPv4-IPv6トランスレーターなどの別の技術の領域です。", "trap": "NATの主な目的が、プライベートIPアドレスのグローバルIPアドレスへの変換であることを理解することが肝要です。\\nNATとPATの違いも押さえておくと良いでしょう。PATは、ポート番号を使ってアドレス変換を行う、NATの発展形と言えます。", "domain": "4"}, {"number": "104", "question": "pingコマンドを使ってリモートホストの死活監視を行う場合、使用されるプロトコルはどれですか。", "choices": ["A. ARP", "B. ICMP", "C. TCP", "D. UDP"], "answer": ["B"], "explanation": "pingコマンドは、IPネットワーク上のホストの到達可能性を確認するためのツールであり、ICMP（Internet Control Message Protocol）を使用します（選択肢B）。\\n具体的には、pingはICMPの「エコー要求」メッセージを対象ホストに送信し、「エコー応答」メッセージの返信を待ちます。応答がある場合はホストが到達可能、ない場合は到達不能と判断します。\\nICMPは、IPの補完的な役割を果たすプロトコルで、エラー報告や制御メッセージの伝達に使われます。ホストやルータの死活監視、経路のトレースなどの目的で使われるのが特徴です。\\npingによるICMPエコーは、ネットワークの接続性を確認する簡便な方法ですが、セキュリティ上の理由からICMPをブロックしているホストも少なくありません。そのため、pingが通らなくても必ずしも到達不能とは限らないことにも注意が必要です。\\n(RFC 792等を参照)", "wrongReasons": "A：ARPは、IPアドレスからMACアドレスを解決するプロトコルです。ホストの死活監視には使われません。\nC：TCPは、信頼性の高いコネクション型のトランスポート層プロトコルです。ホストの到達可能性確認にはICMPが使われます。\nD：UDPは、コネクションレスなトランスポート層プロトコルです。pingでは使われません。", "trap": "pingがICMPを使うことは覚えておきましょう。ICMPは、IPを補完する重要なプロトコルです。\\nただし、pingが通らないからといって即座に「ホストが死んでいる」と判断するのは早計です。ファイアウォールでICMPがブロックされているケースもあるので注意が必要です。", "domain": "4"}, {"number": "105", "question": "ワイヤレスネットワークにおけるローミングの仕組みを2つの選択肢から選びなさい。", "choices": ["A. ユーザーがアクセスポイント間を移動する際、同一のSSIDに自動的に再接続する", "B. VPNを使って、異なるネットワーク間を安全に移動する", "C. MACアドレスフィルタリングにより、承認されたデバイスのみがネットワーク間を移動できる", "D. ユーザーがアクセスポイント間を移動する際、異なるSSIDに自動的に再接続する"], "answer": ["A"], "explanation": "ワイヤレスネットワークにおけるローミングとは、ユーザーがアクセスポイント（AP）の範囲外に移動した際に、同一のSSID（Service Set Identifier）を持つ別のAPに自動的に接続することを指します（選択肢A）。\\nSSIDは、ワイヤレスネットワークを識別するための名前で、同じSSIDを持つAPは同一のネットワークに属していると見なされます。\\nローミングにより、ユーザーはネットワーク内を移動しながら、シームレスにワイヤレス接続を維持することができます。これは、大規模な施設や複数のAPを持つエンタープライズネットワークなどで特に有用です。\\nローミングを実現するためには、APが同一のSSIDを使い、オーバーラップするカバレッジエリアを持つように配置される必要があります。また、APはワイヤレスコントローラによって一元管理されることが一般的です。\\n(IEEE 802.11等を参照)", "wrongReasons": "B：VPNは、安全にリモートアクセスを提供する技術ですが、ローミングとは直接関係ありません。\nC：MACアドレスフィルタリングは、許可されたデバイスのみがネットワークに接続できるようにする技術ですが、ローミングとは直接関係ありません。\nD：異なるSSIDへの自動再接続は、ローミングとは言いません。ローミングは、同一のSSIDを持つAP間での移動を指します。", "trap": "ローミングは、同一のSSIDを持つAP間での移動を指します。異なるSSIDのネットワーク間の移動は、ローミングではなく、手動での接続切り替えとなります。\\nまた、APのカバレッジエリアがオーバーラップしていることが、シームレスなローミングの実現に不可欠です。", "domain": "4"}, {"number": "106", "question": "SSLストリッピング攻撃について説明した記述として、最も適切なものはどれですか。", "choices": ["A. 中間者攻撃の一種で、HTTPSからHTTPへの切り替えを強制する", "B. サーバー証明書の検証を無効化することで、偽のサーバーに接続させる", "C. 脆弱なSSLバージョンやCipherSuiteを利用して、暗号化を解読する", "D. SSLセッションIDを盗み、セッションハイジャックを行う"], "answer": ["A"], "explanation": "SSLストリッピング攻撃は、中間者攻撃（Man-in-the-Middle Attack）の一種で、ユーザーをHTTPS（セキュア）接続からHTTP（非セキュア）接続へ切り替えさせます（選択肢A）。\\n攻撃者は、ユーザーとWebサーバーの間に入り、ユーザーからのHTTPS接続要求をHTTPに変換してサーバーに送信します。サーバーからの応答はHTTPで受信し、これをHTTPSに変換してユーザーに返します。\\nユーザーは、自分がHTTPS接続していると思い込んでいるため、機密情報（ログイン情報など）を安全でない状態で送信してしまいます。攻撃者は、その情報を傍受・盗聴することができます。\\nSSLストリッピング攻撃は、Webサイトが一貫してHTTPSを使っていない（HTTPからHTTPSへのリダイレクトを使っているなど）場合に有効です。サイト全体をHTTPS化（HSTS：HTTP Strict Transport Securityヘッダの使用など）することが重要な対策になります。\\n(参考：Moxie Marlinspike, \"New Tricks For Defeating SSL In Practice\")", "wrongReasons": "B：サーバー証明書の検証の無効化は、SSLストリッピングとは異なる攻撃です。これは、ユーザーが偽の証明書を受け入れるように仕向ける攻撃です。\nC：SSLの脆弱性を利用した暗号解読は、SSLストリッピングとは異なります。SSLストリッピングは、暗号化自体を回避する攻撃です。\nD：SSLセッションIDの盗用によるセッションハイジャックは、SSLストリッピングとは異なる攻撃です。SSLストリッピングは、セッション自体を平文化します。", "trap": "SSLストリッピングは、暗号化の回避を狙った巧妙な中間者攻撃です。HTTPSの一部でもHTTPが使われていると、この攻撃が有効になります。\\nユーザーは、ブラウザのURLバーをチェックし、常にHTTPSが使われていることを確認することが大切です。", "domain": "4"}, {"number": "107", "question": "IPsecにおけるトランスポートモードとトンネルモードの違いについて、正しく説明しているものを選びなさい。", "choices": ["A. トランスポートモードはデータのみを、トンネルモードはIPヘッダも含めて保護する", "B. トランスポートモードはVPNで、トンネルモードはエンドツーエンドの通信で使う", "C. トランスポートモードはAHで、トンネルモードはESPで使われる", "D. トランスポートモードはIPv4で、トンネルモードはIPv6で使われる"], "answer": ["A"], "explanation": "IPsecにはトランスポートモードとトンネルモードの2つの動作モードがあり、その主な違いは保護対象の範囲です。\\nトランスポートモードでは、IPペイロード（TCP/UDPセグメントなど）のみが保護（暗号化/認証）されます。一方、トンネルモードでは、元のIPパケット全体（IPヘッダ+ペイロード）が新しいIPパケットにカプセル化され、保護されます（選択肢A）。\\nトランスポートモードは主にエンドツーエンドの通信で使われ、ホスト間の上位レイヤデータを保護します。一方、トンネルモードはVPNなどで使われ、サイト間やリモートアクセスの通信を保護します。\\nトランスポートモード、トンネルモードともに、AH（Authentication Header）とESP（Encapsulating Security Payload）の両方で使用可能です。\\nIPsecはIPv4、IPv6のどちらのネットワークでも動作します。\\n(RFC 4301, NIST SP 800-77等を参照)", "wrongReasons": "B：トンネルモードはVPNでの使用に適していますが、トランスポートモードがエンドツーエンドの通信専用というわけではありません。\nC：AHとESPはいずれもトランスポートモード、トンネルモードの両方をサポートします。\nD：IPsecはIPv4、IPv6の両方で使用可能で、動作モードとIPバージョンに直接の関係はありません。", "trap": "トランスポートモードとトンネルモードの違いは、保護対象の範囲（IPペイロードのみか、IPヘッダも含めるか）です。使用シーンの違いはこの範囲の違いから派生します。\\nAHとESPの選択は、必要なセキュリティサービス（認証のみか、暗号化も必要か）によって決まります。モードの選択とは直接関係しません。", "domain": "4"}, {"number": "108", "question": "SNMPv3が、SNMPv1やSNMPv2cと比べて提供している追加のセキュリティ機能として正しいものを全て選びなさい。", "choices": ["A. メッセージの完全性", "B. 認証", "C. トラフィックの機密性", "D. アクセス制御"], "answer": ["A", "B", "C"], "explanation": "SNMPv3は、SNMPv1やSNMPv2cの抱えていたセキュリティ上の欠点を改善するために開発されたバージョンです。SNMPv3は、以下のセキュリティ機能を追加しました：\\n\\nメッセージの完全性（選択肢A）：メッセージが改ざんされていないことを保証します。SNMPv3は、各メッセージにメッセージ完全性コード（MIC）を含めることで、完全性を確保します。\\n認証（選択肢B）：メッセージの送信者が正当であることを検証します。SNMPv3は、ユーザー名/パスワードベースの認証メカニズムを提供します。\\nトラフィックの機密性（選択肢C）：SNMPメッセージを暗号化し、盗聴を防ぎます。SNMPv3は、DES、AES等の標準的な暗号アルゴリズムをサポートしています。\\n\\n\\nこれらの機能により、SNMPv3は、ネットワーク管理における強力なセキュリティを実現しました。特に、ネットワーク機器の設定情報など、機密性の高い情報を扱う際に有効です。\\n(RFC 3414, 3826等を参照)", "wrongReasons": "D：SNMPv3自体は、アクセス制御の機能を提供していません。SNMPv3の通信を特定のホストに制限するなどのアクセス制御は、ファイアウォールなどの別の仕組みで実現します。", "trap": "SNMPv3のセキュリティ機能は、完全性、認証、機密性の3つが中核です。これらは、SNMPv1/v2cにはなかった機能です。\\nただし、SNMPv3を使う場合でも、適切な認証情報（ユーザー名/パスワード）の管理、強力な暗号の選択など、運用面でのセキュリティ対策も忘れてはいけません。", "domain": "4"}, {"number": "109", "question": "ネットワークスイッチにおけるポートセキュリティの設定項目として、最も適切でないものを選びなさい。", "choices": ["A. MACアドレスの学習数の制限", "B. 特定のMACアドレスの許可", "C. VLANの割り当て", "D. 未知のMACアドレスの自動追加"], "answer": ["D"], "explanation": "ポートセキュリティは、ネットワークスイッチのポートに接続できるデバイスを制限するセキュリティ機能です。不正なデバイスの接続を防ぐことで、ネットワークの安全性を高めます。\\nポートセキュリティの一般的な設定項目は以下の通りです：\\n\\nMACアドレスの学習数の制限（選択肢A）：1つのポートで学習できるMACアドレスの数に上限を設けます。上限を超えると、ポートがシャットダウンされます。\\n特定のMACアドレスの許可（選択肢B）：ポートに接続を許可するMACアドレスを明示的に指定します。これ以外のMACアドレスの接続は拒否されます。\\nVLANの割り当て（選択肢C）：ポートセキュリティ違反が起きた際に、そのポートを特定のVLANに割り当てる（隔離VLAN等）ことができます。\\n\\n\\n一方、未知のMACアドレスの自動追加（選択肢D）は、ポートセキュリティの主旨に反します。未知のMACアドレスを自動的に許可リストに追加してしまうと、不正なデバイスの接続を許してしまう恐れがあります。\\n(参考：Cisco, \"Port Security\", ほか各社スイッチのマニュアル等)", "wrongReasons": "A, B, C：いずれもポートセキュリティの一般的な設定項目です。MACアドレスの学習数制限、特定MACアドレスの許可、VLAN割り当ては、いずれもポートへのアクセスを制御するために有効です。", "trap": "ポートセキュリティは、MACアドレスベースのアクセス制御が中心です。MACアドレスの学習や許可・拒否の設定が重要になります。\\n未知のMACアドレスは原則として拒否し、必要なMACアドレスのみを明示的に許可するのがポートセキュリティの基本的な考え方です。", "domain": "4"}, {"number": "110", "question": "DNSサーバーに対するDoS攻撃を防御するために実施すべき対策として最も適切なものはどれですか。", "choices": ["A. DNSサーバーのIPアドレスを定期的に変更する", "B. オープンリゾルバを構成し、キャッシュポイズニングを防止する", "C. DNSSEC（DNS Security Extensions）を導入する", "D. UDP/TCP port 53番宛のトラフィックを制限する"], "answer": ["D"], "explanation": "DNSサーバーは、名前解決の重要性から、DoS攻撃の格好の標的となります。攻撃者は、大量の名前解決要求を送りつけることで、DNSサーバーのリソースを枯渇させ、サービス不能状態に陥れようとします。\\nこの種の攻撃に対する最も効果的な防御策は、DNSサーバーへのトラフィックをフィルタリングし、制限することです（選択肢D）。具体的には、ファイアウォールやルーターのACLで、UDP/TCP port 53番（DNSで使用）宛のトラフィックを監視し、異常な量の要求を遮断します。\\nまた、DNSサーバー自体にレート制限の設定を行い、1つのIPアドレスからの要求数に上限を設けるのも有効です。これにより、特定の攻撃者がサーバーのリソースを独占することを防げます。\\nDoS攻撃は、サーバーの処理能力を上回る大量の要求で成立するため、トラフィック制御が最優先の対策になります。\\n(参考：NIST SP 800-81, \"Secure Domain Name System (DNS) Deployment Guide\")", "wrongReasons": "A：DNSサーバーのIPアドレスを変更しても、攻撃者がそのIPアドレスを知れば攻撃は継続可能です。根本的な解決にはなりません。\nB：オープンリゾルバ（外部のドメインの名前解決要求に応答するDNSサーバー）は、DDoS攻撃の踏み台にされるリスクがあります。キャッシュポイズニング（名前と IPアドレスの組み合わせを不正に書き換える攻撃）とDoS攻撃は別の問題です。\nC：DNSSEC は、名前解決の応答の完全性を保証し、改ざんを防ぐ技術です。DoS攻撃の防御とは直接関係がありません。", "trap": "DoS攻撃は、サーバーのリソース枯渇を狙う攻撃です。攻撃の規模（トラフィック量）を制御することが防御の鍵になります。\\nDNSSECは、DNSの応答の信頼性を高める重要な技術ですが、DoS攻撃とは別の脅威（改ざん）に対処するものです。両者を混同しないように注意が必要です。", "domain": "4"}, {"number": "111", "question": "次の選択肢のうち、ネットワーク監視ツールtcpdumpのパケットキャプチャ機能の説明として最も適切なものはどれですか。", "choices": ["A. ネットワーク上の全トラフィックをキャプチャし、Wireshark形式で保存する", "B. 指定したプロトコルやポート番号のパケットのみをキャプチャする", "C. パケットの内容をリアルタイムで変更し、送信元に返送する", "D. キャプチャしたパケットから自動的にネットワーク構成図を生成する"], "answer": ["B"], "explanation": "tcpdumpは、Unix/Linuxシステムで広く使われているネットワーク監視・トラブルシューティングツールです。その主な機能の一つが、ネットワークパケットのキャプチャ（収集）です。\\ntcpdumpは、指定したネットワークインターフェイス上を流れるパケットを収集し、その内容を表示したり、ファイルに保存したりできます。\\n重要な特徴は、キャプチャの対象を特定のプロトコル（TCP、UDP、ICMPなど）やポート番号（HTTP、DNS、SSHなど）に限定できることです（選択肢B）。これにより、分析に必要なパケットだけを効率的に収集できます。\\ntcpdumpの式（expression）を使うと、IPアドレス、プロトコル、ポート番号、パケット長などの条件を組み合わせて、柔軟にフィルタリングできます。\\nキャプチャしたパケットは、テキスト形式で表示したり、pcapファイルに保存してWiresharkなどの別ツールで詳細分析したりできます。\\n(参考：tcpdumpの man page等)", "wrongReasons": "A：tcpdumpは全トラフィックをキャプチャできますが、デフォルトはpcap形式です。Wireshark形式への変換は別途必要です。\nC：tcpdumpはパッシブな監視ツールで、パケットの内容を変更する機能はありません。\nD：tcpdumpはパケットキャプチャツールであり、ネットワーク構成図の自動生成機能はありません。", "trap": "tcpdumpは強力なフィルタリング機能を持ち、必要なパケットだけを収集できます。ただし、フィルタ式の書き方には一定の学習が必要です。\\ntcpdumpはパケットキャプチャが主目的のツールです。キャプチャしたデータの詳細分析は、Wiresharkなどの別ツールで行うのが一般的です。", "domain": "4"}, {"number": "112", "question": "SSHにおいて、サーバー認証に使われる暗号鍵は次のうちどれですか。", "choices": ["A. ユーザーの公開鍵", "B. ユーザーの秘密鍵", "C. ホストの公開鍵", "D. ホストの秘密鍵"], "answer": ["C"], "explanation": "SSHは、安全なリモートログインやファイル転送を実現するプロトコルです。SSHではサーバー認証とユーザー認証の2つの認証が行われますが、このうちサーバー認証には、ホスト（サーバー）の公開鍵が使われます（選択肢C）。\\nSSHのサーバー認証の流れは以下の通りです：\\n\\nクライアントがサーバーにSSH接続を要求する。\\nサーバーは自身の公開鍵をクライアントに送信する。\\nクライアントは、既知のホスト鍵データベース（~/.ssh/known_hosts）に保存されているサーバーの公開鍵と比較する。\\n鍵が一致すれば、サーバーの認証が成功する。\\n\\n\\nこのプロセスにより、クライアントは接続先のサーバーが正規のものであることを確認します。これは、中間者攻撃などによる偽のサーバーへの接続を防ぐ重要な認証です。\\n一方、ユーザー認証では、ユーザーの公開鍵（公開鍵認証の場合）やパスワードが使われます。\\n(RFC 4252, 4253等を参照)", "wrongReasons": "A, B：ユーザーの鍵ペア（公開鍵と秘密鍵）は、クライアント側のユーザー認証に使われるものであり、サーバー認証には使われません。\nD：ホストの秘密鍵は、サーバー上に保存され、公開鍵に対応する署名を生成するのに使われます。クライアントに送信されることはありません。", "trap": "SSHでは、サーバー認証とユーザー認証の両方が行われます。両者で使われる鍵の種類や役割が異なることを理解しておくことが重要です。\\nホストの公開鍵は、初回接続時にクライアントのknown_hostsファイルに保存されます。これにより、2回目以降の接続でサーバーの認証が自動的に行われます。", "domain": "4"}, {"number": "113", "question": "ファイアウォールのステートフルインスペクションについて、正しい記述を全て選びなさい。", "choices": ["A. パケットのペイロードを検査し、攻撃のシグネチャを検知できる", "B. 確立済みのセッションに属するパケットを追跡できる", "C. OSI参照モデルのアプリケーション層で動作する", "D. 3ウェイハンドシェイクを監視し、不正なセッションの確立を防げる"], "answer": ["B", "D"], "explanation": "ステートフルインスペクションは、現代のファイアウォールに不可欠の機能です。従来のパケットフィルタリングが個々のパケットを独立に検査するのに対し、ステートフルインスペクションは、パケットの文脈（状態）を考慮します。\\nステートフルインスペクションの主な特徴は以下の2つです：\\n\\n確立済みのセッションに属するパケットを追跡できる（選択肢B）：ステートフルファイアウォールは、TCPの3ウェイハンドシェイクを監視し、確立されたセッションの状態を記憶します。これにより、そのセッションに属する後続のパケットを、個別のルールチェックなしで通過させることができます。\\n3ウェイハンドシェイクを監視し、不正なセッションの確立を防げる（選択肢D）：ステートフルファイアウォールは、TCPセッションの確立過程を追跡します。SYNパケットに対する適切なSYN-ACKの返信がない場合など、不正なセッション確立の試みを検知し、ブロックできます。\\n\\n\\nこれらの機能により、ステートフルインスペクションは、ステートレスなパケットフィルタリングと比べ、よりセキュアで効率的なトラフィック制御を実現します。\\n(参考：W. R. Cheswick et al., \"Firewalls and Internet Security: Repelling the Wily Hacker\", 2nd ed., Addison-Wesley, 2003. 等)", "wrongReasons": "A：パケットのペイロード検査は、主にIDSやIPSの機能です。ステートフルファイアウォールは通常、ペイロードの詳細な分析は行いません。\nC：ステートフルインスペクションは、主にOSI参照モデルのトランスポート層（TCP、UDPなど）とネットワーク層（IP）で動作します。アプリケーション層の詳細な分析は行いません。", "trap": "ステートフルインスペクションの主眼は、セッションの状態管理にあります。個々のパケットの内容を詳細に検査するのではなく、セッションのコンテキストに基づいてトラフィックを制御します。\\nステートフルインスペクションは、TCPセッションの追跡に特に有効ですが、UDPやICMPなどのコネクションレスプロトコルにも一定の状態管理を適用できます。", "domain": "4"}, {"number": "114", "question": "DHCP（Dynamic Host Configuration Protocol）の動作について、誤っている記述はどれですか。", "choices": ["A. クライアントは、DHCPディスカバリメッセージをブロードキャストで送信する", "B. DHCPサーバーは、DHCPオファーメッセージをユニキャストで応答する", "C. クライアントは、DHCPリクエストメッセージをブロードキャストで送信する", "D. DHCPサーバーは、DHCPACKメッセージをブロードキャストで応答する"], "answer": ["B"], "explanation": "DHCPは、IPネットワークにおいて、クライアントにIPアドレスを動的に割り当てるためのプロトコルです。DHCPの基本的な動作は以下の4つのステップからなります：\\n\\nDHCP Discover：クライアントがDHCPサーバーを探すために、DHCPディスカバリメッセージをブロードキャストで送信する（選択肢A）。\\nDHCP Offer：DHCPディスカバリを受信したDHCPサーバーは、クライアントに割り当て可能なIPアドレスの情報を含むDHCPオファーメッセージを、ブロードキャストで応答する（選択肢B）。\\nDHCP Request：クライアントは、受け取ったDHCPオファーの中から1つを選択し、そのオファーを受け入れるためのDHCPリクエストメッセージをブロードキャストで送信する（選択肢C）。\\nDHCP Acknowledgement（ACK）：選択されたDHCPサーバーは、クライアントにIPアドレスを正式に割り当てることを確認するため、DHCPACKメッセージをユニキャストで送信する（選択肢D）。\\n\\n\\nこのように、DHCPの動作では、DHCPオファーメッセージ以外は全てブロードキャストで通信が行われます。\\n(RFC 2131等を参照)", "wrongReasons": "B：DHCPオファーメッセージは、DHCPサーバーからクライアントへのブロードキャスト通信です。ユニキャストではありません。", "trap": "DHCPでは、クライアントがサーバーを発見するフェーズ（DHCP Discover）と、クライアントがオファーを受け入れるフェーズ（DHCP Request）でブロードキャストが使われます。\\n一方、サーバーがオファーを提示するフェーズ（DHCP Offer）と、IPアドレスの割り当てを確定するフェーズ（DHCP ACK）ではブロードキャストが使われます。この違いを正確に理解することが重要です。", "domain": "4"}, {"number": "115", "question": "OSI参照モデルにおいて、ホップ間のデータの受け渡しを担当する層はどれですか。", "choices": ["A. アプリケーション層", "B. トランスポート層", "C. ネットワーク層", "D. データリンク層"], "answer": ["D"], "explanation": "OSI参照モデルは、ネットワーク通信を7つの階層（層）に分割したモデルです。各層は特定の機能を担当し、隣接する層との間でサービスのやり取りを行います。\\nこのうち、ホップ間（隣接するノード間）のデータの受け渡しを担当するのは、データリンク層（第2層）です（選択肢D）。\\nデータリンク層の主な機能は以下の通りです：\\n\\nフレーミング：上位層から受け取ったデータを、フレームという単位にまとめる。\\nアドレッシング：MACアドレスを使って、同一ネットワーク内の宛先を指定する。\\nエラー制御：伝送エラーの検出と、必要に応じた再送要求。\\nフロー制御：送信側と受信側の速度差を調整する。\\nアクセス制御：共有メディアへのアクセスを制御する。\\n\\nこのように、データリンク層は、物理層で接続された隣接ノード間のデータ転送を、信頼性高く効率的に行うための機能を提供します。\\n一方、エンドツーエンドのデータ転送の信頼性はトランスポート層が、経路選択はネットワーク層が、アプリケーション間の通信はアプリケーション層が、それぞれ担当します。\\n(ISO/IEC 7498-1, \"Information technology - Open Systems Interconnection - Basic Reference Model: The Basic Model\" 等を参照)", "wrongReasons": "A：アプリケーション層は、アプリケーション間の通信（データの意味や同期など）を担当します。\nB：トランスポート層は、エンドツーエンドのデータ転送の信頼性を担当します。\nC：ネットワーク層は、パケットの経路選択（ルーティング）を担当します。", "trap": "OSI参照モデルの各層の役割を正確に理解することが重要です。特に、トランスポート層とデータリンク層の違いを明確に捉えておく必要があります。\\nトランスポート層は、エンドツーエンドの信頼性を担保します。一方、データリンク層は、隣接ノード間の信頼性を担保します。両者は、信頼性を確保する範囲が異なります。", "domain": "4"}, {"number": "116", "question": "次の選択肢のうち、ポートスキャンの手法として正しいものを全て選びなさい。", "choices": ["A. TCPコネクトスキャン", "B. TCPシーケンススキャン", "C. UDPスキャン", "D. ICMPスキャン"], "answer": ["A", "C"], "explanation": "ポートスキャンは、ターゲットシステムの開いているポートを特定するために使用されるテクニックです。攻撃者はこの技法を使って、潜在的な脆弱性を探索します。主なポートスキャンの手法には以下のようなものがあります：\\n\\nTCPコネクトスキャン（選択肢A）：スキャナがターゲットポートへのTCP接続を試み、接続が成功すれば、そのポートが開いていると判断します。最も基本的で確実なスキャン方法ですが、ログに残りやすいという欠点があります。\\nUDPスキャン（選択肢C）：スキャナがターゲットポートにUDPパケットを送信し、ICMPポート到達不能エラーが返ってこなければ、そのポートが開いていると判断します。UDPはコネクションレス型なので、スキャンが難しい場合があります。\\n\\n\\nこれらの他にも、TCP SYNスキャン（半開きスキャン）、TCP FINスキャン（ステルススキャン）など、様々な亜種があります。\\nポートスキャンは、システムの脆弱性診断などの正当な目的でも使われますが、攻撃の予備調査として使われることも多いため、注意が必要です。防御側としては、不要なポートを開きっぱなしにしない、パケットフィルタリングを適切に設定するなどの対策が重要です。\\n(参考：G. Lyon, \"Nmap Network Scanning: The Official Nmap Project Guide to Network Discovery and Security Scanning\", Nmap Project, 2009. 等)", "wrongReasons": "B：TCPシーケンススキャンは存在しません。TCPシーケンス番号を使った攻撃としては、TCP SEQUENCEプレディクション攻撃などがありますが、これはポートスキャンとは異なります。\nD：ICMPスキャンは、一般的にはポートスキャンの手法とはみなされません。ICMPエコー要求（ping）を使ってシステムの到達可能性を確認することはありますが、ポートの開閉状態は確認できません。", "trap": "ポートスキャンの手法は多岐にわたり、TCP、UDPなどのプロトコルごとに異なるアプローチが取られます。それぞれの特性を理解しておくことが重要です。\\nポートスキャンは、それ自体が直接的な攻撃ではありませんが、攻撃の準備段階として使われることが多いため、セキュリティ管理者は注意深く監視する必要があります。", "domain": "4"}, {"number": "117", "question": "ARPスプーフィング攻撃を防御するための対策として、最も効果的なのはどれですか。", "choices": ["A. MACアドレスフィルタリングの実装", "B. IPアドレスフィルタリングの実装", "C. ポートセキュリティの設定", "D. ダイナミックARPインスペクションの有効化"], "answer": ["D"], "explanation": "ARPスプーフィング（ARP詐称）は、攻撃者が偽のARP応答を送信することで、ターゲットのARPキャッシュを改ざんし、中間者攻撃（MITM）を仕掛ける手法です。\\nこの攻撃を防御するための最も効果的な対策は、スイッチ上でダイナミックARPインスペクション（DAI）を有効化することです（選択肢D）。\\nDAIは、スイッチが ARP パケットを検査し、正当な ARP バインディング（IP アドレスと MAC アドレスの対応関係）のみを転送する機能です。具体的には以下のような処理を行います：\\n\\nDHCPスヌーピングバインディングテーブルや、手動で設定されたARPアクセスコントロールリスト（ACL）を信頼できるバインディング情報として使用する。\\n信頼できないポートから受信した ARP パケットを、バインディング情報と比較検証する。\\n無効なARPパケットはドロップし、有効なパケットのみを転送する。\\n必要に応じて、無効パケットのログを記録する。\\n\\n\\nこのようにDAIは、偽のARP応答が実際にホストに到達する前にスイッチ上で除去するため、ARPキャッシュの改ざんを効果的に防止できます。\\n(参考：Cisco, \"Catalyst 6500 Release 12.2SX Software Configuration Guide\", Chapter: \"Dynamic ARP Inspection\" 等)", "wrongReasons": "A：MACアドレスフィルタリングは、許可されたMACアドレスのみがネットワークに接続できるようにする機能です。ARPスプーフィングを直接防止するものではありません。\nB：IPアドレスフィルタリングは、許可されたIPアドレスのみがネットワークに接続できるようにする機能です。ARPスプーフィングを直接防止するものではありません。\nC：ポートセキュリティは、許可されたMACアドレスのみがスイッチポートに接続できるようにする機能です。ARPレベルの攻撃は防げません。", "trap": "ARPスプーフィング攻撃は、イーサネットレベル（第2層）で行われる攻撃です。したがって、その対策もスイッチなどのイーサネットレベルで行う必要があります。\\nDAIは、DHCPスヌーピングと連携させることで、より強固な防御が可能になります。DHCPスヌーピングにより、正当なIPアドレスとMACアドレスの対応関係を動的に学習できるからです。", "domain": "4"}, {"number": "118", "question": "クライアント−サーバー間の通信を暗号化するSSL/TLSにおいて、使用する共通鍵を安全に共有するために用いられる暗号技術はどれですか。", "choices": ["A. RSA", "B. AES", "C. DH", "D. SHA"], "answer": ["C"], "explanation": "SSL/TLSは、クライアントとサーバー間の通信を暗号化し、プライバシーと完全性を提供するプロトコルです。SSL/TLSでは、実際の通信の暗号化に共通鍵暗号方式（対称鍵暗号方式）を使用します。\\n共通鍵暗号方式は、暗号化と復号に同じ鍵を使用します。この鍵をクライアントとサーバーの間で安全に共有する必要があります。しかし、共通鍵自体を通信路上で直接送ることは安全ではありません。\\nそこでSSL/TLSでは、DHアルゴリズム（Diffie-Hellman鍵交換）を使って、共通鍵を安全に生成・共有します（選択肢C）。\\nDHは、公開鍵暗号方式の一種で、二者が安全でない通信路上で共通の秘密鍵を共有することを可能にします。DHでは、二者がそれぞれ公開値を交換し、それと自身の秘密値から共通の秘密鍵を計算します。この過程で、第三者が秘密鍵を知ることは（離散対数問題の困難性により）計算上困難です。\\nSSL/TLSでは、クライアントとサーバーがDHを使って共通鍵（プリマスターシークレット）を生成し、それをもとにセッション鍵を導出します。このセッション鍵が、実際の通信の暗号化に使われる共通鍵となります。\\n(RFC 2631, \"Diffie-Hellman Key Agreement Method\" 等を参照)", "wrongReasons": "A：RSAは公開鍵暗号方式の一つですが、SSL/TLSでは主にサーバー認証（サーバー証明書の検証）とキー交換（DHの代替）に使われます。共通鍵の共有が主目的ではありません。\nB：AESは共通鍵暗号方式の一つで、SSL/TLSではメッセージの暗号化に使われますが、鍵共有の手段ではありません。\nD：SHAはハッシュ関数の一つで、SSL/TLSではメッセージ認証（MAC）に使われますが、鍵共有の手段ではありません。", "trap": "SSL/TLSでは、公開鍵暗号方式（RSA、DH）と共通鍵暗号方式（AES、ChaCha20）が組み合わせて使われます。それぞれの役割を正しく理解することが重要です。\\nSSL/TLSのキー交換では、DHの他にRSAも使われることがあります。RSAキー交換では、クライアントが生成した共通鍵をサーバーの公開鍵で暗号化して送信します。ただし、PFS（Forward Secrecy）の観点からはDHが好ましいとされています。", "domain": "4"}, {"number": "119", "question": "SSHのサーバー認証で使われる公開鍵暗号方式について、正しい説明を選びなさい。", "choices": ["A. サーバーの公開鍵を使って、クライアントがセッション鍵を暗号化して送信する", "B. サーバーの秘密鍵を使って、クライアントがセッション鍵を復号する", "C. サーバーの公開鍵を使って、サーバーが自身の身元を証明する", "D. サーバーの秘密鍵を使って、クライアントが自身の身元を証明する"], "answer": ["C"], "explanation": "SSHは、リモートコンピュータにセキュアにログインし、コマンドを実行するためのプロトコルです。SSHでは、通信の暗号化だけでなく、サーバー認証とユーザー認証も行われます。\\nサーバー認証は、クライアントが接続先のサーバーが正規のものであることを確認するプロセスです。これにより、中間者攻撃などによる偽のサーバーへの接続を防ぎます。\\nSSHのサーバー認証では、公開鍵暗号方式（通常はRSA）が使われます。具体的には、以下のようなステップで行われます：\\n\\nサーバーは、自身の公開鍵をクライアントに送信する。\\nクライアントは、既知のホスト鍵（known_hosts）と受信した公開鍵を比較する。\\n鍵が一致すれば、サーバーの身元が確認されたとみなされる。\\n\\n\\nつまり、サーバーは自身の秘密鍵に対応する公開鍵を証明書のように使って、自身の身元を証明するのです（選択肢C）。\\n一方、ユーザー認証では、クライアント（ユーザー）の身元確認が行われます。これには、パスワード認証や公開鍵認証などの方法が使われます。\\n(RFC 4253, \"The Secure Shell (SSH) Transport Layer Protocol\" 等を参照)", "wrongReasons": "A, B：SSHのサーバー認証では、セッション鍵の交換は行われません。セッション鍵の交換は、サーバー認証の後に行われます。\nD：サーバーの秘密鍵は、サーバー自身の身元証明に使われるものであり、クライアントの身元証明には使われません。", "trap": "SSHのサーバー認証とユーザー認証は、別のフェーズで行われ、使われる鍵も異なります。両者を混同しないようにすることが大切です。\\nサーバー認証では、サーバーの公開鍵がクライアントに送られます。一方、ユーザー認証（公開鍵認証の場合）では、ユーザー（クライアント）の公開鍵がサーバーに送られます。", "domain": "4"}, {"number": "120", "question": "無線LANにおけるプローブリクエストの役割として最も適切なものはどれですか。", "choices": ["A. アクセスポイントがクライアントの存在を検出する", "B. クライアントがアクセスポイントの存在を検出する", "C. アクセスポイントがビーコンフレームを送信する", "D. クライアントがアソシエーションリクエストを送信する"], "answer": ["B"], "explanation": "無線LANでは、クライアント（ステーション）とアクセスポイント（AP）が無線で接続されます。この接続プロセスには、いくつかのステップがあります。\\nその中で、プローブリクエストは、クライアントがAPを発見するために使うフレームです（選択肢B）。具体的には、以下のような流れになります：\\n\\nクライアントは、プローブリクエストフレームをブロードキャストする。このフレームには、クライアントが接続を希望するSSID（ネットワーク名）が含まれている。\\n範囲内のAPは、自身のSSIDとプローブリクエストのSSIDが一致すれば、プローブレスポンスフレームを返信する。このフレームには、APの情報（SSIDやサポートされる速度など）が含まれる。\\nクライアントは、受信したプローブレスポンスの中から、接続するAPを選択する。\\n\\n\\nつまり、プローブリクエストは、クライアントがAPを積極的に探すために使うフレームなのです。\\n一方、APはビーコンフレームを定期的にブロードキャストし、自身の存在を知らせます。クライアントは、このビーコンフレームを受動的に受信することでも、APを発見できます。\\n(IEEE 802.11, \"Wireless LAN Medium Access Control (MAC) and Physical Layer (PHY) Specifications\" 等を参照)", "wrongReasons": "A：プローブリクエストは、クライアントからAPに向けて送信されるフレームであり、APがクライアントを検出するために使われるものではありません。\nC：ビーコンフレームは、APが定期的にブロードキャストするフレームであり、プローブリクエストとは異なります。\nD：アソシエーションリクエストは、クライアントが接続するAPを決定した後に、そのAPに接続を要求するために送信するフレームです。APの発見が目的ではありません。", "trap": "プローブリクエストとビーコンフレームは、どちらもAPの発見に関係しますが、その役割は異なります。プローブリクエストはクライアント主導、ビーコンフレームはAP主導の発見方式だと言えます。\\nプローブリクエストは、接続するSSIDが決まっている場合に使われます。一方、SSIDが未定の場合は、ブロードキャストプローブリクエスト（SSID=\"ANY\"）を使って、すべてのAPを発見することもできます。", "domain": "4"}, {"number": "121", "question": "IPsecのトンネルモードで使用されるセキュリティプロトコルのうち、データの機密性を提供するのはどれですか。", "choices": ["A. AH", "B. ESP", "C. IKE", "D. SA"], "answer": ["B"], "explanation": "IPsecのトンネルモードでは、元のIPパケット全体が暗号化され、新しいIPヘッダが付加されます。この暗号化はESP（Encapsulating Security Payload）プロトコルによって行われます。ESPは、データの機密性、完全性、真正性を提供しますが、中でも機密性（暗号化）が主要な機能です。トンネルモードでは、IPヘッダを含むパケット全体が保護されるため、通信経路上の傍受者には通信の内容が一切わかりません。\\n(RFC 4303, \"IP Encapsulating Security Payload (ESP)\" 等を参照)", "wrongReasons": "A：AHは認証ヘッダ（Authentication Header）の略で、IPパケットの完全性と真正性は提供しますが、機密性（暗号化）は提供しません。\nC：IKEはインターネットキー交換（Internet Key Exchange）の略で、IPsec SAの確立に使われるプロトコルです。データの暗号化は行いません。\nD：SAはセキュリティアソシエーション（Security Association）の略で、IPsecの論理的な接続を表す概念です。プロトコルの名称ではありません。", "trap": "IPsecではAHとESPの2つのセキュリティプロトコルが使われますが、機密性の提供はESPの独壇場です。AHは完全性と真正性の提供に特化しています。また、IKEはIPsecの鍵交換を担うプロトコルで、データ保護とは直接関係ありません。SAはプロトコルの名称ではなく、IPsecの接続を表す概念です。IPsecの各要素の役割を正しく理解することが重要です。", "domain": "4"}, {"number": "122", "question": "SSLサーバー証明書の検証において、クライアントが行う処理として正しいものを全て選びなさい。", "choices": ["A. 証明書の有効期限の確認", "B. 証明書のバージョン番号の確認", "C. 証明書の失効状態の確認", "D. 証明書のシリアル番号の確認"], "answer": ["A", "C"], "explanation": "SSLサーバー証明書は、WebサーバーのドメインとそのWebサーバーの公開鍵を紐付けるために使われます。クライアント（Webブラウザ）は、この証明書を検証することで、接続先のWebサーバーが正規のものであることを確認します。この検証プロセスには、以下の主要なステップが含まれます：\\n\\n証明書の有効期限の確認（選択肢A）：証明書には、発行日と有効期限が記載されています。クライアントは、現在の日時がこの有効期間内にあることを確認します。有効期限切れの証明書は、信頼できません。\\n証明書の失効状態の確認（選択肢C）：証明書は、何らかの理由（秘密鍵の漏洩など）で期限前に無効化されることがあります。クライアントは、証明書失効リスト（CRL）やOCSP（Online Certificate Status Protocol）を使って、証明書が失効していないことを確認します。\\n\\nこれらの確認に加えて、証明書の署名の検証（発行者の公開鍵を使って署名を検証）、証明書チェーンの検証（ルート証明書までの信頼の連鎖を確認）なども行われます。これらの検証をすべて通過した証明書のみが、信頼できるものとみなされます。\\n(RFC 5280, \"Internet X.509 Public Key Infrastructure Certificate and Certificate Revocation List (CRL) Profile\" 等を参照)", "wrongReasons": "B：証明書のバージョン番号は、証明書のフォーマットのバージョンを表します。通常はv3が使われています。バージョン番号自体は、証明書の信頼性とは直接関係ありません。\nD：証明書のシリアル番号は、発行者が証明書に割り当てる一意の番号です。この番号は、証明書を一意に識別するために使われますが、クライアントが検証する必要はありません。", "trap": "SSLサーバー証明書の検証では、有効期限と失効状態の確認が特に重要です。有効期限は証明書自体に記載されていますが、失効状態はCRLやOCSPを使って別途確認する必要があります。また、証明書のバージョン番号やシリアル番号は、証明書の管理上は重要ですが、クライアントが検証する必要はありません。証明書の各フィールドの意味と、検証プロセスにおける重要性を理解することが大切です。", "domain": "4"}, {"number": "123", "question": "DNSキャッシュポイズニングの説明として最も適切なものはどれですか。", "choices": ["A. DNSクエリに対して偽の応答を返し、DNSキャッシュを汚染する攻撃", "B. DNSサーバーに大量のクエリを送信し、そのリソースを枯渇させる攻撃", "C. DNSサーバーの脆弱性を利用して、権限昇格を図る攻撃", "D. DNSクエリを傍受し、機密情報を取得する攻撃"], "answer": ["A"], "explanation": "DNSキャッシュポイズニングは、DNS（Domain Name System）の仕組みを悪用した攻撃手法の一つです。攻撃者は、DNSクエリに対して偽の応答（偽のIPアドレス情報）を返すことで、DNSサーバーのキャッシュを汚染（ポイズニング）します（選択肢A）。\\n攻撃の流れは以下のようになります：\\n\\n攻撃者は、ターゲットとなるDNSサーバーに、特定のドメイン名の名前解決を要求するDNSクエリを送信します。\\n同時に、攻撃者は、そのクエリに対する偽の応答を、DNSサーバーに向けて大量に送信します。偽の応答には、ドメイン名に対応する偽のIPアドレス（攻撃者が管理するサーバーのIPアドレスなど）が含まれています。\\nDNSサーバーは、正規の応答と攻撃者からの偽の応答を受信します。タイミングと運が良ければ、偽の応答が正規の応答よりも先に到着し、DNSサーバーのキャッシュに保存されます。\\nその後、このDNSサーバーに同じドメイン名の名前解決が要求されると、汚染されたキャッシュ情報（偽のIPアドレス）が返されます。\\n\\nその結果、そのドメイン名に対応するWebサイトなどに接続しようとするユーザーが、攻撃者のサーバーに誘導されてしまいます。これにより、機密情報の盗聴やフィッシングなどの二次的な攻撃につながる可能性があります。\\nDNSキャッシュポイズニングを防ぐには、DNSSECの導入、ソースポートランダム化、トランザクションIDの乱数化など、様々な対策が行われています。\\n(Steven M. Bellovin, \"Using the Domain Name System for System Break-Ins\", Proceedings of the Fifth Usenix Unix Security Symposium, 1995. 等を参照)", "wrongReasons": "B：DNSサーバーに大量のクエリを送信する攻撃は、DNSに対するDoS攻撃（DNS水責め攻撃）に該当します。キャッシュポイズニングとは異なります。\nC：DNSサーバーの脆弱性を利用した権限昇格は、DNSサーバーそのものへの攻撃であり、キャッシュポイズニングとは異なる概念です。\nD：DNSクエリの傍受は、DNSプロトコルが基本的に平文で通信を行うことを利用した攻撃（盗聴）です。キャッシュを汚染する攻撃ではありません。", "trap": "DNSキャッシュポイズニングは、DNSの仕組みを悪用した攻撃ですが、DNSそのものの脆弱性を突くものではありません。あくまで、DNSの問い合わせと応答のプロセスにおいて、偽の情報を注入する手法です。また、DNSに対する他の攻撃（DoS攻撃や盗聴など）とも混同しやすいポイントです。攻撃の目的と手法の違いを正確に理解することが重要です。", "domain": "4"}, {"number": "124", "question": "DHCPスプーフィング攻撃を防御するために、スイッチ上で有効化すべき機能はどれですか。", "choices": ["A. ポートセキュリティ", "B. DAI（Dynamic ARP Inspection）", "C. DHCP Snooping", "D. ルートガード"], "answer": ["C"], "explanation": "DHCPスプーフィング攻撃は、攻撃者が偽のDHCPサーバーを設置し、正規のDHCPサーバーになりすまして、クライアントに偽の設定情報（IPアドレス、デフォルトゲートウェイなど）を提供する攻撃です。これにより、クライアントのトラフィックを傍受したり、特定のサーバーへ誘導したりすることができます。\\nこの攻撃を防御するには、スイッチ上でDHCP Snoopingを有効化することが有効です（選択肢C）。DHCP Snoopingは、スイッチが、ポート単位でDHCPメッセージを監視し、フィルタリングする機能です。具体的には以下のような処理を行います：\\n\\n信頼済みポート（正規のDHCPサーバーが接続されているポート）とそれ以外の非信頼ポートを設定する。\\n非信頼ポートで受信したDHCPサーバーメッセージ（DHCPOFFER, DHCPACK, DHCPNAK）はドロップする。\\n非信頼ポートで受信したDHCPクライアントメッセージ（DHCPDISCOVER, DHCPREQUEST, DHCPDECLINE, DHCPRELEASE, DHCPINFORM）は、信頼済みポートにだけ転送する。\\n信頼済みポートで受信したDHCPサーバーメッセージは、対応する非信頼ポートにだけ転送する。\\nDHCPスヌーピングバインディングテーブルを構築し、クライアントのIPアドレスとMACアドレスの対応関係を記録する。\\n\\nこのようにDHCP Snoopingは、偽のDHCPサーバーからのメッセージを遮断し、正規のDHCPサーバーからのメッセージだけをクライアントに届けることで、DHCPスプーフィング攻撃を防ぎます。\\n(Cisco, \"Catalyst 2960 and 2960-S Switch Software Configuration Guide, 12.2(53)SE\", Chapter: \"Configuring DHCP Features and IP Source Guard\" 等を参照)", "wrongReasons": "A：ポートセキュリティは、MACアドレスベースでポートへのアクセスを制限する機能です。DHCPスプーフィングとは直接関係ありません。\nB：DAIは、ARPスプーフィング攻撃を防御するための機能です。DHCPスプーフィングには効果がありません。\nD：ルートガードは、スパニングツリープロトコル（STP）に関連する機能で、ルートブリッジの不正な変更を防ぎます。DHCPスプーフィングとは関係ありません。", "trap": "DHCP Snoopingは、DHCPスプーフィング攻撃に特化した防御機能です。他のスプーフィング攻撃（ARPスプーフィングなど）や、他の種類のネットワーク攻撃とは、防御の仕組みが異なります。また、DHCP Snoopingは、ポートの信頼状態の設定が重要なポイントです。信頼済みポートの設定を誤ると、正規のDHCPサーバーの動作が妨げられてしまいます。DHCP Snoopingの設定には、ネットワークの構成を正しく理解することが不可欠です。", "domain": "4"}, {"number": "125", "question": "IEEE 802.1Xにおけるクライアントの認証方式として、正しいものを全て選びなさい。", "choices": ["A. PAP", "B. CHAP", "C. EAP-MD5", "D. EAP-TLS"], "answer": ["C", "D"], "explanation": "IEEE 802.1Xは、LANやWLANにおけるポートベースのアクセス制御の標準規格です。802.1Xでは、クライアント（サプリカント）が認証サーバー（一般にRADIUS）に対して認証を行い、認証に成功した場合にのみ、ネットワークへのアクセスが許可されます。\\n802.1Xの認証プロセスでは、EAP（Extensible Authentication Protocol）が使用されます。EAPは、様々な認証方式をサポートする認証フレームワークで、802.1Xではその中の特定の方式が使用されます。802.1Xでよく使われるEAP方式には以下のようなものがあります：\\n\\nEAP-MD5（選択肢C）：チャレンジ-レスポンス方式の認証プロトコル。MD5ハッシュを使用。脆弱性が知られているため、現在はあまり使われない。\\nEAP-TLS（選択肢D）：クライアントとサーバー双方の証明書を使った相互認証方式。セキュリティは高いが、証明書の管理が必要。\\nPEAP（Protected EAP）：サーバーのみの証明書を使った認証方式。EAP-MSCHAPv2などの内部認証方式と組み合わせて使う。\\nEAP-TTLS（EAP-Tunneled TLS）：PEAPと同様、サーバー証明書を使った認証方式。PAPやCHAPなどの従来の認証プロトコルを内部で使える。\\n\\nこのように802.1Xでは、EAPを使った様々な認証方式が利用可能です。その中でも特にEAP-TLSは、相互認証による高いセキュリティが特徴です。\\n(IEEE 802.1X-2010, \"Port-Based Network Access Control\" 等を参照)", "wrongReasons": "A：PAPは、平文でパスワードを送信する古い認証プロトコルで、802.1Xでは一般的に使われません。\nB：CHAPは、チャレンジ-レスポンス方式の認証プロトコルですが、802.1Xでは一般的に使われません。ただし、PEAPやEAP-TTLSの内部認証方式としては使われることがあります。", "trap": "802.1Xの認証方式は、EAPを使ったものが中心です。EAPは、それ自体が認証プロトコルではなく、様々な認証方式を包含する認証フレームワークであることを理解することが重要です。また、EAP-MD5とEAP-TLSの違い（片方向認証 vs 相互認証）や、PEAPとEAP-TTLSの違い（内部認証方式の選択肢）なども、ポイントとなります。802.1Xの認証方式の選択には、セキュリティ要件と運用管理のバランスを考慮することが必要です。", "domain": "4"}, {"number": "126", "question": "組織で導入すべき物理的アクセス制御の要素として、最も適切なものはどれか。", "choices": ["A. 監視カメラによる記録", "B. 警備員による巡回", "C. 生体認証システム", "D. 上記すべて"], "answer": ["D"], "explanation": "物理的アクセス制御において、監視カメラによる記録、警備員による巡回、生体認証システムはいずれも重要な要素である。\\n\\n監視カメラは、不正アクセスの抑止力となり、事後の調査にも役立つ（NIST SP 800-53 PE-6）。\\n警備員の巡回は、不審者の発見や緊急時の迅速な対応を可能にする（ISO/IEC 27002 11.1.2）。\\n生体認証は、なりすまし防止に有効な高度なアクセス制御技術である（ISO/IEC 27002 11.1.1）。\\n\\nこれら3つの要素を組み合わせることで、Defense-in-Depthの考え方に基づく多層防御の物理セキュリティ対策が実現できる。", "wrongReasons": "なし", "trap": "なし", "domain": "5"}, {"number": "127", "question": "ネットワーク認証プロトコルの特徴として、最も適切でないものはどれか。", "choices": ["A. KerberosはWindows環境で標準的に使用される", "B. RADIUS はリモートユーザーの中央集中認証を可能とする", "C. TACACS+は最新のAAAプロトコルである", "D. SAMLは異なるドメイン間でのシングルサインオンを実現する"], "answer": ["C"], "explanation": "Kerberosは、Windowsのドメイン環境で標準的に使用される認証プロトコルである（RFC 4120）。\\nRADIUSは、ネットワーク機器との認証連携に用いられ、リモートユーザーの中央集中認証を可能とする（RFC 2865）。\\nSAMLは、異なるドメイン間でのシングルサインオンを実現するためのXMLベースの標準規格である（OASIS SAML）。\\n\\n一方、TACACS+は最新のAAAプロトコルではなく、むしろRADIUSの前身にあたるプロトコルである。最新のAAAプロトコルはDiameterである（RFC 6733）。", "wrongReasons": "C：TACACS+は最新のAAAプロトコルではなく、RADIUSの前身にあたるレガシーなプロトコルである。", "trap": "TACACS+とRADIUSの登場順序や特徴の違いについて混同しやすい。最新のプロトコルはDiameterであることを覚えておく。", "domain": "5"}, {"number": "128", "question": "シングルサインオン（SSO）に関する説明として最も適切でないものを選べ。", "choices": ["A. ユーザーは複数のシステムを1つの認証情報で利用できる", "B. 認証処理の一元化により管理コストが削減できる", "C. システム障害の影響範囲が局所化される", "D. IDプロビジョニングと連携して導入されることが多い"], "answer": ["C"], "explanation": "SSOでは、ユーザーは1組のID/パスワードで複数のシステムにアクセス可能となり利便性が向上する。\\n管理者は認証基盤の一元管理により、アカウント管理の手間やコストを大幅に削減できる（NIST SP 800-63）。\\nまた、プロビジョニングシステムと連携することで、アカウントのライフサイクル管理も自動化しやすくなる（ISO/IEC 27002 9.2.1）。\\n一方、認証基盤の集中化は単一障害点にもなり得る。SSOシステムに障害が発生すると、連携する複数のシステムに影響が及ぶリスクがある。そのため、SSOの導入はむしろ「障害の影響範囲を局所化する」効果はない。", "wrongReasons": "C：SSOシステムの障害は、連携する複数システムに影響が波及するため、「障害の影響範囲を局所化」とは言えない。むしろ、障害の影響が広範囲に及ぶリスクがある。", "trap": "SSOのメリットと、集中管理ゆえのリスクの両面を理解しておく必要がある。障害影響の局所化は分散システムの利点であり、SSOの利点とは言えない。", "domain": "5"}, {"number": "129", "question": "特権ID管理で実施すべき事項として、最も適切でないものはどれか。", "choices": ["A. 特権IDの利用状況を常時監視し、不審な兆候を検知する", "B. 特権の付与は職務上の必要性に基づいて最小限にとどめる", "C. 共有アカウントは原則禁止して、全て個人に紐づけて管理する", "D. 特権IDの払い出しはサービスデスクに一任する"], "answer": ["D"], "explanation": "特権IDは強力な権限を持つため、細心の注意を払って管理する必要がある。\\n\\n特権IDの利用状況は常時監視し、兆候を検知することが重要である（NIST SP 800-53 AC-6）。\\n最小権限の原則に基づき、付与する特権は必要最小限に抑えるべきである（ISO/IEC 27002 9.2.2）。\\n共有アカウントは責任の所在が曖昧になるため原則禁止し、特権IDは個人に紐づけて管理することが望ましい（PCI DSS 8.5）。\\n\\n一方、特権IDの作成・削除等の管理はサービスデスクに委ねるべきではない。機密性の高い特権IDのライフサイクル管理は、十分な知識と権限を持った管理者が慎重に行うべき事項である。", "wrongReasons": "D：特権IDの管理は慎重に行うべきものであり、単にサービスデスクに一任するのは不適切である。経営層の承認を得たうえで、十分な知識を持つ特権管理者が実施するのが望ましい。", "trap": "特権IDの管理における「セキュリティ」と「利便性」のトレードオフに注意が必要である。リスクを最小化するためには、サービスデスクのような一般部門への委任は避けるべきである。", "domain": "5"}, {"number": "130", "question": "従業員のアクセス権限の再評価（アクセスレビュー）の実施が強く推奨される契機として、最も適切なのはどれか。", "choices": ["A. 新規プロジェクトへのアサイン", "B. 職務（ジョブ・ロール）の変更", "C. 情報セキュリティポリシーの改訂", "D. 組織の合併・買収（M&A）"], "answer": ["B"], "explanation": "アクセス権限の再評価は、従業員の職務（ジョブ・ロール）が変更された際に、最優先で実施すべき事項である。\\n職務変更に伴い、必要となるアクセス権が変化するためである。\\nこの際、不要となった従来の権限を速やかに削除することが、特権の最小化の観点から重要となる（NIST SP 800-53 AC-2）。\\n職務変更のタイミングを逃すと、徐々に不要な権限が蓄積されていく「権限クリープ」のリスクが高まる（ISO/IEC 27002 9.2.5）。\\n新規プロジェクトへのアサイン、ポリシー改訂、M&Aの際にもアクセスレビューは有益だが、職務変更ほどの緊急性はない。", "wrongReasons": "A：プロジェクトへのアサインは一時的な権限付与であり、職務変更ほどアクセスレビューの必要性は高くない。\nC：情報セキュリティポリシーの改訂は重要だが、全従業員の即時のアクセス権見直しを要するほどの契機とは限らない。\nD：合併・買収はアクセス権の全面的な洗い替えの契機となるが、日常的な管理という点では職務変更の方が重要度が高い。", "trap": "アクセスレビューを要する様々な契機の中でも、「職務変更」が最も優先されるべき事項であることを理解する。", "domain": "5"}, {"number": "131", "question": "ロールベースアクセス制御（RBAC）の利点として、最も適切でないものはどれか。", "choices": ["A. ユーザーとアクセス権限の紐づけ管理が容易になる", "B. 組織の職務と権限の関係を可視化できる", "C. アクセス制御ルールをシステムに自動適用できる", "D. デフォルトで最小権限の原則が担保される"], "answer": ["D"], "explanation": "RBACは、組織の職務（ジョブロール）とアクセス権限を紐づけて一元管理する仕組みである（NIST SP 800-162）。\\n\\nユーザーには職務に応じたロールを付与することで、権限管理の運用負荷を大幅に削減できる。\\nロールと権限の関係をマトリクス化することで、組織のアクセス制御構造を可視化・最適化できる。\\n各ロールの権限をシステムに自動適用することで、属人的な設定ミスを防止できる（ISO/IEC 27002 9.2.3）。\\n\\nただし、RBACはロールに必要以上の権限を割り当ててしまう「権限の肥大化」のリスクがある。そのため、RBACの導入が即座に最小権限の原則の担保につながる訳ではない。", "wrongReasons": "D：RBACは最小権限の原則を自動的に保証するものではない。ロールへの適切な権限割り当てはRABC管理者の責任において慎重に行う必要がある。", "trap": "RBACによって職務と権限の紐づけは容易になるが、職務に過剰な権限を割り当てると逆に最小権限原則に反してしまう。適切な権限管理はRBAC導入後も継続的な見直しが必要である。", "domain": "5"}, {"number": "132", "question": "セキュリティにおける「3A」の説明で最も適切でないものはどれか。", "choices": ["A. Authenticationは利用者の本人性を検証する", "B. Authorizationはリソースアクセスの可否判断を行う", "C. Accountingは利用者の行動履歴を記録する", "D. Authorizationの前提としてAccountingが必要である"], "answer": ["D"], "explanation": "セキュリティにおける「3A」は、認証（Authentication）、認可（Authorization）、アカウンティング（Accounting）の頭文字を取ったものである。\\n\\nAuthenticationは、パスワードや生体情報などを用いて利用者の本人性を確認するプロセスである。\\nAuthorizationは、認証済みユーザーについて、アクセス先のリソースの利用可否を判定するプロセスである。\\nAccountingは、ユーザーのシステム利用状況を記録し、監査やインシデント調査に備えるプロセスである（NIST SP 800-12）。\\n\\n一方、認可（Authorization）の前提となるのはAccountingではなくAuthentication（認証）である。\\n認証によって利用者の本人性が担保されて初めて、その利用者に対する適切な認可判断が可能となる（ISO/IEC 27002 9.4.1）。", "wrongReasons": "D：認可の前提となるのはAccountingではなくAuthenticationである。アカウンティングはユーザーの行動記録が目的であり、認可判断とは直結しない。", "trap": "3Aの定義と、各プロセスの実行順序を正しく理解する必要がある。特に、認証と認可の前後関係を混同しないように注意が必要。", "domain": "5"}, {"number": "133", "question": "IDとアクセス管理（IAM）ツールの機能として、最も適切でないものはどれか。", "choices": ["A. シングルサインオン（SSO）の提供", "B. プロビジョニング自動化による運用負荷の軽減", "C. 機密データの保護と外部からのアクセス制御", "D. 権限変更の申請・承認ワークフローの実装"], "answer": ["C"], "explanation": "IDとアクセス管理（IAM）は、アイデンティティ情報の一元管理と、それに基づくシステム横断的なアクセスコントロールを実現するソリューションである。\\n代表的なIAMの機能は以下の通りである。\\n\\n1つのIDで複数システムにアクセスできる、シングルサインオン（SSO）の提供（NIST SP 800-63）。\\nアカウントの自動プロビジョニングによる管理負荷の軽減と人為的ミスの防止。\\nワークフローシステムと連携した、迅速かつ正確な権限変更管理の実現（ISO/IEC 27002 9.2.1）。\\n\\n一方、機密データの保護とアクセス制御はIAMの本来的機能ではない。IAMはあくまでIDとアクセス権の紐付けを管理するものであり、機密データ自体の保護は別のソリューション（DLPやERM等）の役割である。", "wrongReasons": "C：機密データ自体の保護はIAMの本来的機能ではない。IAMはユーザーIDとアクセス権限の対応付けを管理するものであり、データ保護は別の仕組みと連携して実現すべきものである。", "trap": "IAMと機密データ保護の役割分担を混同しないように注意が必要。IAMはデータへのアクセス制御の基盤となるが、データそのもののセキュリティ確保はIAMだけでは不十分である。", "domain": "5"}, {"number": "134", "question": "2要素認証で用いられるトークンの特徴として、最も適切でないものはどれか。", "choices": ["A. ハードウェアトークンは物理的な専用デバイスである", "B. ソフトウェアトークンはスマートフォンのアプリとして実装可能である", "C. ワンタイムパスワード（OTP）の生成に利用される", "D. 所有者の生体的特徴を登録して利用する"], "answer": ["D"], "explanation": "2要素認証は、知識（パスワード）・所有物（トークン）・生体情報の少なくとも2つの要素を組み合わせて、高い本人性保証を実現する認証方式である。\\nこのうち、トークンは所有物認証の要素を担うものであり、以下のような特徴を持つ。\\n\\nハードウェアトークンは、専用デバイスとして物理的に分離されている（NIST SP 800-63B）。\\nソフトウェアトークンは、スマートフォンのアプリケーションとしても実装可能である。\\n多くのトークンは、ワンタイムパスワード（OTP）の生成に利用される（ISO/IEC 27002 9.4.2）。\\n\\n一方、所有者の生体的特徴の登録はトークンの一般的な特性ではない。生体情報は別の認証要素（生体認証）として扱うべきものである。", "wrongReasons": "D：トークンは所有物認証の要素を担うものであり、ユーザーの生体的特徴を登録して利用するのは一般的ではない。生体情報は、知識・所有物とは異なる独立した認証要素として分類される。", "trap": "トークン（所有物）認証と生体認証の違いを正しく理解することが重要。2要素認証の枠組みにおいては、両者は明確に区別される。", "domain": "5"}, {"number": "135", "question": "Identity as a Service（IDaaS）の利点として最も適切でないものはどれか。", "choices": ["A. クラウドサービスとしてIAM機能を迅速に導入できる", "B. 初期コスト・ランニングコストを抑えることができる", "C. マルチテナントでサービスを提供するため高い堅牢性を実現できる", "D. オンプレミスのシステムと比較して柔軟な拡張が可能である"], "answer": ["C"], "explanation": "Identity as a Service（IDaaS）は、クラウド上でIAM機能をサービス化したものであり、以下の利点が挙げられる。\\n\\nIAMシステムの構築・運用をクラウドサービスとして調達できるため、迅速な導入が可能となる。\\nクラウドのメリットを活かすことで、初期投資とランニングコストを抑制できる（NIST SP 800-144）。\\nユーザー数の増減に合わせたスケールアウト・スケールインなど、オンプレミスより柔軟なリソース変更ができる。\\n\\nただし、IDaaSはマルチテナントで提供されるがゆえの制約もある。\\n例えば、すべての顧客が共通基盤を利用するため、特定顧客のためにセキュリティを強化するのが難しい。\\n高度なセキュリティが求められる基幹IAMでは、シングルテナントのプライベートクラウド等の選択肢もある。", "wrongReasons": "C：IDaaSは一般にマルチテナントで提供されるため、個別の顧客要件に特化したセキュリティ施策は実装しづらい。高度な堅牢性が必要な場合、専用の仮想マシンを割り当てるプライベートIDaaSなどの選択肢がある。", "trap": "パブリックIDaaSのマルチテナント特性がもたらすデメリットにも留意が必要。セキュリティ要件次第では、プライベートクラウドやオンプレミス型IAMの方が適している場合もある。", "domain": "5"}, {"number": "136", "question": "XACML（eXtensible Access Control Markup Language）の説明として、最も適切でないものはどれか。", "choices": ["A. アクセス制御ポリシーを記述・管理するためのXMLベースの言語仕様である", "B. Webサービスのアクセス制御を標準化する目的で策定された", "C. PolicyとRuleの階層構造でポリシーを定義する", "D. 提供者に依存しない相互運用性の高いアクセス制御の仕組みを提供する"], "answer": ["B"], "explanation": "XACMLは、アクセス制御ポリシーを柔軟かつ標準的に記述・管理するための言語仕様として定義されている。\\n\\nXACMLはXMLをベースとしており、異なるベンダー間での相互運用性に優れている。\\nPolicy（方針）とRule（規則）の2階層構造でアクセス制御ルールを定義できる（OASIS XACML）。\\n属性ベースのアクセス制御（ABAC）を実現する際の標準言語としてよく用いられる。\\n\\n一方、XACMLはWebサービスに限定されるものではなく、より広範な用途で活用されている。\\nWebサービス固有のアクセス制御仕様としては、WS-Security等の標準群がある（W3C WS-Security）。", "wrongReasons": "B：XACMLはWebサービスに特化した仕様ではない。より汎用的なアクセス制御記述言語である。Webサービスの文脈ではWS-Securityなどの標準が別途存在する。", "trap": "XACMLとWebサービス向けセキュリティ標準の違いを正しく理解する必要がある。XACMLは属性ベースアクセス制御（ABAC）の標準実装として、より汎用的に利用可能な仕様である。", "domain": "5"}, {"number": "137", "question": "ITグループのタスクを最小限の人数で分担すると同時に、不正を防止するために、ポリシー設定の定義・レビュー・承認・導入を単独の管理者だけで行えないようにする。この原則を何というか。", "choices": ["A. 最小権限の原則", "B. 権限分離の原則", "C. 職務分掌の原則", "D. 二者会計の原則"], "answer": ["C"], "explanation": "組織における権限濫用や内部不正を防止するためには、単独の個人に過度の権限が集中することを避け、複数の担当者に職務を分散させることが重要である。\\nこのように、役割や権限を意図的に分割してチェックアンドバランスを確保する考え方を「職務分掌の原則」（Segregation of Duties：SoD）と呼ぶ（ISO/IEC 27002 6.1.2）。\\n本問のように、ポリシーの設定・承認・実装などの一連の権限を特定の管理者に集中させず、部門をまたいで分散させることは、SoDの代表的な実践例といえる。", "wrongReasons": "A：最小権限の原則は、ユーザーに割り当てる権限を最小限に抑える考え方だが、職務間の分離については直接言及していない。\nB：権限分離の原則は開発者の権限を制限する考え方であり、ここでの文脈にそぐわない。\nD：二者会計の原則は、会計処理の文脈で用いられる用語である。会計取引における不正防止のために、記帳と監査の職務を分離する原則を指す。", "trap": "最小権限の原則・権限分離・職務分掌など、関連する複数の概念を混同しないよう注意が必要。特にITの文脈で用いられるのは職務分掌の原則（SoD）である。", "domain": "5"}, {"number": "138", "question": "ユーザーに必要以上の権限が付与され、アクセス制御の適切性が損なわれる現象のことを何というか。", "choices": ["A. 権限の棲み分け", "B. 権限の二重化", "C. 権限クリープ", "D. 権限の肥大化"], "answer": ["C"], "explanation": "ユーザーが複数の役割を兼務したり、所属組織を異動したりすると、その都度新たな権限が割り当てられる。\\n特に、以前の役割の権限が適切に削除されないと、徐々にユーザーの権限が肥大化していく。\\nこのような状態を「権限クリープ」（Privilege Creep）と呼ぶ（ISACA用語集）。\\n\\n権限クリープが放置されると、最小権限の原則に反し、不要な権限でリソースにアクセスされるリスクが生じる。\\n特に、管理者権限を持つユーザーで権限クリープが起きると、重大なセキュリティインシデントにつながりかねない。\\n定期的なユーザーアクセスレビューの実施などにより、不要となった権限を発見・削除することが重要である（ISO/IEC 27002 9.2.5）。", "wrongReasons": "A：「権限の棲み分け」という用語は一般的ではない。職務分掌（SoD）の概念に近いが、不適切な権限付与の状態を指す用語ではない。\nB：「権限の二重化」は、冗長化の文脈で使われることはあるが、必要以上の権限付与の意味合いは薄い。\nD：「権限の肥大化」は意味的には近いが、「権限クリープ」の方が一般的な用語である。", "trap": "「権限クリープ」と、その対策としての「ユーザーアクセスレビュー」の関係を正しく理解しておく。単に権限を付与するだけでなく、不要となった権限を定期的に棚卸・削除する作業も重要である。", "domain": "5"}, {"number": "139", "question": "LDAPに関する説明として、最も適切でないものはどれか。", "choices": ["A. 分散ディレクトリサービスのためのプロトコルである", "B. 階層型の情報モデルを採用している", "C. Active Directoryのディレクトリ同期に利用される", "D. トランスポート層の暗号化にはTLSを利用する"], "answer": ["D"], "explanation": "LDAP（Lightweight Directory Access Protocol）は、分散ディレクトリサービスにアクセスするための業界標準プロトコルである。\\n\\nLDAPはクライアント・サーバー型のプロトコルであり、ディレクトリ情報をTCP/IPネットワーク経由で問い合わせできる。\\nLDAPのデータモデルは、ツリー型の階層構造をとる（IETF RFC 4511）。\\nActive DirectoryのディレクトリサービスはLDAPをサポートしており、LDAPを介した他システムとの連携が可能である。\\n\\n一方、LDAPの通信を暗号化する際のトランスポート層セキュリティは、TLS/SSLではなくStartTLSを利用するのが一般的である。StartTLSはLDAP通信に特化した拡張プロトコルであり、通常のLDAP通信を途中からTLSに切り替える仕組みを提供している（IETF RFC 2830）。", "wrongReasons": "D：LDAPのトランスポート層暗号化には、一般的にStartTLSが用いられる。StartTLSはLDAP専用の暗号化拡張プロトコルであり、TLS/SSLとは異なる仕組みである。", "trap": "LDAPの暗号化方式として、TLS/SSLとStartTLSの違いを正しく理解しておく必要がある。一般的なTLS/SSLとは別に、LDAPに特化した独自のStartTLSという暗号化拡張が存在する点がポイントである。", "domain": "5"}, {"number": "140", "question": "アクセス制御モデルについての説明として、最も適切なものはどれか。", "choices": ["A. 任意アクセス制御（DAC）はオブジェクトに設定されたラベルでアクセス可否を判定する", "B. 強制アクセス制御（MAC）はオブジェクトの所有者がアクセス権を決定する", "C. ロールベースのアクセス制御（RBAC）はユーザーの職務に基づいて権限を付与する", "D. 属性ベースのアクセス制御（ABAC）はリソース属性とグループ属性の組み合わせで制御する"], "answer": ["C"], "explanation": "アクセス制御モデルには、任意アクセス制御（DAC）、強制アクセス制御（MAC）、ロールベースアクセス制御（RBAC）、属性ベースアクセス制御（ABAC）などがある。\\n\\nDACは、リソースの所有者が自身の判断でアクセス権限を付与するモデルである。\\nMACは、システムがオブジェクトとサブジェクトのラベルを比較し、アクセス可否を判定するモデルである（NIST SP 800-162）。\\nRBACは、ユーザーの職務（ロール）に必要な権限をまとめてロールに付与し、ユーザーにロールを割り当てるモデルである（ANSI/INCITS 359-2004）。\\nABACは、リソースやユーザーの属性情報に基づいてポリシーを定義し、アクセス可否を動的に判断するモデルである。\\n\\nこのうち、ユーザーの職務に応じてロール単位で権限を付与するのはRBACの特徴であり、RBACについての記述として最も適切である。", "wrongReasons": "A：DACはリソース所有者がアクセス権を決定するモデルであり、オブジェクトのラベル設定による判定はMACの特徴である。\nB：MACはラベルによりアクセス可否を判定するモデルであり、オブジェクト所有者の判断でアクセス権を決めるのはDACである。\nD：ABACはリソースやユーザーの様々な属性を組み合わせてポリシーを定義するモデルであり、グループ属性だけでアクセス可否を制御するわけではない。", "trap": "DACとMACの権限管理方法の違いや、RBACとABACの属性利用の違いなど、各アクセス制御モデルの特性を正しく理解することが重要である。", "domain": "5"}, {"number": "141", "question": "パスワードポリシーの要件に関する記述のうち、最も適切でないものはどれか。", "choices": ["A. 十分な長さと複雑さを持つパスワードの使用を義務付ける", "B. 定期的なパスワード変更を要求する", "C. 一定回数以上の認証失敗でアカウントをロックアウトする", "D. 過去に使用したパスワードの再利用を一定期間禁止する"], "answer": ["B"], "explanation": "パスワードの定期変更は、かつては一般的なセキュリティ施策と考えられていた。\\nしかし近年、以下のような理由から、必ずしも推奨されなくなっている。\\n\\nユーザーは複雑なパスワードを覚えるのが苦手で、変更を強要されると単純なパスワードを選びがちになる。\\n定期変更を強制すると、パスワードを書き留めたりするなど、かえってリスクの高い行為を助長しかねない。\\n不正アクセスの多くは数分〜数日以内に発生するため、数ヶ月周期の変更はあまり意味がない（NIST SP 800-63B）。\\n\\n代わりに、適切な長さと複雑さの要件を定め、二要素認証や不正ログイン検知の仕組みを併用するなど、パスワード以外の対策を重視する方針にシフトしつつある。", "wrongReasons": "A：十分な長さと複雑さを持つパスワードの使用は、不正アクセス防止の観点から引き続き重要である。\nC：一定回数の認証失敗でアカウントをロックアウトするのは、パスワードリスト攻撃などへの防御策として一般的な要件である。\nD：過去パスワードの再利用禁止は、使い回しによるリスクを防ぐために引き続き推奨される（SANS Password Policy）。", "trap": "従来は当然視されていた定期的パスワード変更の要求が、必ずしも推奨されなくなっている背景を理解する。ただし、これは他の代替コントロールを前提とした話であり、安易なパスワード管理を許容する訳ではない。", "domain": "5"}, {"number": "142", "question": "国際規格におけるアクセス制御要件として、最も適切でないものはどれか。", "choices": ["A. アクセス制御方針と手順を定め、文書化すること", "B. 全ての情報資産を対象にアクセス制御を適用すること", "C. アクセス制御規則はビジネス要件に基づくこと", "D. 利用者のアクセス権は、新規付与・変更・削除時に権限を持つ者が正式に承認すること"], "answer": ["B"], "explanation": "情報セキュリティマネジメントの国際規格であるISO/IEC 27001 では、アクセス制御に関する様々な管理策が規定されている（Annex A.9）。\\n\\nアクセス制御方針の確立と、関連する手順の文書化はISMSの基本要件の1つである。\\nアクセス制御規則は、法的要求事項のほか、ビジネスニーズに基づいて策定する必要がある。\\nユーザーのアクセス権付与・変更・削除プロセスでは、権限ある管理者の正式な承認を義務付ける。\\n\\n一方で、全ての情報資産がアクセス制御の対象となるわけではない。\\n情報資産の重要度に応じて、アクセス制御が必要な対象を取捨選択することも認められている（ISO/IEC 27002 8.1.1）。", "wrongReasons": "A：アクセス制御方針の策定と、運用手順の文書化はISO/IEC 27001の要求事項である。\nC：アクセス制御規則はビジネスの要求事項に基づくべきことが規定されている。\nD：アクセス権の付与・変更・削除時の権限ある管理者による承認も、ISO/IEC 27001の要求事項の1つである。", "trap": "ISO/IEC 27001認証取得を目指す際には、アクセス制御の確実な運用が不可欠である。ただし、管理策の適用範囲については経営判断が認められており、必ずしも全情報資産を対象とする必要はない。", "domain": "5"}, {"number": "143", "question": "シングルサインオン（SSO）の課題に関する記述として、最も適切でないものはどれか。", "choices": ["A. SSOシステムが単一障害点となり、アクセス中断のリスクが高まる", "B. 複数サービス間の認証情報の受け渡しにおける情報漏洩のおそれがある", "C. 異なるセキュリティ要件を持つサービス間でアクセス制御粒度が異なる", "D. ログイン時の利便性向上により、ユーザーのセキュリティ意識が希薄になる"], "answer": ["D"], "explanation": "SSOは利便性の高い認証基盤として広く利用されているが、以下のようないくつかの課題を内包している。\\n\\nSSOサーバーに障害が発生すると、連携する複数サービスへのアクセスが一斉にできなくなるリスクがある。\\n認証連携の過程で、サービス間を流れる認証情報が盗聴・改ざんされる危険性がある。\\n一般に、連携サービス間で要求されるセキュリティのレベルは一様ではなく、アクセス制御の粒度も異なりうる。\\n\\n一方で、SSOの利用がユーザーのセキュリティ意識の低下を助長するとは言い切れない。\\nむしろ、利便性の向上により、適切な長さ・複雑さのパスワードを設定したり、定期的に変更したりしやすくなる側面もある。", "wrongReasons": "A：SSOサーバーの障害は、まさに複数サービスの可用性に一気に影響を及ぼす「単一障害点」のリスクの例といえる。\nB：SSOの認証連携では、サービス間でセキュアにトークンを受け渡しする仕組み作りが重要な課題となる。\nC：SSOには様々な業務システムが接続されるため、システム毎のセキュリティ要件のバラツキへの対処が課題となりうる。", "trap": "SSO導入の課題を理解する一方で、SSOが提供するセキュリティ面のメリットも過小評価しないことが重要。利便性の向上によるユーザビリティ改善の側面もある。", "domain": "5"}, {"number": "144", "question": "ユーザーアクセス権のレビュー（アクセスレビュー）に関する記述として、最も適切なものはどれか。", "choices": ["A. 監査部門の独立的評価を受けるための活動である", "B. 網羅的かつ正確な結果を得るため、年1回の実施が推奨されている", "C. 業務プロセスの変更ニーズを抽出するための手段である", "D. 付与済み権限の最小権限原則との整合性を定期的に確認する目的を持つ"], "answer": ["D"], "explanation": "ユーザーアクセス権のレビュー（または棚卸し）は、情報システムのセキュリティ維持において不可欠のプロセスである。\\n\\n現時点での各ユーザーの付与済み権限が、職務上の必要性と比べて過剰になっていないかを定期的に見直す必要がある。\\n単に初期設定を行うだけでなく、最小権限原則が維持された状態にあるかを継続的に確認していくことが肝要である。\\n退職者の権限削除漏れ、異動者の不要権限の放置など、放っておくと必要以上の権限が蓄積されていく（NIST SP 800-100）。\\n\\n一方で、アクセスレビューは、主に内部統制の一環として実施されるもので、外部監査のために実施するものではない。\\n頻度は、組織の規模やリスクの度合いに応じて判断すべきであり、一律に年1回とは限らない（IPA「システム管理基準」）。\\nまた、アクセス権限の点検が主眼であり、業務プロセスへの要改善抽出を目的とするものでもない。", "wrongReasons": "A：アクセスレビューは外部監査ではなく、一義的に組織の内部統制の一環として実施される。\nB：実施頻度に関する絶対的な基準はなく、各社の事情に応じて適切な頻度を判断すべきである。\nC：アクセス権限の妥当性確認が主題であり、業務プロセスの変更ニーズの抽出を主眼とするものではない。", "trap": "アクセスレビューの位置づけと目的を正しく理解する。形式的・表面的なレビューに陥らず、最小権限原則の趣旨に沿って、付与済み権限の妥当性を注意深く見直すことが重要。", "domain": "5"}, {"number": "145", "question": "バイオメトリック認証システムの精度指標に関する記述として、最も適切なものはどれか。", "choices": ["A. 本人拒否率（FRR）はシステムの利便性を表し、低いほど良い", "B. 他人受入率（FAR）はセキュリティ強度の指標であり、一般に高めに設定される", "C. FRRはセキュリティ強度、FARはシステムの利便性という、トレードオフの関係にある", "D. 同一エラー率（EER）は、FRRとFARが等しくなる点を示す指標である"], "answer": ["D"], "explanation": "バイオメトリクス認証の主要な精度指標として、以下の2つの数値が用いられる。\\n\\n本人拒否率（FRR：False Rejection Rate）は、正当なユーザーの生体情報が誤って拒否される確率を表す。\\n他人受入率（FAR：False Acceptance Rate）は、他人の生体情報が誤って受け入れられる確率を示す。\\n\\n一般に、FRRを下げるとFARが上昇し、FARを下げるとFRRが上昇するというトレードオフの関係にある。\\nFRRが高いとセキュリティは向上するが、利便性は損なわれ、FARが高いと逆にセキュリティは低下するが使い勝手は良くなる。\\nバイオメトリクスベンダーは、運用方針に応じて、FRRとFARのバランスを調整可能なシステムを提供していることが多い。\\n同一エラー率（EER：Equal Error Rate）は、FRRとFARが等しくなる点、つまりFRR＝FARとなる閾値を示す指標である（ISO/IEC 19795-1）。\\n異なるベンダーのシステムを比較する際の1つの物差しとして使われる。", "wrongReasons": "A：FRRは正当なユーザーの拒否率であり、低いほど利便性は高いが、同時にセキュリティは低下すると言える。\nB：FARは他人の誤認率であり、セキュリティ強度を表す指標といえる。ただし、一般にはできるだけ低く抑えるのが望ましい。\nC：FRRとFARはトレードオフの関係にあるが、FRRは利便性、FARはセキュリティ強度を表すと整理するのが一般的である。", "trap": "バイオメトリクス認証の性能評価は、FRR（利便性）とFAR（セキュリティ）のバランスが鍵となる。EERは、そのバランス点を示す指標として、ベンダー間の比較検討に有用である。", "domain": "5"}, {"number": "146", "question": "アクセス制御におけるクリアランスとクラスに関する記述として、最も適切なものはどれか。", "choices": ["A. クリアランスはオブジェクトに、クラスはサブジェクトに割り当てられる", "B. クリアランスはサブジェクトに、クラスはオブジェクトに割り当てられる", "C. クリアランスとクラスは、どちらもサブジェクトに割り当てられる", "D. クリアランスとクラスは、どちらもオブジェクトに割り当てられる"], "answer": ["B"], "explanation": "アクセス制御の仕組みにおいて、サブジェクト（利用者）とオブジェクト（リソース）には、以下のような属性が割り当てられる。\\n\\nサブジェクトには、取り扱い可能な情報の機密性レベルを示す「クリアランス」（Clearance）が割り当てられる。\\nオブジェクトには、内包する情報の機密性レベルを示す「クラス」（Classification）が付与される。\\n\\nアクセス制御の基本ルールでは、「サブジェクトのクリアランス ≧ オブジェクトのクラス」の場合のみアクセスが許可される（ISO/IEC 27002 9.1.1）。\\nつまり、機密ラベル付与による強制アクセス制御（MAC）の仕組みの中核を担う概念である。", "wrongReasons": "A：クラスはサブジェクトではなくオブジェクトに対して割り当てられる属性である。\nC：クリアランスとクラスは、それぞれサブジェクトとオブジェクトに割り当てられる別の属性である。\nD：クリアランスはサブジェクトに割り当てる属性であり、オブジェクトではない。", "trap": "強制アクセス制御の文脈で用いられるクリアランスとクラスの割り当て先を混同しないよう注意する。前者はサブジェクト、後者はオブジェクトに対する属性付けである。", "domain": "5"}, {"number": "147", "question": "ディレクトリサービスの説明として、最も適切でないものはどれか。", "choices": ["A. 組織内のユーザーやリソースの情報を一元的に管理するためのサービスである", "B. 認証基盤の中心的な役割を担うケースが多い", "C. オブジェクトとその属性をツリー構造で保持して柔軟な検索を可能にする", "D. 通常は完全準同型暗号の仕組みを用いてディレクトリ情報を保護する"], "answer": ["D"], "explanation": "ディレクトリサービスは、以下のような特徴を持つ。\\n\\n組織内のユーザー、グループ、コンピュータ、プリンタなどのオブジェクト情報を一元管理できる仕組みを提供する。\\nオブジェクトのIDと属性情報をツリー構造で保持し、LDAPなどの専用プロトコルで高速に検索できる（IETF RFC 4511）。\\nID管理の中核となる認証基盤の役割を果たすことが多く、シングルサインオンなどの機能とも連携できる。\\n\\n一方、ディレクトリ情報の保護手段として完全準同型暗号を用いるのは一般的ではない。\\n完全準同型暗号は、暗号化したまま加算や乗算を行える高度な暗号技術だが、現時点では理論的な色彩が強く、実運用の例は限定的である。\\nディレクトリ情報の機密性確保には、通信路の保護（LDAPS/StartTLSなど）やアクセス制御（LDAP-ACLなど）といった一般的な対策が取られるのが通例である（OWASP LDAP Injection Prevention）。", "wrongReasons": "A：ディレクトリサービスの主要な役割は、ユーザーIDや組織リソースの属性情報の一元管理にある。\nB：シングルサインオンなどの統合認証基盤を支える中心的な役割を、ディレクトリサービスが担うことが多い。\nC：ディレクトリ情報はツリー構造で管理されるため、組織の構造変化にも柔軟に対応しやすい。", "trap": "ディレクトリ情報の保護手法として、高度な暗号技術の適用は現実的でない。通信暗号化やアクセス制御による保護が一般的であることを理解しておく。", "domain": "5"}, {"number": "148", "question": "アイデンティティ管理のプロビジョニングで自動化すべき処理として、適切でないものはどれか。", "choices": ["A. 新規ユーザーアカウントの登録", "B. ユーザーに付与する権限の決定", "C. アカウントロックアウトポリシーの適用", "D. 退職者アカウントの無効化"], "answer": ["B"], "explanation": "アイデンティティ管理におけるプロビジョニングとは、ユーザーアカウントのライフサイクル管理を指す。\\n具体的には、以下のようなタスクが含まれる。\\n\\n新規ユーザーアカウントの登録や初期設定\\nアカウントロックアウトなどのセキュリティポリシーの適用\\nユーザーの組織異動に伴うアカウント情報や権限の変更\\n退職者アカウントの無効化・削除\\n\\nこれらのタスクの多くは定型的であるため、手作業でミスなく実施するのは難しい。\\nしたがって、可能な限り自動化することでヒューマンエラーのリスクを低減し、運用効率を高めることが望ましい（NIST SP 800-12）。\\n一方、ユーザーに付与する権限の決定は、職務内容に応じた慎重な判断を要する作業である。\\n内容に応じて柔軟に判断する必要があるため、自動化に完全になじむタスクとは言えない（ISO/IEC 27002 9.2.2）。", "wrongReasons": "A：事前に決められた命名規則に従い、自動的に新規ユーザーアカウントを登録するのは一般的な方法である。\nC：ロックアウトまでの試行回数など、セキュリティポリシーのパラメーターはルール化して自動適用すべきである。\nD：退職者アカウントを定期的に自動検出して無効化する仕組みは、アイデンティティ管理の重要な要件である。", "trap": "アイデンティティ管理は、自動化で効率化できる作業と、人的判断を要する作業の切り分けが肝要。ユーザーへの権限付与は、自動化が難しいケースが多いことを理解しておく。", "domain": "5"}, {"number": "149", "question": "OAuth 2.0の特徴に関する記述のうち、最も適切なものはどれか。", "choices": ["A. Webブラウザを介してユーザー認証を行うプロトコルである", "B. RESTfulなAPIとの高い親和性を持つ", "C. 機密性の高い情報を直接的に保護することを主目的としている", "D. 常にユーザーに対してアクセス許可の同意画面を表示する"], "answer": ["B"], "explanation": "OAuth 2.0は、Webサービス間でアクセス権限を委譲するための仕組みである。\\n\\nリソースオーナー（ユーザー）の認可のもと、クライアントアプリケーションがリソースサーバーのAPIにアクセスするためのプロトコルである。\\nRESTfulなAPIとの親和性が高く、API連携の標準的な認可方式として広く採用されている（IETF RFC 6749）。\\nリソースサーバーから取得するのは、アクセストークンと呼ばれる文字列であり、個人情報等の機密データを直接的に返すものではない。\\n\\n一方、ユーザー認証そのものを行うプロトコルではなく、あくまでクライアントアプリケーションへのAPIアクセス認可が主目的である。\\n機密性の高い情報の保護は、OAuth 2.0と併用されるほかの手段（TLSによる通信路の保護など）によって実現される。\\nスコープ（権限の範囲）に変更がなければ、同意画面の再表示はオプションであり、常に表示しなければならないわけではない。", "wrongReasons": "A：OAuth 2.0はユーザー認証ではなく、リソースへのアクセス認可プロトコルである。\nC：OAuth 2.0の主眼は認可（Authorization）であり、機密情報の保護は他の手段と組み合わせて実現する。\nD：スコープ（認可対象の権限）が変わらない限り、必ずしも毎回の同意画面表示は必須ではない。", "trap": "OAuth 2.0の主目的が「認可」であり、ユーザー認証そのものを行うものではない点に留意する。また、APIとの親和性の高さから、Webサービス間連携の文脈で多用されていることを覚えておく。", "domain": "5"}, {"number": "150", "question": "Kerberos認証の仕組みに関する説明のうち、正しいものはどれか。", "choices": ["A. 公開鍵暗号方式を用いてユーザー認証を行う", "B. ログイン時のみチケットの取得が必要である", "C. レルム間でのシングルサインオンをサポートする", "D. Webアプリケーションとの親和性が高い"], "answer": ["C"], "explanation": "Kerberosは、信頼できる第三者機関を介してユーザー認証を行うチケットベースの認証プロトコルであり、以下のような特徴を持つ。\\n\\n共通鍵暗号方式を用いたチケット交換によって、ユーザーとサービスの相互認証を実現する。\\nチケットの有効期間内は、サービスにアクセスする度に新たな認証が不要となる（シングルサインオン）。\\nレルム（Realm）と呼ばれるドメインを単位としたKerberosサーバー間で、チケットの相互運用が可能である（IETF RFC 4120）。\\n\\n一方、Kerberosは公開鍵暗号ではなく共通鍵暗号を使用する。チケットはサービスアクセスのたびに必要となり、ログイン時だけでは不十分である。\\nまた、主にイントラネットでのサービス間シングルサインオンを想定したプロトコルであり、インターネット経由のWebアプリケーションとの親和性は高くない。", "wrongReasons": "A：Kerberosは共通鍵暗号方式を採用しており、公開鍵暗号は使用しない。\nB：サービスにアクセスする度に、チケットを用いた認証が必要である。ログイン時のみでは不十分。\nD：主にイントラネットでのシングルサインオンを想定しており、インターネットを介したWebアプリケーションとの親和性は低い。", "trap": "シングルサインオンの実現方式としてのKerberosの特徴を正しく理解する。特に、共通鍵暗号の利用、レルム間連携、イントラネットとの親和性の高さなどがポイント。", "domain": "5"}, {"number": "151", "question": "特権ID管理における資格情報管理システム（PAM）の説明として、最も適切なものはどれか。", "choices": ["A. 特権IDの使用状況をリアルタイムに監視するシステム", "B. 管理者に代わって自動的にタスクを実行するシステム", "C. 特権IDの資格情報を安全に保管・制御するシステム", "D. 特権IDに関連するインシデント情報を一元管理するシステム"], "answer": ["C"], "explanation": "特権アクセス管理（PAM）システムは、管理者権限など高い権限を持つ特権IDの資格情報（パスワードなど）を安全に管理することを目的とするシステムである。\\n主な機能は以下の通りである。\\n\\n強力な暗号化を用いた特権ID資格情報の一元管理（Vault機能）\\n特権IDの利用申請・承認のワークフロー管理（管理者権限の適切な割り当て）\\n特権IDの利用状況の記録と監査（不正利用の抑止・追跡）（NIST SP 1800-18）\\n\\n特権ID使用状況のリアルタイム監視は、PAMに付随する機能のひとつだが、一義的な目的ではない。\\nタスクの自動実行は、RPAツールなどの役割であり、PAMの本質的な機能とは言えない。\\nインシデント管理は、SIEMなどの別の管理ツールで行われるのが一般的である。", "wrongReasons": "A：特権IDの使用状況監視は付随的機能の1つだが、PAMの主目的は安全な資格情報管理にある。\nB：RPAなどのツールの役割であり、PAM固有の機能とは言えない。\nD：インシデント管理は、PAMとは異なるツールの役割である。", "trap": "PAMの本質的価値は、管理者を含む特権ユーザーの資格情報を安全に保管・制御する点にある。監視やタスク自動化は、あくまで付随的な役割と捉えるべきである。", "domain": "5"}, {"number": "152", "question": "クロスドメイン認証の説明として、最も適切でないものはどれか。", "choices": ["A. 複数の異なるセキュリティドメインをまたいだID連携を実現する", "B. Security Assertion Markup Language (SAML)はクロスドメイン認証の標準規格の1つである", "C. クロスドメイン認証はWebアプリケーション間のSSOの実現に利用されることが多い", "D. ドメイン間のID情報の交換は、常に双方向で行われる必要がある"], "answer": ["D"], "explanation": "クロスドメイン認証は、セキュリティ要件やID管理方式の異なる複数のドメイン間で、シングルサインオン（SSO）を実現するための技術である。\\nその特徴は以下の通りである。\\n\\n信頼関係を結んだドメイン間で、ユーザー認証情報を相互に利用可能にする。\\nSAML（Security Assertion Markup Language）は、認証情報をXMLベースで交換するための標準規格の1つである（OASIS SAML）。\\nWebアプリケーション間のSSOを実現する際に、クロスドメイン認証の仕組みが用いられるケースが多い。\\n\\nただし、ドメイン間のID情報の交換は、必ずしも双方向である必要はない。\\n一方的に Identity Provider（IdP）から Service Provider（SP）へ認証情報を渡す形態も一般的であり、双方向の連携が必須とは限らない。", "wrongReasons": "A：異なるセキュリティドメインをまたいだID連携の実現こそ、クロスドメイン認証の主目的である。\nB：SAMLはクロスドメイン認証で最もよく使われる規格の1つで、認証情報交換の標準形式を定めている。\nC：クロスドメイン認証の主要な用途の1つが、まさにWebアプリケーション間のSSOの実現にある。", "trap": "クロスドメイン認証の主目的と、SAMLなどの標準規格の役割を正しく理解することがポイント。ドメイン間の連携形態は一方向でも双方向でも構わないことにも注意。", "domain": "5"}, {"number": "153", "question": "Just Enough Administration（JEA）の説明として、最も適切なものはどれか。", "choices": ["A. Windowsにおける最小権限アクセスの仕組み", "B. UNIXシステムにおける特権管理の仕組み", "C. 必要最小限のメモリ使用を強制するOSの機能", "D. メモリ保護を強化するCPUの機能"], "answer": ["A"], "explanation": "Just Enough Administration（JEA）は、Windows PowerShellに実装された、最小権限のリモート管理を実現する仕組みである。\\nその特徴は以下の通りである。\\n\\n管理者が事前にコマンドレットのホワイトリストを定義し、承認された操作のみに制限できる。\\nアクセス可能な対象を細かく限定したり、特権の有効期限を設定したりできる。\\n昇格された特権をタスク実行後すぐに剥奪することで、特権の不正利用を防止できる（Microsoft Docs \"JEA\"）。\\n\\nこのように、JEAは必要最小限の権限のみを与えることで、管理者権限の乱用を防ぐためのWindows機能である。\\nUNIXのsudoコマンドに似た思想だが、Windowsに特化した技術である。", "wrongReasons": "B：UNIXの特権管理の仕組みではなく、Windows PowerShellに実装された技術である。\nC：最小権限アクセスの仕組みであって、メモリ使用量の制御とは関係がない。\nD：OSの機能であり、CPUの機能ではない。また、メモリ保護とも直接の関係はない。", "trap": "JEAがWindows固有の技術であること、必要最小限の権限に基づく管理者アクセス制御が主目的であることを正しく理解する。最小リソースの割り当てなど、別の概念と混同しないことがポイント。", "domain": "5"}, {"number": "154", "question": "OpenID Connectに関する記述として、最も適切なものはどれか。", "choices": ["A. SAML 2.0をベースとしたフェデレーション認証の仕様である", "B. OAuth 2.0の上に構築された認証レイヤーの仕様である", "C. Kerberosプロトコルを拡張した分散認証の仕様である", "D. RADIUSプロトコルを応用したシングルサインオンの仕様である"], "answer": ["B"], "explanation": "OpenID Connectは、OAuth 2.0をベースとして構築されたID連携のための認証レイヤー仕様である。\\nその主な特徴は以下の通りである。\\n\\nJSON Web Token（JWT）を用いて、認証情報をクレームの形で表現する。\\nUserInfo エンドポイントを通じて、認証済みユーザーの属性情報を取得できる。\\nOAuth 2.0の認可フローに沿って、RPがOPからIDトークンを取得する（OpenID Foundation \"OpenID Connect\"）。\\n\\nこのように、OpenID ConnectはOAuth 2.0の認可機能を活用しつつ、その上位レイヤーでID連携のための認証機能を実現している。\\nSAML 2.0とは異なるアプローチであり、OAuth 2.0との親和性の高さが特徴である。", "wrongReasons": "A：SAML 2.0ベースではなく、OAuth 2.0をベースとして構築された仕様である。\nC：Kerberosプロトコルとは無関係であり、OAuth 2.0の上に構築された仕様である。\nD：RADIUSプロトコルとも無関係であり、OAuth 2.0の上に構築された仕様である。", "trap": "OpenID ConnectがOAuth 2.0の上位レイヤーに位置づけられる仕様であること、SAML 2.0とは異なるアプローチであることを正しく理解する。Kerberosなど他の認証プロトコルとの混同に注意。", "domain": "5"}, {"number": "155", "question": "アイデンティティ管理におけるデプロビジョニングの説明として、最も適切なものはどれか。", "choices": ["A. 新規ユーザーにアカウントを発行するプロセス", "B. ユーザーに新たな権限を付与するプロセス", "C. ユーザーの権限を変更するプロセス", "D. ユーザーの権限を削除するプロセス"], "answer": ["D"], "explanation": "アイデンティティ管理の文脈において、デプロビジョニング（Deprovisioning）とは、ユーザーの権限を削除するプロセスを指す。\\nその主な特徴は以下の通りである。\\n\\n退職や組織変更などに伴い、ユーザーが不要となった権限を適切に削除する。\\nアカウントのロックや無効化、関連するグループからの削除などが含まれる。\\n放置されたアカウントや権限が、内部脅威の原因となるリスクを軽減できる（ISACA \"Glossary of Terms\"）。\\n\\nデプロビジョニングは、プロビジョニング（アカウント発行や権限付与）の対となる概念であり、アイデンティティ管理のライフサイクルにおいて重要な役割を果たす。", "wrongReasons": "A：アカウントの発行はプロビジョニングに該当し、デプロビジョニングではない。\nB：新たな権限の付与もプロビジョニングの一環であり、デプロビジョニングとは異なる。\nC：権限の変更はプロビジョニングの範疇であり、デプロビジョニングは権限の削除を指す。", "trap": "デプロビジョニングが、アカウントや権限の削除を指す用語であることを正しく理解する。プロビジョニングやアカウント管理の他の局面と混同しないようにする。", "domain": "5"}, {"number": "156", "question": "情報セキュリティの脆弱性評価を行う際、脆弱性スキャナーを使用することの利点として最も適切なものは次のうちどれか。", "choices": ["A. スキャン結果のレポートが自動生成されるため、人的なミスを排除できる。", "B. 脆弱性の原因となるソースコードの特定まで可能である。", "C. 未知の脆弱性（ゼロデイ脆弱性）の発見に効果的である。", "D. 高度なソーシャルエンジニアリング攻撃のリスクも評価できる。"], "answer": ["A"], "explanation": "脆弱性スキャナーは、事前にプログラムされたルールセットに基づいて、対象システムの既知の脆弱性を自動的に検出し、結果をレポート形式で出力します。これにより、手動での脆弱性チェックに比べ、人為的ミスを大幅に減らすことができます。この点が、脆弱性スキャナー使用の大きな利点の一つです。", "wrongReasons": "B：脆弱性スキャナーは主にブラックボックステストの手法であり、ソースコードレベルまでの詳細な脆弱性の特定は困難です。ホワイトボックステストや静的コード解析ツールの利用が必要となります。\nC：脆弱性スキャナーは基本的に既知の脆弱性をチェックするため、未知の脆弱性の発見には向きません。ゼロデイ脆弱性の発見にはファジングなどの手法が用いられます。\nD：脆弱性スキャナーの対象はシステムやアプリケーションであり、人的な脆弱性を突くソーシャルエンジニアリング攻撃のリスク評価は範疇外です。", "trap": "脆弱性スキャナーはシステムの脆弱性診断に広く用いられるツールですが、万能ではありません。適切な脆弱性評価には、状況に応じて他の手法（ペネトレーションテスト、コードレビューなど）も組み合わせる必要があります。", "domain": "6"}, {"number": "157", "question": "情報セキュリティインシデントの調査において、証拠保全のために最も優先すべきことは次のうちどれか。", "choices": ["A. インシデントの原因となった脆弱性を速やかに修正すること。", "B. インシデントの発生を社内に周知し注意喚起すること。", "C. 証拠を適切に文書化し、証拠としての完全性を保つこと。", "D. 類似のインシデントを予防するために、再発防止策を早急に講じること。"], "answer": ["C"], "explanation": "情報セキュリティインシデントが発生した際、最優先事項は証拠の保全です。証拠は、インシデントの原因究明や、必要に応じて法的措置を取る上で重要な役割を果たします。そのためには、証拠を適切に文書化し、改ざんや破損を防ぐことが不可欠です。具体的には、ハッシュ値の計算による完全性の担保（NIST SP 800-86）、証拠の取り扱いに関する厳格な手順の確立などが求められます。", "wrongReasons": "A：脆弱性の修正は重要ですが、証拠保全よりも優先度は低いです。不適切な修正により、かえって証拠が失われる可能性もあります。\nB：社内への周知は、インシデントの影響範囲の特定後、適切なタイミングで行うべきです。証拠保全よりも優先度は低いです。\nD：再発防止は、インシデントの原因究明後に検討すべき事項です。証拠保全よりも後の段階になります。", "trap": "インシデント発生時、証拠保全の重要性を理解していないと、他の対応（脆弱性修正など）を優先してしまいがちです。しかし、証拠の保全なくしては、原因究明も再発防止も困難になります。インシデントレスポンスの初動では、常に証拠保全を最優先に考える必要があります。", "domain": "6"}, {"number": "158", "question": "Webアプリケーションの設計におけるセキュリティ要件を策定する際、考慮すべき点として最も適切なものは次のうちどれか。（複数回答可）", "choices": ["A. OWASPトップ10に掲載されている脅威への対策", "B. Webサーバーのパフォーマンス最適化", "C. プライバシーに関する法規制への準拠", "D. REST APIの公開"], "answer": ["A", "C"], "explanation": "Webアプリケーションの設計時には、セキュリティを第一に考える「Security by Design」の原則に基づき、想定される脅威に対する適切な対策をセキュリティ要件に盛り込む必要があります。具体的には、以下の2点が特に重要です。\\nA：OWASPトップ10は、Webアプリケーションに対する代表的な脅威をリスト化したもので、これに掲載されている脅威（SQLインジェクション、クロスサイトスクリプティングなど）への対策は必須です。\\nC：個人情報の取り扱いに関しては、GDPR（EU一般データ保護規則）をはじめとする各国の法規制への準拠が求められます。設計段階からプライバシー保護を考慮に入れる「Privacy by Design」の考え方が重要です。", "wrongReasons": "B：パフォーマンスの最適化は重要な設計要件ですが、セキュリティ要件としての優先度は相対的に低いです。\nD：REST APIの公開は、アプリケーションのアーキテクチャ選択の一つであり、セキュリティ要件とは直接関係しません。", "trap": "セキュリティ要件は、機能要件や性能要件と並ぶ重要な非機能要件の一つです。しかしながら、開発現場では後回しにされがちです。セキュアなWebアプリケーションを構築するには、設計の初期段階からセキュリティ要件を明確にしておくことが肝要です。", "domain": "6"}, {"number": "159", "question": "新規開発中のWebアプリケーションのセキュリティテストの一環として、外部のペネトレーションテスターにテストを委託することになりました。テスターに提供すべき情報として最も適切なものは次のうちどれか。", "choices": ["A. ソースコードとアーキテクチャ資料", "B. 管理者アカウントのクレデンシャル情報", "C. 過去のインシデント事例の詳細", "D. アプリケーションの基本的な機能要件のみ"], "answer": ["D"], "explanation": "ペネトレーションテストの目的は、実際の攻撃者の視点でシステムの脆弱性を洗い出すことにあります。そのため、テスターには、攻撃者と同等の情報（つまり、ごく限られた情報）しか与えるべきではありません。具体的には、テスト対象アプリケーションの基本的な機能要件程度の情報を提供するのが一般的です。これは「ブラックボックステスト」と呼ばれるアプローチで、現実の脅威を最も反映した結果が得られます。（参考：NIST SP 800-115）", "wrongReasons": "A：ソースコードやアーキテクチャ資料は、「ホワイトボックステスト」で提供される情報です。ブラックボックステストではこれらの情報は与えません。\nB：管理者アカウントの情報を提供することは、テスターに過剰な権限を与えることになり、現実的な脅威を反映したテストができなくなります。\nC：過去のインシデント事例は、ペネトレーションテストとは直接関係のない情報です。", "trap": "ペネトレーションテストには、ブラックボックス、ホワイトボックス、グレーボックス（両者の中間）のアプローチがあります。目的に応じて適切な手法を選択することが重要ですが、一般的にはブラックボックステストが推奨されます。", "domain": "6"}, {"number": "160", "question": "ISO/IEC 27001（ISMS）の認証取得プロジェクトにおいて、リスクアセスメントの実施が求められています。リスクの特定に使用する手法として最も適切なものは次のうちどれか。", "choices": ["A. 脆弱性スキャン", "B. 資産台帳の作成", "C. インシデントレスポンス訓練", "D. 内部監査の実施"], "answer": ["B"], "explanation": "ISO/IEC 27001では、組織の情報セキュリティリスクを特定し、評価し、適切に処置することが求められています。その第一歩が、組織が保有する情報資産を明確にすることです。具体的には、情報資産の洗い出しと重要度の評価を行い、「資産台帳」を作成します。この資産台帳をベースに、各資産に対する脅威と脆弱性を特定し、リスクを評価していきます。つまり、資産台帳の作成は、リスク特定の出発点となる重要なプロセスなのです。", "wrongReasons": "A：脆弱性スキャンは、特定された資産に対する脆弱性の診断に用いられる手法です。リスク特定の初期段階では使用しません。\nC：インシデントレスポンス訓練は、特定されたリスクへの対応力を高めるための活動であり、リスク特定とは直接関係しません。\nD：内部監査は、ISMS全体の適合性と有効性を評価するためのプロセスです。リスク特定よりも後の段階で実施されます。", "trap": "リスクアセスメントは、リスク特定、リスク分析、リスク評価の3つのプロセスからなります。これらを混同しないことが重要です。特に、リスク特定の段階では、資産、脅威、脆弱性など、リスクの構成要素を明確にすることに注力します。", "domain": "6"}, {"number": "161", "question": "脆弱性スキャンの実施後、検出された脆弱性に対する最適な対応を決定する際に考慮すべき点は次のうちどれか。", "choices": ["A. 脆弱性の深刻度のみ", "B. 脆弱性の修正に必要なコストのみ", "C. 脆弱性の悪用可能性と影響度", "D. ベンダーが提供するパッチの有無のみ"], "answer": ["C"], "explanation": "脆弱性対応の優先順位を決める際は、脆弱性の悪用可能性（Exploitability）と、悪用された場合の影響度（Impact）の両方を考慮することが重要です。これは、CVSS（共通脆弱性評価システム）のベースメトリクスでも使用されている考え方です。例えば、悪用可能性は高くても影響度が低い脆弱性よりも、悪用可能性は低くても影響度が高い脆弱性の方が、優先度は高くなります。脆弱性管理では、このようなリスクベースのアプローチが求められます。", "wrongReasons": "A：脆弱性の深刻度は重要な考慮要素ですが、それだけで対応の優先度は決められません。\nB：コストは重要な制約条件ですが、最も重視すべきはリスクの大きさです。\nD：ベンダーのパッチ提供は、修正の難易度に影響しますが、パッチがないからといって対応しなくてよいわけではありません。", "trap": "「深刻度の高い脆弱性から対応する」というシンプルな考え方は、一見合理的に見えます。しかし、現実には、悪用可能性や影響度、対応のコストなど、様々な要素を総合的に判断する必要があります。画一的な対応ではなく、リスクベースの意思決定が求められる点に注意が必要です。", "domain": "6"}, {"number": "162", "question": "ペネトレーションテストにおいて、テスト実施者に提供する情報の詳細さを示す手法はどれか。（複数選択可）", "choices": ["A. ブラックボックステスト", "B. ホワイトボックステスト", "C. グレーボックステスト", "D. ダブルブラインドテスト"], "answer": ["A", "B", "C"], "explanation": "ペネトレーションテストでは、テスト実施者に提供する情報の量によって、以下の3つの手法が一般的に用いられています。\\nA: ブラックボックステスト - テスト実施者には、公開情報以外の情報は提供されません。実際の攻撃者の視点に近いテストが可能です。\\nB: ホワイトボックステスト - テスト実施者には、ソースコード、ネットワーク図など、システムの詳細情報が全て提供されます。網羅的なテストが可能ですが、現実の攻撃シナリオとは異なります。\\nC: グレーボックステスト - ブラックボックスとホワイトボックスの中間的なアプローチで、テスト実施者には、システムの概要情報程度が提供されます。\\nこれらの手法は、テストの目的や対象システムの性質に応じて選択されます。（参考：NIST SP 800-115）", "wrongReasons": "D：ダブルブラインドテストは、ペネトレーションテストの手法ではなく、医薬品の臨床試験などで用いられる手法です。", "trap": "ブラックボックス、ホワイトボックス、グレーボックスは、テスト実施者の知識レベルを表す用語であり、テスト対象システムの透明性とは関係ありません。例えば、ソースコードが提供されるホワイトボックステストでも、テスト実施者がそのコードを完全に理解しているとは限りません。", "domain": "6"}, {"number": "163", "question": "情報セキュリティ監査の監査証跡（Audit Trail）として適切なものはどれか。", "choices": ["A. 監査人の経歴書", "B. 監査計画書", "C. インタビューの録音記録", "D. 監査報告書の草稿"], "answer": ["C"], "explanation": "情報セキュリティ監査における監査証跡とは、監査の過程で収集・作成された記録であり、監査意見の根拠となるものです。具体的には、監査手続の実施記録、入手した証憑、関係者へのインタビュー記録などが該当します。選択肢の中では、「インタビューの録音記録」が最も適切な監査証跡の例といえます。これは、インタビューの内容を客観的に記録したものであり、監査意見の重要な根拠となり得るからです。（参考：ISO 19011）", "wrongReasons": "A：監査人の経歴書は、監査人の適格性を示す資料ではありますが、監査証跡ではありません。\nB：監査計画書は、監査の目的、範囲、実施項目などを定めた文書ですが、監査の実施記録ではありません。\nD：
