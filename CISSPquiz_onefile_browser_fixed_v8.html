<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>CISSP クイズ</title>
  <style>
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: #121212;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.55;
    }
    .wrap {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,.28);
      margin-bottom: 16px;
    }
    h1, h2, h3, p { margin: 0 0 12px; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1.15rem; }
    h3 { font-size: 1rem; }
    .muted { color: #b8b8b8; }
    .row { display: grid; gap: 12px; }
    label.inline-label { display:block; font-weight: 600; margin-bottom: 6px; }
    select, button {
      font: inherit;
      min-height: 48px;
      border-radius: 14px;
      border: 0;
    }
    select {
      width: 100%;
      background: #2c2c2c;
      color: #fff;
      padding: 0 14px;
    }
    button {
      width: 100%;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: #0a84ff; color: #fff; }
    .btn-secondary { background: #3a3a3c; color: #fff; }
    .btn-danger { background: #6b2d2d; color: #fff; }
    .btn-inline {
      width: auto;
      min-width: 140px;
    }
    .button-grid {
      display: grid;
      gap: 10px;
    }
    .domain-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .choice {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #3b3b3b;
      background: #262626;
    }
    .choice input {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: #0a84ff;
      flex: 0 0 auto;
    }
    .choice-text {
      flex: 1;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    #question-text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .statusbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      color: #cfcfcf;
      font-size: .95rem;
    }
    .explanation {
      margin-top: 14px;
      padding: 14px;
      border-left: 6px solid #666;
      border-radius: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .correct { background: #1f3524; border-color: #2fb75a; }
    .incorrect { background: #3b2121; border-color: #de5b5b; }
    .hidden { display: none !important; }
    .summary-item {
      padding: 12px;
      border-radius: 12px;
      background: #252525;
      border: 1px solid #373737;
      margin-top: 10px;
    }
    .summary-item.good { border-color: #2fb75a; }
    .summary-item.bad { border-color: #de5b5b; }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: .85rem;
      font-weight: 700;
      background: #333;
      margin-right: 8px;
    }
    .pill.good { background: #214f2f; }
    .pill.bad { background: #5e2727; }
    .error {
      margin-top: 12px;
      color: #ffb4b4;
      white-space: pre-wrap;
    }
    @media (min-width: 760px) {
      .wrap { padding: 24px; }
      .card { padding: 22px; }
      .button-grid.two { grid-template-columns: repeat(2, minmax(180px, 220px)); justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section id="setup-card" class="card">
      <h1>CISSP クイズ</h1>
      <p class="muted">1ファイル版です。ブラウザで開けばそのまま動作します。</p>
      <div class="row">
        <div>
          <label class="inline-label" for="question-limit">連続出題数</label>
          <select id="question-limit">
            <option value="all">すべて</option>
            <option value="1">1問</option>
            <option value="3">3問</option>
            <option value="5">5問</option>
            <option value="10">10問</option>
            <option value="20">20問</option>
          </select>
        </div>
        <div>
          <div class="inline-label">出題ドメイン</div>
          <div class="button-grid two" style="margin-bottom:10px;">
            <button id="select-all-btn" type="button" class="btn-secondary">すべて選択</button>
            <button id="clear-all-btn" type="button" class="btn-secondary">すべて解除</button>
          </div>
          <div id="domain-options" class="domain-list"></div>
        </div>
        <div class="button-grid">
          <button id="start-btn" type="button" class="btn-primary">開始</button>
        </div>
        <div id="setup-error" class="error hidden"></div>
      </div>
    </section>

    <section id="quiz-card" class="card hidden">
      <div class="statusbar">
        <div id="progress-text">0 / 0</div>
        <div id="domain-text">ドメイン -</div>
      </div>
      <h2 id="question-number">Q1</h2>
      <p id="question-text"></p>
      <div id="choices" class="row"></div>
      <div class="button-grid two" style="margin-top:14px;">
        <button id="submit-btn" type="button" class="btn-primary">解答する</button>
        <button id="finish-btn" type="button" class="btn-danger">終了して結果を見る</button>
      </div>
      <div id="explanation" class="explanation hidden"></div>
      <div id="after-answer-buttons" class="button-grid two hidden" style="margin-top:14px;">
        <button id="next-btn" type="button" class="btn-secondary">次の問題</button>
        <button id="summary-btn" type="button" class="btn-secondary">結果を見る</button>
      </div>
    </section>

    <section id="summary-card" class="card hidden">
      <h2>結果</h2>
      <p id="summary-stats"></p>
      <div class="button-grid two" style="margin-top:14px;">
        <button id="restart-btn" type="button" class="btn-primary">最初に戻る</button>
        <button id="retry-wrong-btn" type="button" class="btn-secondary">間違えた問題だけ再挑戦</button>
      </div>
      <div id="summary-list" style="margin-top:14px;"></div>
    </section>
  </div>

<script>
(() => {
  'use strict';

  const QUIZ_DATA = [{"number": "1", "question": "リスクアセスメントにおいて、リスク受容の決定に大きく影響する要素は次のうちどれか。", "choices": ["A. 脅威の発生頻度", "B. 脆弱性の深刻度", "C. 組織のリスク許容度", "D. 技術的対策コスト"], "answer": ["C"], "explanation": "組織のリスク許容度（risk appetite）とは、組織がどの程度のリスクまで許容できるかの指標です。これはリスク受容の判断に直結する重要な要素です。組織の戦略目標、財務状況、ステークホルダーの期待などを総合的に考慮して決定されます（出典：NIST SP 800-39）。例えば、リスク許容度が低い組織では、発生頻度が低くても影響度が大きいリスクは受容せず、対策を講じる傾向にあります。逆にリスク許容度が高い組織では、一定のリスクは受容し、リスク対策コストを抑える判断をすることもあります。", "wrongReasons": "A：脅威の発生頻度は重要な考慮要素ですが、影響度との兼ね合いで判断します。発生頻度が低くても影響が大きければ受容しないケースもあります。\nB：脆弱性の深刻度も影響度の一要素ですが、脅威の発生可能性と組み合わせて評価します。深刻な脆弱性でも発生可能性が低ければリスクは小さくなります。\nD：技術的対策コストは、リスク対応方針（リスク回避/低減/移転/受容）の選択に影響しますが、受容の可否判断では組織のリスク許容度が最も重視されます。", "trap": "確率要素（発生頻度）と影響要素（脆弱性の深刻度）は、リスクの大きさを左右する2大要素ですが、組織のリスク許容度によって、同じリスクでも受容するかどうかの判断が変わります。リスク対応の意思決定では、リスクの定量的な評価に加えて、組織の方針や状況を考慮する必要があります。", "domain": "1"}, {"number": "2", "question": "システム開発のセキュアコーディングにおいて、バッファオーバーフローを防止するために有効なC言語の関数は次のうちどれか。（複数選択可）", "choices": ["A. scanf()", "B. strncpy()", "C. strncat()", "D. fgets()"], "answer": ["B", "C", "D"], "explanation": "バッファオーバーフローの脆弱性は、プログラムが確保したメモリ領域の境界を超えてデータを書き込むことで発生します。これを防ぐには、データを受け取るバッファサイズを厳密に管理し、サイズ以上のデータが入力されても、バッファからあふれないようにコーディングします。\\n\\nstrncpy()は文字列のコピーを行う関数ですが、コピーするバイト数の上限を指定できるため、バッファサイズを超えないよう制御できます（出典：SEI CERT C Coding Standard）。\\nstrncat()は文字列の連結を行う関数で、連結後の文字列長の上限を指定できます。これによりバッファオーバーフローを防げます。\\nfgets()は、指定したサイズを超えないように、標準入力からテキストを読み込む関数です。バッファサイズを第2引数で指定することで、オーバーフローを防止します。\\n\\nこのように、データ入力時にサイズ制限の機能を持つ関数を適切に使用することが、バッファオーバーフローの予防に有効です。", "wrongReasons": "A：scanf()は、フォーマット文字列に基づいて標準入力からデータを読み込む関数ですが、入力サイズの制限ができないため、バッファオーバーフローのリスクがあります。", "trap": "たとえ受け取る変数のサイズは大きくても、念のためバッファサイズの指定に対応した安全関数を使うことが大切だと認識してください。文字列以外でもオーバーフローは発生しうるので、データタイプに応じて慎重にサイズ管理をすることが求められます。", "domain": "1"}, {"number": "3", "question": "情報セキュリティにおけるCIAトライアドの３要素に含まれないものはどれか。", "choices": ["A. 機密性（Confidentiality）", "B. 可用性（Availability）", "C. 責任性（Accountability）", "D. 完全性（Integrity）"], "answer": ["C"], "explanation": "情報セキュリティの基本原則として、機密性、完全性、可用性の3要素（CIAトライアド）が広く知られています（出典：NIST SP 800-12）。\\n\\n機密性（Confidentiality）：情報への不正アクセスを防ぎ、認可された人だけがアクセスできること。\\n完全性（Integrity）：情報が不正に改変されず、正確で一貫していること。\\n可用性（Availability）：認可されたユーザーが必要な時に情報やリソースにアクセスできること。\\n\\nこれら3要素はセキュリティの基本目標であり、情報資産を守るための施策を考える上での指針となります。一方、責任性（Accountability）は、システムの利用者の行動に説明責任を持たせることを指しますが、CIAトライアドの構成要素ではありません。ただし、責任性を確保することは、機密性や完全性の維持に役立つ重要な概念です。", "wrongReasons": "A, B, D：CIAの3要素であるため、正解には該当しません。", "trap": "機密性、完全性、可用性はCIAトライアドの３本柱です。その一方で、責任性、認証、否認防止など、情報セキュリティに関する重要な概念は他にもたくさんあります。そういった関連用語との混同や、「あれもこれも重要だよね」といった乱暴な言葉選択に惑わされないよう注意しましょう。CISSPでは、専門用語を正確に定義・使い分けできることが求められます。", "domain": "1"}, {"number": "4", "question": "リスク低減のための３段階のリスク対応プロセスに含まれるものはどれか。", "choices": ["A. リスク特定", "B. リスク評価", "C. リスク監視", "D. リスク報告"], "answer": ["B", "C"], "explanation": "リスクマネジメントのプロセスにおいて、特定されたリスクに対する効果的な対策を実施するため、以下の3段階のリスク対応サイクルが用いられます（出典：NIST SP 800-39）。\\n\\nリスク評価（Risk Evaluation）：リスクの発生可能性と影響度を分析し、対応の優先順位を判断する。\\nリスク対応（Risk Response）：リスク回避、低減、移転、受容の中から適切な対応を選択し、対策を実施する。\\nリスク監視（Risk Monitoring）：対応の有効性を継続的に監視し、環境変化に応じて見直しを行う。\\n\\nこのサイクルを回すことで、リスクを組織の許容レベル内に収め、情報資産を適切に保護することができます。定期的かつ体系的なリスク評価と監視は、リスクマネジメントの中核をなすプロセスだと言えるでしょう。", "wrongReasons": "A：リスク特定は、リスクマネジメントの全体プロセスに含まれますが、リスク対応の3段階には入りません。リスク特定で洗い出されたリスクに対し、評価、対応、監視のステップを実施します。\nD：リスク報告は、リスクマネジメントにおける重要なコミュニケーションプロセスですが、対応サイクルの主要3要素ではありません。評価や監視の結果は、適切な報告を通じて関係者と共有されます。", "trap": "リスクのライフサイクル全体（特定、評価、対応、監視）と、対応に焦点を当てた3ステップを混同しないようにしましょう。リスクへの具体的なアクションは「対応」の局面で行われますが、その前提として評価が、事後対応として監視が必要になります。リスクマネジメントでは、一連のプロセスを網羅的かつ継続的に回していくことが肝要です。", "domain": "1"}, {"number": "5", "question": "情報セキュリティにおける「可用性」の説明として、最も適切なものはどれか。", "choices": ["A. 認可されたユーザーのみがシステムを利用できる", "B. 認可されたユーザーが必要な時にシステムを利用できる", "C. 障害が発生してもシステムを継続利用できる", "D. 稼働時間を最小限に抑えてシステムを運用できる"], "answer": ["B"], "explanation": "「可用性」は、CIAトライアドの重要な要素の一つです。情報セキュリティに関するISO/IEC 27000では、可用性を「認可されたエンティティが要求したときに、アクセス及び使用が可能な状態にあるプロパティ」と定義しています。つまり、認可されたユーザーが必要なタイミングでシステムやデータにアクセスでき、業務を遂行可能な状態を意味します。システムが適切に稼働し、ユーザーの生産性を支える上で、可用性の確保は欠かせません。\\n具体的には、以下のような施策を通じて可用性を高めていきます（出典：NIST SP 800-34）。\\n\\n冗長化による単一障害点の排除\\n適切なキャパシティ管理によるパフォーマンスの維持\\n迅速な障害復旧のための準備（バックアップ、フェイルオーバーなど）\\n計画的メンテナンスの実施\\n\\n要は、「必要なサービスを、必要な時に、必要なだけ提供できる状態」を保つことが可用性の本質だと覚えておいてください。", "wrongReasons": "A：認可されたユーザーのみがアクセスできるのはアクセス制御の考え方です。アクセス制御は機密性の確保に寄与しますが、可用性とは直接関係しません。\nC：障害時の継続利用を保証するのは、可用性を支える手段の一つですが、可用性の本質的な意味合いではありません。\nD：稼働時間を最小限に抑えることは、可用性の概念と逆行します。可用性が高いシステムは、長時間安定稼働を続けられる特性を持ちます。", "trap": "可用性の説明で「認可されたユーザー」という言葉が出てくると、アクセス制御や機密性と混同しがちです。しかし、可用性の本質は「アクセスできるか」という観点にのみ着目しています。当然、アクセスできるのは認可されたユーザーに限定すべき（機密性確保）ですが、そのことを前提とした上で、認可ユーザーのアクセス可否を問う概念だと理解してください。", "domain": "1"}, {"number": "6", "question": "情報セキュリティにおける「機密性」を達成するために有効な施策はどれか。（複数選択可）", "choices": ["A. 最小権限の原則に基づいたアクセス制御", "B. 暗号化による保存データの保護", "C. 冗長化によるシステムの可用性向上", "D. 定期的なバックアップの実施"], "answer": ["A", "B"], "explanation": "「機密性」は、情報セキュリティの根幹をなすCIAトライアドの一つです。機密性とは、認可されていない個人、エンティティ、プロセスに対して、情報を保護することを指します（出典：NIST SP 800-12）。つまり、アクセスを許可された者だけが、機密情報にアクセスできる状態を保証することが目的となります。\\nこの機密性を確保するために、以下の施策が有効です。\\n\\n最小権限の原則（Principle of Least Privilege）に基づいたアクセス制御：ユーザーやプロセスに対し、職務の遂行に必要最小限の権限のみを付与する。これにより不要なアクセスを排除し、機密情報の露出リスクを抑えられます。\\n暗号化による保存データの保護：機密データを暗号化することで、不正アクセスされても内容を読み取られることを防げます。ディスク暗号化や、データベースの列単位暗号化などが該当します。\\n\\n一方、冗長化やバックアップは、主にシステムの可用性を高める施策です。障害発生時のサービス継続や、データ消失時の復旧を可能にしますが、アクセス制御には直接寄与しません。もちろん可用性も大切な要素ですが、設問の「機密性の達成」という観点では、関連性が薄いと言えるでしょう。", "wrongReasons": "C：冗長化は、障害発生時にもサービスを継続させる技術です。ハードウェアやネットワーク経路を複数用意することで、一部の機器が故障してもシステム全体の稼働を維持できます。これは可用性の向上策であり、機密性とは直接関係ありません。\nD：バックアップは、システム障害やデータ消失などの際に、データを復元するための技術です。定期的にデータのコピーを作成し、安全に保管しておくことで、不測の事態に備えられます。バックアップも可用性の確保に寄与しますが、機密性とは異なる目的です。", "trap": "情報セキュリティでは、機密性、完全性、可用性のバランスを取ることが大切です。それぞれの対策は相互に関連していますが、目的は少しずつ異なります。機密性の本質は「認可されていない者からの保護」です。アクセス制御と暗号化は、不正アクセスを防ぎ、機密データの価値を守る意味で、直接的に機密性に貢献します。一方、冗長化やバックアップは、障害回復に必要な方策ではあるものの、アクセス制御の仕組み自体には関与しません。CISSPで押さえるべきは、各セキュリティ施策の目的を正確に理解し、使い分けられることです。", "domain": "1"}, {"number": "7", "question": "BCP（事業継続計画）とDRP（災害復旧計画）に関する記述のうち、最も適切なものはどれか。", "choices": ["A. BCPはITシステムに特化し、DRPは業務プロセス全体を対象とする", "B. DRPはBCPの一部であり、ITシステムの復旧に焦点を当てている", "C. BCPとDRPは同じ目的を持ち、同義語として使われる", "D. DRPは平常時の業務を定義し、BCPは災害時の対応を規定する"], "answer": ["B"], "explanation": "BCPとDRPは、ともに組織の事業継続性を確保するための計画ですが、その目的と範囲には違いがあります。\\n\\nBCP（Business Continuity Plan, 事業継続計画）：自然災害、大規模システム障害、テロ攻撃などの予期せぬ事態が発生した際に、重要業務を継続または迅速に復旧するための包括的な計画。業務プロセス、ヒト、モノ、カネ、情報など、事業を構成するあらゆる要素を対象とします。\\nDRP（Disaster Recovery Plan, 災害復旧計画）：BCPの一部として策定される、IT システムに特化した復旧計画。災害発生時にシステムを迅速に復旧し、事業継続を支えることを目的とします。バックアップ、代替機器の確保、復旧手順の整備などが含まれます。\\n\\nつまりBCPは事業全体を見据えた上位の計画であり、DRPはその一部としてIT部門が担う役割を定めたものと言えます（出典：NIST SP 800-34）。両者は互いに補完し合う関係にありますが、同じ目的を持つ同義語ではありません。また、DRPにはITシステムの平常時の運用手順も含まれるため、災害対応に限定されるわけでもありません。", "wrongReasons": "A：逆の関係です。BCPは事業全体を対象とし、DRPはITシステムに特化します。\nC：上述の通り、BCPとDRPは目的と範囲が異なるため、同義語ではありません。\nD：平常時と災害時が逆です。BCPが事業全体の継続を定義し、DRPはその一環としてITシステムの復旧を規定します。", "trap": "「ITシステムの復旧」と聞くと、DRPが上位概念のように感じられるかもしれません。しかし、事業継続という大きな目標に照らせば、DRPはBCPに従属する計画の一つに過ぎません。BCPは、ヒト、モノ、カネ、情報といった経営資源全体を対象とした、包括的な継続戦略だと理解しましょう。その中で、ITシステムをいかに保護・回復するかという観点から、DRPが策定されるのです。キーワードは「ITに特化」と「BCPの一部」だと覚えておいてください。", "domain": "1"}, {"number": "8", "question": "リスク対応における「リスク移転」の説明として、適切なものはどれか。", "choices": ["A. 脆弱性を修正してリスクの影響度を下げる", "B. リスクを許容可能な水準まで低減する", "C. リスクを完全に排除して発生確率をゼロにする", "D. リスクによる損失を他者に肩代わりしてもらう"], "answer": ["D"], "explanation": "「リスク移転」は、リスク対応の4つのオプション（回避、軽減、移転、受容）の一つです。リスク移転とは、リスクの財務的影響を、自組織から他の主体（保険会社など）に移すことを指します。典型的には、サイバー保険への加入が該当します。\\nリスク移転の特徴は以下の通りです（出典：NIST SP 800-30）。\\n\\nリスクそのものを軽減・排除するのではなく、リスクが顕在化した際の損失補償を得ること\\nリスクの財務的影響を移転するため、移転先の選択が重要となること\\n保険以外にも、アウトソーシング契約や免責合意なども手段の一つとなること\\n\\nリスク移転は万能ではありません。移転コストと便益のバランスを見極める必要があります。また、評判リスクなど、金銭的補償になじまない損失もあります。しかし、高額な損害賠償リスクを抱える場合など、リスク移転が最良の選択肢となるケースもあるでしょう。CISSPには、リスク対応オプションの特性を正しく理解し、最適な選択を導く能力が求められます。", "wrongReasons": "A：リスク影響度の低減は「リスク軽減」の説明です。脆弱性の修正は軽減策の一例で、移転とは異なる手法です。\nB：許容可能な水準までリスクを下げるのも「リスク軽減」です。移転はリスクそのものを下げるのではなく、顕在時の補償を得る手段です。\nC：リスクを完全になくすことは「リスク回避」の考え方です。リスク移転は、リスクの発生そのものを防ぐ施策ではありません。", "trap": "「リスクを他者に移す」と聞くと、自組織の責任を放棄しているように思えるかもしれません。しかし、リスク移転はリスクマネジメントの正当な選択肢の一つです。保険加入などを通じ、予想される損失に備えることは、むしろ組織の責任と言えます。もちろん、事前の十分なリスク分析と、移転先の信頼性評価は欠かせません。リスクを丸投げするのではなく、自組織で管理しきれない部分を戦略的に移転する、という発想が重要だと心得ておきましょう。", "domain": "1"}, {"number": "9", "question": "情報セキュリティにおける「否認防止」の説明として、最も適切なものはどれか。", "choices": ["A. システムの設定ミスを防止すること", "B. なりすましによる不正アクセスを防ぐこと", "C. ユーザーがシステム利用を拒否できないようにすること", "D. ユーザーが自分の行為を否認できないようにすること"], "answer": ["D"], "explanation": "否認防止（Non-repudiation）は、情報セキュリティの重要な目標の一つです。否認防止とは、ある行為を実行したエンティティが、後にその事実を否定できないようにすることを指します（出典：NIST SP 800-57）。つまり、「誰が、いつ、何をしたか」を証明できる仕組みを整えることが狙いです。\\n具体的な実現手段としては、以下のようなものがあります。\\n\\nデジタル署名：送信者の秘密鍵で署名することで、本人以外が生成できないデータを作り出します。これにより送信事実を証明できます。\\nタイムスタンプ：ある時点で対象データが存在していたことを証明します。改ざん検知とも組み合わせ、事実の存在証明に役立ちます。\\n監査ログ：誰がいつシステムにアクセスし、何を行ったかを記録に残します。証跡を追跡できるようにします。\\n\\nこれらの技術的対策に加えて、ポリシーや契約による利用者への意識付けも重要です。否認防止は、セキュリティインシデントの原因追及や法的紛争の解決に寄与します。ログの保全は、フォレンジック調査の基礎ともなるでしょう。CISSPには、これらの対策の意義と限界を踏まえ、最適な仕組みを設計する力量が問われます。", "wrongReasons": "A：システム設定ミスの防止は、否認防止とは無関係です。堅牢な設定は重要ですが、ユーザー行為の証跡には直結しません。\nB：なりすまし防止は、否認防止の前提条件と言えます。本人認証は「主体の確認」であり、行為の追跡可能性とは異なる概念です。\nC：ユーザーにシステム利用を強制するのは、可用性の考え方に近いですが、これも否認防止とは別の目的です。", "trap": "否認防止の手段として、暗号技術や監査ログなどが用いられるため、機密性や完全性対策と混同されがちです。確かに暗号は機密性に、ハッシュは完全性に資する面もありますが、「行為の証明」に主眼を置くと否認防止の文脈で捉えられます。ポイントは、技術の表層的な見た目に囚われず、その本質的な目的を見抜くことです。CISSPでは、個々のセキュリティ対策を、機密性、完全性、可用性、否認防止など、複数の観点から多角的に理解する力が試されます。", "domain": "1"}, {"number": "10", "question": "フォレンジックに関する記述のうち、最も適切なものはどれか。", "choices": ["A. 未知の脆弱性を発見するためのシステムテスト技法である", "B. 証拠保全を目的とした、事後的なデータの復元と分析の手法を指す", "C. 将来のセキュリティインシデントを予測するためのリスク分析手法である", "D. デジタル証拠を裁判で有効なものとするための法制度の総称である"], "answer": ["B"], "explanation": "フォレンジック（Forensics）とは、証拠を法的に利用できる形で保全、分析、解釈するための科学的手法を指します。サイバー空間においては、デジタルデータの収集と分析を通じて、セキュリティインシデントの原因究明や犯罪捜査に役立てることを目的としています（出典：NIST SP 800-86）。\\nフォレンジックの主な特徴は以下の通りです。\\n\\n事後的（ex-post）なアプローチであり、インシデント発生後の調査に用いられること\\n証拠能力の確保が重要な目的となるため、厳格な手順とツールの使用が求められること\\nディスクイメージの取得、データの復元、タイムライン分析などの技術が駆使されること\\n違法行為の立証のみでなく、原因究明による再発防止にも役立てられること\\n\\n近年、サイバー犯罪の増加に伴い、フォレンジック調査の重要性はますます高まっています。CISSPには、適切な証拠保全の手順を策定し、必要に応じて関係部門と連携しながら、迅速かつ合法的な調査を主導する能力が問われるでしょう。技術的知識はもちろん、証拠能力の意義と限界を踏まえた、総合的な判断力が試されます。", "wrongReasons": "A：脆弱性の発見を目的としたテスト技法は「ペネトレーションテスト」の説明に近いですが、フォレンジックの主眼ではありません。\nC：リスク分析によって将来のインシデントを予測するのは、フォレンジックとは異なる「事前の備え」の範疇です。\nD：フォレンジック調査に関わる法制度は各国で整備されつつありますが、フォレンジックの本質的な意味合いではありません。", "trap": "フォレンジックを学ぶと、データ復元などの技術的側面に目が行きがちですが、証拠能力の確保という法的な要請を意識することが重要です。不適切な手法で収集されたデータは、たとえ有力な情報を含んでいても、裁判では証拠として採用されない可能性があります。chain of custody（証拠の連続性）を保ち、データの信頼性を担保する必要があるのです。CISSPには、技術と法律の両面から、フォレンジックの意義を捉える姿勢が欠かせません。", "domain": "1"}, {"number": "11", "question": "情報セキュリティ対策の実施において、最も重要な役割を果たすのは次のうちどれか。", "choices": ["A. 経営層", "B. システム管理者", "C. 一般従業員", "D. 外部委託先"], "answer": ["A"], "explanation": "情報セキュリティ対策の実効性を高めるには、組織全体でのガバナンス体制の確立が不可欠です。その中でも特に重要なのが、経営層のリーダーシップと関与です。\\n経営層は以下のような役割を果たすことが期待されます（出典：NIST SP 800-100）。\\n\\nセキュリティポリシーの承認と組織全体への浸透\\nセキュリティ投資の意思決定と予算の確保\\nCISOの任命などセキュリティ推進体制の整備\\nインシデント対応計画の承認と緊急時の判断\\n\\n経営層がセキュリティの重要性を理解し、強力なコミットメントを示すことで、従業員のセキュリティ意識も高まります。トップダウンのアプローチにより、セキュリティ文化の醸成が可能となるのです。\\n一方、システム管理者や一般従業員は、定められたポリシーやルールに則って行動することが求められます。外部委託先もまた、契約に基づいてセキュリティ要件を遵守する必要があります。しかし、これらのステークホルダーはあくまで、経営層が決定した方針の実行者という位置づけです。\\nつまり、情報セキュリティの確保は、経営課題として認識され、トップのガバナンスの下で組織一丸となって取り組むべきものだというのが、現在の共通認識と言えるでしょう。CISSPには、技術論のみならず、このようなマネジメントの視点からもセキュリティを捉える俯瞰力が問われます。", "wrongReasons": "B：システム管理者は、セキュリティ施策の運用面で重要な役割を担いますが、全社的な方向性の決定には関与しません。\nC：一般従業員には、セキュリティポリシーの遵守とインシデントの報告が求められますが、対策の意思決定に参画することはありません。\nD：外部委託先は、SLAなどで定められたセキュリティ基準に従う必要がありますが、委託元の経営判断を左右することはできません。", "trap": "システム管理者を選びたくなる気持ちはわかります。確かに彼らは、現場レベルでのセキュリティ対策の要です。しかし、「最も重要」と聞かれれば、経営層の役割を第一に挙げるべきでしょう。経営層の意識なくしては、いくら現場が頑張っても、セキュリティは「コスト」でしかなくなってしまいます。真の意味でセキュリティ文化を根付かせるには、トップの強力なリーダーシップが欠かせないのです。CISSPには、フォレストとツリーを同時に見る、戦略的思考が重要だと肝に銘じておきましょう。", "domain": "1"}, {"number": "12", "question": "情報セキュリティマネジメントシステム（ISMS）の確立・運用において、PDCAサイクルに含まれない要素はどれか。", "choices": ["A. リスクアセスメント", "B. 内部監査", "C. マネジメントレビュー", "D. インシデント対応"], "answer": ["D"], "explanation": "ISMS（Information Security Management System）とは、組織の情報セキュリティを継続的に管理・改善するための体系的な枠組みを指します。ISMSの中核をなすのが、PDCA（Plan-Do-Check-Act）のマネジメントサイクルです。\\nPDCAの各フェーズは以下のように定義されます（出典：ISO/IEC 27001）。\\n\\nPlan（計画）：ISMSの確立。リスクアセスメント、リスク対応、セキュリティ目的・目標の設定など。\\nDo（実行）：計画の実施。セキュリティ施策の導入、運用、教育など。\\nCheck（評価）：ISMSの監視・レビュー。内部監査、セキュリティ指標の測定、是正処置など。\\nAct（改善）：ISMSの維持・改善。マネジメントレビュー、継続的改善など。\\n\\nこのサイクルを繰り返すことで、セキュリティ対策の有効性を担保し、変化する脅威やビジネス要求に適応していくのです。\\n一方、インシデント対応は、セキュリティ事故が発生した際の対処プロセスを指します。予防-検知-封じ込め-根絶-復旧といったフェーズを経て、被害を最小限に食い止め、速やかな業務再開を目指します。これは言わば「有事」の活動であり、平時のPDCAサイクルとは一線を画すものです。\\nもちろん、インシデント対応で得られた教訓をISMSの改善に活かすことが重要なのは言うまでもありません。しかし、インシデント対応それ自体は、PDCAサイクルの外側に位置付けられると理解しておきましょう。CISSPには、平時と有事の活動を峻別した上で、両者を有機的に連携させる統合的視点が求められるのです。", "wrongReasons": "A：リスクアセスメントは、ISMSの計画フェーズ（Plan）で実施される重要なアクティビティです。\nB：内部監査は、ISMSの評価フェーズ（Check）の代表的なタスクの一つです。\nC：マネジメントレビューは、経営層がISMSの実効性をレビューする改善フェーズ（Act）の中核的プロセスです。", "trap": "PDCAサイクルの各フェーズで行われるタスクを細かく見ていくと、「これはどのフェーズに入るんだろう…」と迷うこともあるかもしれません。例えば、セキュリティ教育はDoに含まれますが、教育の有効性評価はCheckの領域とも言えます。重要なのは、細部に囚われずPDCAの大きな流れを掴むこと。そして、その流れの中に「インシデント対応」が直接的には組み込まれていないことを理解することです。CISSPを目指す皆さんには、PDCAサイクルを軸としたISMSの全体像を、鳥瞰図的に把握する力を培ってほしいと思います。", "domain": "1"}, {"number": "13", "question": "情報セキュリティにおける「ディジタルフォレンジック」の主な目的として、適切なものはどれか。（複数選択可）", "choices": ["A. 未知のマルウェアの挙動解析", "B. インシデントの原因究明", "C. 証拠能力のあるデータの保全", "D. システムの脆弱性診断"], "answer": ["B", "C"], "explanation": "ディジタルフォレンジックとは、サイバー空間における不正行為や事故の調査に際し、電子的な証拠を収集・分析し、事実を明らかにするプロセスを指します。犯罪捜査だけでなく、セキュリティインシデントの原因究明にも活用されます。\\nその主な目的は以下の2点に集約されます。\\n\\nインシデントの原因究明：何が起きたのか、いつ、どこで、どのように発生したのかを解明します。これにより、再発防止策の立案やシステムの復旧に役立てられます。\\n証拠能力のあるデータの保全：訴訟やコンプライアンス監査に耐えうる、法的に有効な証拠を確保します。適切な手続きを経て、証拠の改ざんや毀損を防ぐことが重要です。\\n\\nつまり、ディジタルフォレンジックの本質は、「事後的な原因究明」と「証拠保全」にあると言えるでしょう。DFaaS（Digital Forensics as a Service）の台頭など、その重要性は高まっています。\\n一方、未知のマルウェア解析やシステムの脆弱性診断は、どちらかと言えば事前のセキュリティ対策です。事象の予兆を捉え、未然防止を図るアプローチだと捉えられます。これらの活動が重要なのは言うまでもありませんが、ディジタルフォレンジックの本来的な目的とは異なります。\\nCISSPには、ディジタルフォレンジックの意義と役割を正しく理解し、インシデント発生時に適切な調査を主導する力量が求められます。技術的スキルはもちろん、証拠能力の重要性を認識した慎重な行動が不可欠です。最悪の事態を想定し、常日頃から備えを怠らない姿勢が肝要だと心得ておきましょう。", "wrongReasons": "A：マルウェア解析は事前のセキュリティ対策の一環と言えます。フォレンジックの中でマルウェアの痕跡を調べることはありますが、それはあくまで原因究明の一部であり、主目的ではありません。\nD：脆弱性診断も、事前のリスクアセスメントの一環です。発生したインシデントとは直接関係しません。", "trap": "ディジタルフォレンジックに関連する技術用語を聞くと、つい事前対策の話題と混同しがちです。しかし、「forensic」の語源は「法廷に関する」という意味です。あくまで事後的・法的なアプローチだと理解しましょう。「訴訟に耐える証拠」を意識することが重要なのです。\\nまた、原因究明といっても、犯人探しが目的ではないことにも注意が必要です。再発防止こそがゴールなのだと意識してください。ディジタルフォレンジックは、システムの解剖医学とも言えるかもしれません。遺体から死因を探るようなイメージを持つと、事前と事後の予防医学との違いがはっきりするでしょう。", "domain": "1"}, {"number": "14", "question": "リスクアセスメントで算出される「年間予想損失（ALE）」の式として、正しいものはどれか。", "choices": ["A. ALE = SLE × EF", "B. ALE = SLE × ARO", "C. ALE = ARO ÷ EF", "D. ALE = ARO ÷ SLE"], "answer": ["B"], "explanation": "ALEは、リスクの量的評価を行う際の重要な指標です。その計算式は以下のように表されます。\\nALE（Annual Loss Expectancy）= SLE（Single Loss Expectancy）× ARO（Annualized Rate of Occurrence）\\nここでSLEは、1回のセキュリティ事故による予想損失額を指します。これにARO（年間発生頻度）を乗じることにより、年間の予想損失額であるALEが算出されます（出典：NIST SP 800-30）。例えば、1回のデータ漏洩による損失が100万円（SLE）で、年間の発生頻度が0.5回（ARO）と見積もられた場合、ALEは50万円（100万円 × 0.5）となります。\\nALEの意義は、リスクの大きさを可視化し、対策の優先順位付けや投資判断に役立てられることにあります。限られたセキュリティ予算を、最もビジネス影響の大きいリスクに集中投下することができるのです。また、対策前後でのALEの変化を追跡することで、施策の効果検証も可能になります。\\nただし、ALEはあくまで「予想」に基づく指標であることを忘れてはなりません。SLEやAROの見積もりには、一定の不確実性が伴います。ALEを鵜呑みにせず、定性的なリスク分析の結果とも照らし合わせながら、総合的な判断を下すことが肝要です。CISSPには、リスクマネジメントにおける定量・定性両面のアプローチを理解し、ALEの長所と限界を踏まえた上で活用する力が問われるのです。", "wrongReasons": "A：EFは「被害率（Exposure Factor）」を表しますが、通常ALEの計算式には用いられません。被害率はSLEを算出する際に使われることがあります。\nC, D：式の形が逆で、分母と分子が入れ替わっています。この計算式では正しいALEは得られません。", "trap": "SLEとAROは、ともにALEを構成する要素ですが、両者の違いを正確に理解することが重要です。「1回の損失」と「年間の頻度」を混同すると、ALEの解釈を誤ってしまう恐れがあります。また、被害率（EF）は、資産価値に対する1回の損失の割合を示す指標です。リスクの現実化による資産の毀損率と捉えられます。多くの文献では、SLE = 資産価値 × EF という式で説明されています。しかし、ALEを計算する際にEFを使うことはあまりありません。SLEとAROの2つのパラメータに注目すれば、ALEの本質が見えてくるはずです。", "domain": "1"}, {"number": "15", "question": "リスクアセスメントの結果を受けて策定される、一定期間内のセキュリティ対応計画を何と呼ぶか。", "choices": ["A. リスク対応戦略", "B. 事業継続計画（BCP）", "C. POA&M", "D. 情報セキュリティ方針"], "answer": ["C"], "explanation": "POA&M（Plan of Action and Milestones）とは、リスクアセスメントで特定されたギャップに対応するための行動計画を指します。リスクの優先順位に基づき、具体的なタスク、責任者、期限、必要リソースなどを明記します。\\n例えば、アセスメントの結果、データベースのパッチ適用の遅れが重大なリスクとして識別されたとします。このリスクがPOA&Mに落とし込まれると次のようになります。\\nPlan of Action: DBサーバーにパッチを適用し、脆弱性を解消する\\nMilestones:\\n\\nパッチ適用のテストと影響評価を実施（担当：ITインフラ, 期限：6月末）\\n変更管理委員会にて実施日を決定（担当：CISO, 期限：8月初）\\n本番環境にパッチを適用（担当：ITインフラ, 期限：決定日夜間）\\nパッチ適用状況をCIOに報告（担当：CISO, 期限： 翌営業日）\\n\\nこのように、発見されたリスクに対する組織的アプローチを示すのがPOA&Mの役割です。これは、リスクへの対処を一過性のイベントで終わらせるのでなく、継続的改善のサイクルに乗せる上で重要なツールとなります（出典：NIST SP 800-30）。\\n情報セキュリティ活動を組織の戦略目標にまで引き上げ、ビジネスとの連携を密にするツールとしても、POA&Mの意義は小さくありません。CISSPには、リスクアセスメントを行動可能なPOA&Mへと昇華させ、関係部門を巻き込んだコミットメントを引き出す、実践的なリーダーシップが問われるのです。", "wrongReasons": "A：リスク対応戦略は、リスク回避・軽減・移転・受容などの基本的な選択肢を指します。POA&Mは、選択された対応戦略に基づく具体的行動計画です。\nB：事業継続計画（BCP）は、災害やセキュリティインシデント発生時の事業復旧計画を指します。平時のPOA&Mとは別物です。\nD：情報セキュリティ方針は、組織の情報セキュリティに関する基本スタンスや原則を示した上位文書です。個別具体的なリスク対応を示したPOA&Mとは性質が異なります。", "trap": "リスク管理プロセスに登場する様々な成果物の違いを、明確に理解しておくことが肝要です。リスク対応戦略、情報セキュリティ方針、POA&Mは、いずれもリスクアセスメントと関連はしますが、それぞれ別の目的と内容を持っています。特に、「リスク対応戦略」と「POA&M」を混同しやすいかもしれません。前者が「どうするか」を示すハイレベルな意思決定だとすれば、後者は「具体的に何をするか」を詳細化した実行計画だと理解しましょう。CISSPには、セキュリティ文書の体系と連携を俯瞰的に把握する力が求められます。", "domain": "1"}, {"number": "16", "question": "リスク分析手法のうち、脅威の発生確率と影響度を数値化せず、主観的な尺度で評価するのはどれか。", "choices": ["A. 定量的リスク分析", "B. 定性的リスク分析", "C. 確率論的リスク分析", "D. ベイジアンリスク分析"], "answer": ["B"], "explanation": "リスク分析の手法は、大きく定量的手法と定性的手法に分けられます。定性的リスク分析とは、確率や影響度を数値ではなく、主観的な尺度（高・中・低など）で評価するアプローチを指します。\\n例えば、「この脆弱性が悪用される可能性は中程度で、悪用された場合のビジネスインパクトは大きい」といった具合に、専門家の経験則に基づく判断を下します。具体的には、脅威と脆弱性のマッピング、リスクマトリクスの作成、リスクシナリオの記述などの手法が用いられます。\\n定性的手法の利点は、比較的短時間で広範なリスクを洗い出せること、専門的な統計スキルを要さないこと、定量化が難しい要因も考慮に入れられることなどが挙げられます（出典：NIST SP 800-30）。一方、評価の再現性に乏しい、定量的な費用対効果分析ができない、などの限界もあります。\\n対するに定量的リスク分析は、脅威の発生頻度や影響度を客観的なデータや統計モデルに基づいて数値化し、年間予想損失（ALE）などの定量的指標を算出します。確率論やベイジアンネットワークなどの数理モデルを駆使するのが特徴です。定量的手法は、投資判断の根拠を与える、異なるリスクシナリオの比較が可能になる、などのメリットを持つ一方、分析に時間と専門スキルを要する、定量化のための前提条件に依存するなどの課題もあります。\\nCISSPには、定性的・定量的の双方のアプローチを理解した上で、対象とするシステムの特性や、利用可能なリソース・スキルに応じて、適切な手法を使い分ける力量が問われます。一般的には、まず定性的な分析で全体像を把握し、その上で重点領域について定量的な分析を行うのが望ましいとされています。リスクの可視化と、エビデンスに基づく意思決定。その両立こそが、CISSPたる者の醍醐味と言えるでしょう。", "wrongReasons": "A：定量的リスク分析は、数値に基づく客観的な評価手法です。主観的尺度は用いません。\nC：確率論的リスク分析は、定量的手法の一種です。確率分布を用いてリスクを数値化します。\nD：ベイジアンリスク分析も、ベイズの定理に基づく定量的手法の一つです。", "trap": "「主観的」という言葉の響きから、定性的分析を一概に不正確だと決めつけてはいけません。定性分析にも、経験豊富な専門家の知見を活用できる、簡便にリスクの全貌を描ける、といった強みがあります。大切なのは、定性と定量のアプローチを状況に応じて使い分け、組み合わせる柔軟な発想です。例えば、定性分析で洗い出した重大リスクについて、ALEを算出して対策の優先順位を決める。こうした定性と定量の連携プレーにこそ、CISSPの真価が問われると言っても過言ではありません。分析手法の特性を多面的に理解し、使いこなす力を磨いていきましょう。", "domain": "1"}, {"number": "17", "question": "情報セキュリティにおける「リスク受容」の説明として、最も適切なものはどれか。", "choices": ["A. リスクを許容可能な水準に低減する", "B. リスクをサードパーティに移転する", "C. リスクを完全に排除する", "D. リスクを引き受けて対処しない"], "answer": ["D"], "explanation": "リスク受容とは、特定されたリスクについて、積極的な対策を講じずに、そのまま引き受ける意思決定を指します。リスクの発生可能性や影響度が小さく、対策コストとのバランスを考えた上で、意図的に受け入れるのです。\\n例えば、10年に1回の頻度でしか起こらない小規模な事象について、対策に多大なコストがかかるなら、リスクを受容するという判断もありえます。ただし、この判断には経営層の承認が不可欠です。\\nリスク受容の要件は以下のようにまとめられます（NIST SP 800-39）。\\n\\n受容の根拠が文書化され、経営層の承認を得ていること\\n受容したリスクをモニタリングし、条件変化に対応できること\\n受容の意思決定が、組織のリスク選好やリスク許容度と整合していること\\n\\n「何も対策しない」というと無責任に聞こえますが、リスク受容にはそれなりの合理性が求められるのです。資源には限りがあるのだから、リスクとの共存を選択することも、リスクマネジメントの重要なオプションと言えます。\\nCISSPには、ゼロリスクの追求に陥ることなく、ビジネス要求とのバランスを取りながら、最適なリスク対応を導く能力が問われます。リスクを100%排除するのではなく、組織の事業目標に照らして、戦略的に管理していく。それこそがプロに求められる、自律的なリスクテイクの姿勢だと肝に銘じるべきでしょう。", "wrongReasons": "A：リスクを低減するのは、リスク受容とは異なる「リスク軽減」の説明です。\nB：リスクをサードパーティに移転するのは「リスク移転」の説明です。\nC：リスクを完全に排除するのは「リスク回避」の考え方です。", "trap": "「リスクを受け入れる」と聞くと、消極的な響きを感じるかもしれません。しかし、現実の世界に完璧なセキュリティはありません。あらゆるリスクに備えようとすれば、ビジネスの機動性を損ねかねません。CISSPに求められるのは、ゼロリスクへの過度な固執ではなく、ビジネスとセキュリティのバランス感覚なのです。リスクを100%排除するのではなく、ビジネスの文脈でコントロールする。そのためのオプションの一つとして、リスク受容を位置づける柔軟な思考が大切です。ただし、受容の判断には細心の注意が必要なことは言うまでもありません。その意思決定プロセスと根拠を説明できることが、CISSPの責務だと心得ておきましょう。", "domain": "1"}, {"number": "18", "question": "事業継続計画（BCP）と災害復旧計画（DRP）の関係について、正しい記述はどれか。", "choices": ["A. BCPはITシステムに、DRPはビジネスプロセス全体に焦点を当てる", "B. DRPはBCPの一部であり、ITシステムの復旧手順を詳細化したものである", "C. BCPとDRPは同じ目的を持ち、組織の事業継続性を確保する", "D. DRPは予防的な計画、BCPは災害発生後の対応計画を指す"], "answer": ["B"], "explanation": "事業継続計画（BCP）と災害復旧計画（DRP）は、ともに組織の事業継続性を確保するための計画ですが、その目的と範囲には違いがあります。\\nBCPは、自然災害、テロ攻撃、大規模システム障害など、あらゆる予期せぬ事態に対して、重要業務を継続または迅速に復旧するための包括的な計画です。人員、施設、設備、情報システムなど、事業を構成するあらゆるリソースを対象とし、代替拠点の確保、バックアップ体制の整備、業務プロセスの見直しなどの施策を含みます（ISO 22301）。\\n一方、DRPはBCPの不可欠な構成要素であり、災害発生時のITシステムの復旧手順に特化したものです。バックアップからのリストア、代替機器の調達、復旧優先順位の決定など、システムの運用視点から復旧の詳細を定めます。\\nつまり、BCPは事業全体の継続を司る上位計画、DRPはその中でITインフラの復旧を担う下位計画と位置づけられます。両者は相互補完的であり、密接に連携しながら、組織のレジリエンス向上に寄与するのです。\\nCISSPには、平時の予防策と有事の対応策、ビジネスの要求とITの実力、これらを包括的に捉え、BCPとDRPのシームレスな連携を実現する力量が求められます。危機管理の要諦は平時にあり。その意識を持って、BCPとDRPの実効性を高めていくことが肝要です。", "wrongReasons": "A：BCPとDRPの対象範囲が逆です。BCPはビジネス全体、DRPはITシステムに焦点を当てます。\nC：BCPとDRPは目的を共有しますが、計画の粒度や詳細度は異なります。DRPはBCPの一部と捉えるのが適切です。\nD：DRPが予防、BCPが事後対応という説明は正しくありません。両者とも、平時の準備と有事の行動計画の両面を持ちます。", "trap": "BCPとDRPの関係を、上位-下位、全体-部分といった観点で捉えることが重要です。また、両者が排他的ではなく、相互に補完し合う関係にあるという理解が欠かせません。「ITシステムの復旧」と聞くと、DRPが独立した計画のように思えるかもしれませんが、あくまでBCPの不可分の一部だと認識しましょう。経営層が牽引するBCPと、IT部門が主導するDRPが、一つの目標に向かって協調する。そのためには両者の間に立ち、かじ取りを担うCISSPの?在が不可欠なのです。ビジネスインパクト分析から復旧手順の実装まで、一気通貫で捉える構想力が試されます。", "domain": "1"}, {"number": "19", "question": "情報セキュリティ意識向上トレーニングの特徴として、最も適切なものはどれか。", "choices": ["A. 特定の情報システムやアプリケーションの操作方法を教えること", "B. 技術的・専門的なセキュリティスキルを養成すること", "C. 組織の全従業員に、情報セキュリティの重要性を認識させること", "D. IT部門の担当者に、インシデント対応の手順を周知徹底すること"], "answer": ["C"], "explanation": "情報セキュリティ意識向上トレーニングは、組織のすべての構成員を対象に、情報資産の重要性と、それを守ることの意義を浸透させることを目的とします。機密情報の適切な取り扱い、ソーシャルエンジニアリング攻撃への警戒、セキュリティポリシーの遵守など、日常の行動レベルでセキュリティを意識づける活動です。\\n意識向上トレーニングの特徴は以下のようにまとめられます（NIST SP 800-50）。\\n\\n対象は組織の全従業員。パートや派遣社員も含む\\n目的はマインドセットの変革。知識よりも意識に訴求\\n内容は包括的、一般的。専門的な技術は扱わない\\n形式は対面セッション、eラーニング、ポスター掲示など多様\\n\\nつまり、意識向上トレーニングは、特定の技術や製品の使い方を教えるものではなく、セキュリティに対する組織文化、価値観そのものに働きかける活動なのです。\\n最近は、サイバー攻撃の手口も巧妙化し、テクノロジーだけでは防ぎきれなくなっています。従業員一人ひとりのセキュリティマインドこそが、組織の安全を支える最後の砦と言えるでしょう。CISSPには、システムの利用者である「人」を教育し、導く力が求められます。意識向上こそ、人的脆弱性への最良の治療法だと肝に銘じるべきです。", "wrongReasons": "A：特定のシステムやアプリケーションの操作方法は、意識向上トレーニングではなく、技術トレーニングの範疇です。\nB：高度な技術スキルの養成は、意識向上トレーニングの目的ではありません。一般利用者向けの基礎知識が中心です。\nD：インシデント対応手順の周知は、主にIT部門が担います。意識向上では組織全体への働きかけが肝要です。", "trap": "セキュリティ意識向上の施策というと、ともすれば形式的なお題目に終わりがちです。しかし、CISSPたる者は、それを「生きた」活動に昇華させる使命を帯びています。従業員一人ひとりの行動変容を促すには、機械的な知識の伝達ではなく、セキュリティの意義を腑に落ちさせる双方向のコミュニケーションが欠かせません。押し付けでも、お遊戯でもない。一人ひとりが当事者意識を持って、自分ごととしてセキュリティを捉えられるよう導いていく。それこそがCISSPに期待される真の教育力だと心得ておきましょう。100人のセキュリティ意識を醸成する働きかけにこそ、1つの技術を習得する以上の価値があるのです。", "domain": "1"}, {"number": "20", "question": "情報セキュリティガバナンスにおける取締役会の責務として、適切なものはどれか。（複数選択可）", "choices": ["A. 情報セキュリティポリシーを承認すること", "B. セキュリティインシデントの技術的な原因を調査すること", "C. CISOの任命など、セキュリティ推進体制を整備すること", "D. 情報資産の管理状況を内部監査すること"], "answer": ["A", "C"], "explanation": "情報セキュリティガバナンスにおいて、取締役会は組織の最高意思決定機関として、極めて重要な役割を担います。経営戦略の一環としてセキュリティ課題に取り組み、リーダーシップを発揮することが求められるのです。\\n具体的には、以下のような責務が取締役会に期待されます（出典：COBIT 5）。\\n\\n情報セキュリティポリシーの承認：セキュリティの基本方針を決定し、組織全体に浸透させること\\nセキュリティガバナンス体制の整備：CISOの任命、セキュリティ委員会の設置など、推進力を確保すること\\nリスク選好とリスク許容度の決定：組織がどの程度のリスクを受容するかの大方針を示すこと\\nセキュリティ投資の意思決定：予算配分など、経営資源の投下を判断すること\\n\\n要するに、組織のセキュリティ活動の羅針盤を示し、舵取りを行うことこそ、取締役会に委ねられた使命なのです。\\nもちろん、取締役会がセキュリティの細部に立ち入ることは現実的ではありません。インシデント原因の究明や、資産管理の監査は、それぞれの専門部署が担当します。あくまで取締役会の役割は、セキュリティマネジメントの実効性を上位層から保証することにあります。\\nCISSPたる者は、サイバーセキュリティを単なる技術課題としてではなく、コーポレートガバナンスの重要事項として経営層に認識してもらう役割を担っています。セキュリティの目的を事業目標に適合させ、トップのコミットメントを引き出すことこそ、真のセキュリティリーダーシップの発揮と言えましょう。", "wrongReasons": "B：インシデントの技術的原因の調査は、CSIRT（Computer Security Incident Response Team）など、専門チームの役割です。\nD：情報資産の管理状況の監査は、内部監査部門など、独立したモニタリング部署が担当します。", "trap": "経営層の関与というと、ともすれば「お題目」になりがちですが、CISSPには、それを実効的なコミットメントに昇華させる力量が問われます。機微な顧客情報の漏洩が、深刻な信用毀損を招く。サイバー攻撃で工場がストップすれば、莫大な機会損失に直結する。こうした事業リスクとサイバーリスクの相関関係を可視化し、平易に説明できなければなりません。経営者の関心を引くには、ROI（投資対効果）の観点も欠かせません。いくらセキュリティ対策に投じれば、どれだけ損失を回避できるのか。定量的なシミュレーションを示せれば説得力が増すでしょう。CISSPには、技術と経営の橋渡し役として、両者をシームレスに繋ぐ高度なコミュニケーション力が要請されるのです。", "domain": "1"}, {"number": "21", "question": "情報セキュリティにおける「ISO/IEC 27001」の説明として、最も適切なものはどれか。", "choices": ["A. 金融機関のためのサイバーセキュリティフレームワーク", "B. 情報セキュリティマネジメントシステム（ISMS）の要求事項を規定した国際規格", "C. 米国連邦政府機関のセキュリティ管理策標準ガイドライン", "D. ソフトウェア開発におけるセキュアコーディング指針"], "answer": ["B"], "explanation": "ISO/IEC 27001は、情報セキュリティマネジメントシステム（ISMS）の国際規格として広く知られています。ISMSとは、組織の情報資産を継続的に保護・管理するための枠組みのことを指します。\\nISO/IEC 27001の特徴は以下のようにまとめられます。\\n\\nあらゆる規模、業種の組織に適用可能な汎用的な規格であること\\nPDCAサイクルによる継続的改善を重視していること\\nリスクアセスメントに基づくリスク対応を要求していること\\n114項目の管理策を列挙し、組織の状況に応じた取捨選択を求めていること\\n\\nつまり、ISO/IEC 27001は、特定の技術や製品を規定するのではなく、組織がISMSを確立・運用・監視・改善するための要求事項を定めた規格だと言えます。この規格に適合することで、情報セキュリティに関する第三者認証を取得することも可能です。\\n世界中のあらゆる組織が直面するサイバーリスクの脅威。ISO/IEC 27001は、そうした課題に組織的・体系的に取り組むための羅針盤となる文書だと言えるでしょう。CISSPたる者は、この規格の要点を押さえた上で、自組織の状況に即した賢明な活用を図ることが求められます。規格の「文言」ではなく、その「真意」を読み取る力。それこそがセキュリティのプロフェッショナルに欠かせない洞察力だと心得ておくべきです。", "wrongReasons": "A：金融機関向けのサイバーセキュリティフレームワークとしては、米国のFISC CSF（Financial Services Sector Cybersecurity Framework）などが知られていますが、ISO/IEC 27001は業界を限定しない汎用規格です。\nC：NISTのSP 800シリーズが、米国連邦政府のためのセキュリティガイドラインとして有名ですが、ISO/IEC 27001はグローバルに適用される民間の規格です。\nD：ソフトウェア開発のセキュアコーディング指針は、ISO/IEC 27001の管理策の一部に含まれますが、規格の主眼ではありません。", "trap": "情報セキュリティ分野の規格やフレームワークは数多く存在し、その名称の類似性から混同しがちです。例えば、NIST SP 800-53とISO/IEC 27001はともにセキュリティ管理策を列挙していますが、前者は米国政府向け、後者は民間向けという違いがあります。また、サイバーセキュリティフレームワーク（CSF）と聞くと、NIST CSFを思い浮かべる人が多いかもしれません。しかし、ISO/IEC 27001こそ、世界でもっとも採用されているCSFと言っても過言ではないのです。規格の背景にある「標準化団体の性質」「適用対象の組織」「規制上の位置づけ」など、名称の奥にある本質的な意味合いを見抜く力が試されます。CISSPを目指す皆さんには、規格の数々を縦横無尽に使いこなす、柔軟な理解力を培っていただきたいと思います。", "domain": "1"}, {"number": "22", "question": "情報セキュリティにおける「機密性・完全性・可用性」の3つの観点から見て、適切な記述はどれか。（複数選択可）", "choices": ["A. 機密性は、アクセス制御と暗号化によって担保される", "B. 完全性は、情報が権限のない変更から保護されることを意味する", "C. 可用性は、情報にアクセスできる人を制限することを目的とする", "D. 機密性と可用性はトレードオフの関係にあり、両立させることは難しい"], "answer": ["A", "B"], "explanation": "機密性（Confidentiality）、完全性（Integrity）、可用性（Availability）は、情報セキュリティの3大要素として知られる「CIAトライアド」を構成します。それぞれの意味を正しく理解することは、CISSPの基本中の基本と言えるでしょう。\\n\\n機密性：情報への不正アクセスを防止し、認可された者だけがアクセスできる状態を確保すること。アクセス制御と暗号化が2大の柱となります。\\n完全性：情報が破壊、改ざん、書き換えなどから保護され、正確で完全な状態を保つこと。権限のない変更を防ぐことが肝要です。\\n可用性：認可されたユーザーが、必要な時に中断なく情報にアクセスできる状態を維持すること。システムの信頼性と耐障害性の確保が重要となります。\\n\\nここで押さえておくべきは、3つの要素が独立しているのではなく、相互に関連し合っているという点です。例えば、機密性を重視するあまり厳格なアクセス制御を施せば、肝心な情報が必要な時に使えない事態を招きかねません。逆に可用性を優先して認証を緩くすれば、機密漏洩のリスクが高まります。\\nつまり、CIAトライアドの真髄は、3要素のバランスを取ることにあるのです。ビジネスの特性や扱う情報の性質に応じて、最適な均衡点を見出すこと。それこそがCISSPの腕の見せ所だと言えましょう。機密性、完全性、可用性。それぞれの本質を深く理解した上で、トレードオフを視野に入れつつ、シームレスに融合させる。その統合力こそがセキュリティのプロフェッショナルの真価なのです。", "wrongReasons": "C：可用性の目的は、正当なユーザーによるアクセスを確保することであり、アクセス制限ではありません。アクセス制限は機密性の範疇です。\nD：機密性と可用性は確かにトレードオフの関係にありますが、どちらを優先するかは一概に言えません。ビジネス要件に応じたバランス取りが肝要で、工夫次第である程度は両立可能です。", "trap": "CIAトライアドを学ぶ際、ともすれば3要素を個別の目標と捉えがちですが、それでは不十分です。大切なのは、3つの要素が相互に作用し合う「力学」を理解することです。例えば、可用性を無視して機密性ばかりを追求しては、現場からの反発を招くでしょう。逆に機密性をないがしろにすれば、いくら使い勝手が良くても、致命的な情報漏洩を引き起こしかねません。CISSPの腕の見せ所は、セキュリティと利便性、保護と活用のバランスを取ることにあります。機密性を確保しつつ、現場の生産性も損ねない。完全性を担保しながら、イノベーションの芽も摘まない。可用性を維持しつつ、不正アクセスも防ぐ。そのための創意工夫と高度な判断力が問われるのです。CIAトライアドの真の理解とは、3要素の「緊張関係」を体得し、状況に応じて最適解を導き出す応用力だと肝に銘じておきましょう。", "domain": "1"}, {"number": "23", "question": "コンピュータの安全な廃棄やリース返却に際し、ストレージ上のデータを完全に復元不可能にする作業を指す用語はどれか。", "choices": ["A. サニタイゼーション", "B. パージング", "C. クリアリング", "D. ブリーチング"], "answer": ["A"], "explanation": "サニタイゼーション（Sanitization）とは、ストレージメディアからデータを完全に除去し、復元を不可能にするプロセスを指します。具体的な方法としては、上書き消去、メディアの破壊、暗号化鍵の破棄などが該当します。\\nサニタイゼーションの目的は、機密情報の漏洩を防ぐことにあります。PCやストレージの廃棄、リース返却、売却などの際、ディスク上に残留したデータが悪意ある第三者の手に渡れば、深刻なセキュリティインシデントを招きかねません。そうしたリスクを未然に防ぐためには、物理的・論理的に完全なデータ抹消が不可欠なのです。\\nサニタイゼーションの重要性は、規格や基準の中でも強調されています。例えば、米国国防総省のガイドラインDOD 5220.22-Mでは、機密指定解除されたストレージの処分方法を詳細に規定。NISTのSP 800-88では、サニタイゼーションの具体的な手順と検証方法を網羅的に解説しています。\\nCISSPを目指す皆さんには、こうした規格の要件を理解しつつ、自組織のビジネス特性に即した現実的な対策を講じる力量が問われます。外部流出のリスクを過小評価せず、かといって過剰投資に陥らない。コストとベネフィットのバランスを取りつつ、着実にサニタイゼーションを推進する。攻めと守りのバランス感覚こそ、セキュリティのプロに欠かせない素養だと肝に銘じるべきでしょう。", "wrongReasons": "B：パージング（Purging）は、ストレージメディアから情報を除去する方法の一つですが、必ずしも完全な復元不可能性までは保証しません。\nC：クリアリング（Clearing）は、情報をメディアから除去する方法の一つですが、専門的な技術や装置を用いれば、データを復元できる可能性が残ります。\nD：ブリーチング（Bleaching）は、サニタイゼーションの文脈では一般的な用語ではありません。", "trap": "メディアの廃棄やリースアップ時のデータ消去は、つい後回しにされがちな領域です。目に見えない脅威だけに、その重要性が軽視されることも少なくありません。しかし、データ漏洩の実例を見れば、その脅威は決して他人事ではないことが分かります。2008年、英国の国民保健サービス（NHS）から廃棄予定のPCが盗まれ、患者18万人分の個人情報が流出した事件は記憶に新しいところです。こうした教訓に学び、サニタイゼーションの意義を組織全体で共有することが肝要です。加えて、技術的な手順の確立と、その着実な運用も欠かせません。データの完全消去を確実なものとするには、管理の目が行き届いた体制づくりが不可欠だからです。システムの設計段階からサニタイゼーションを視野に入れ、現場の声に耳を傾けながら、息の長い取り組みを続ける。CISSPには、そうした地道な努力を通じて、組織のセキュリティ文化を根付かせていく忍耐力が期待されています。", "domain": "1"}, {"number": "24", "question": "次の記述のうち、情報セキュリティにおける「クリアデスク・クリアスクリーンポリシー」の目的として最も適切なものはどれか。", "choices": ["A. 従業員のデスクを整理整頓し、業務効率を上げること", "B. 画面ロックとログオフを徹底し、不正アクセスを防ぐこと", "C. 機密情報を人目に触れないよう安全に保管すること", "D. クリーンデスクを啓発し、社内の美化意識を高めること"], "answer": ["C"], "explanation": "クリアデスク・クリアスクリーンポリシーとは、従業員が席を離れる際、机上に書類を放置せず、コンピュータ画面に機密情報を表示させないことを定めた規則です。その主目的は、機密情報の不用意な漏洩や、第三者による不正な閲覧を防ぐことにあります。\\n例えば、クリアデスクポリシーでは以下のような実践が求められます。\\n\\n機密文書は常に施錠されたキャビネットに保管し、席を離れる際は鍵をかける\\n重要書類を机上に放置しない。コピー機にも原本を置いたままにしない\\n使わなくなった書類はシュレッダーにかける。ゴミ箱に丸ごと捨てない\\n記入途中の伝票や、付箋に書いたメモにも注意を払う\\n\\n一方、クリアスクリーンポリシーには次のような実践が含まれます。\\n\\n離席時にはCtrl+Alt+Delを押してスクリーンをロックする\\n長時間席を離れる際はログオフする\\n第三者が画面を盗み見しないよう、モニターの向きに気をつける\\nパスワードなどの機密事項を画面に貼り付けない\\n\\nこうした一つ一つの心がけの積み重ねが、情報漏洩のリスクを大きく低減するのです。たかが机の上、されどデスクの上。そこにこそ、セキュリティの要諦があると言っても過言ではありません。\\nCISSPを目指す皆さんには、ルールを形骸化させることなく、その真意を社内に浸透させる evangelist としての役割が期待されます。机の整頓が目的化するのではなく、あくまで機密保護の手段であると説いていく。ともすれば軽視されがちな、人的側面のセキュリティ対策。その重要性を説き、習慣化を促すことは、CISSPの重要な使命だと肝に銘じておくべきでしょう。", "wrongReasons": "A：業務効率の向上は、クリアデスクの副次的効果と言えますが、主目的ではありません。\nB：不正アクセス防止は、クリアスクリーンポリシーの目的の1つですが、クリアデスクの主眼ではありません。\nD：美化意識の向上は、クリアデスクの副産物と言えますが、セキュリティとは直接関係しません。", "trap": "情報セキュリティの文脈で「クリアデスク」と聞くと、ともすればオフィスの整理整頓を思い浮かべがちです。机の上を片付ければ、それで責任を果たしたと錯覚しかねません。しかし、クリアデスクの本質は、あくまで「機密情報の非保護状態をなくす」ことにあります。整頓そのものが目的なのではなく、どんな情報がデスクに放置されているか、離席中に誰の目に触れうるか。そうしたことへの感度を高めることこそが肝要なのです。同様に、ディスプレイに常時機密情報を表示していれば、いくらログオフを徹底しても、意味がありません。クリアスクリーンの本義は、パスワードの定期変更よりも、「秘密は画面に出さない」という習慣づけにこそあるのです。CISSPの皆さんには、ルールの形式的な適用に陥ることなく、その本質的な意義を見抜く慧眼が求められます。机の上の整理や、画面のロックは、あくまで情報を守るための「手段」。その先にある「目的」を見失わせないよう、意識を喚起し続ける。それこそがセキュリティ人材に期待される真の啓発力だと言えましょう。", "domain": "1"}, {"number": "25", "question": "事業継続計画（BCP）において、重大な中断が発生したときに事業を再開するまでに許容できる最大の時間を表す目標値を何というか。", "choices": ["A. RPO（目標復旧時点）", "B. RTA（目標復旧行動）", "C. RTO（目標復旧時間）", "D. RCO（目標再開時間）"], "answer": ["C"], "explanation": "RTO（Recovery Time Objective）は、事業継続計画（BCP）における重要な指標の一つです。災害やシステム障害などによって重大な事業中断が発生した際、中核的な事業機能をどの程度の時間内に復旧させるかという目標値を指します。\\n例えば、オンライン販売を主力とする企業では、Webサイトの停止が即、売上げの損失に直結します。そこで、Webサーバーが停止した場合のRTOを2時間以内と設定したとします。するとBCPチームは、その目標を達成するために、バックアップサイトの構築、データのレプリケーション、復旧手順の文書化など、様々な対策を講じることになるのです。\\nRTOは、ビジネスインパクト分析（BIA）の結果を踏まえて決定されます。事業中断による財務的損失、評判の悪化、契約義務の不履行など、様々な影響を定量的に評価した上で、許容できるダウンタイムの限界値を見極めるのです。\\nこのRTOを現実的な目標として設定し、着実に達成していくことこそが、事業継続マネジメントの要諦だと言えましょう。CISSPを目指す皆さんには、システムの技術的な復旧力と、事業の継続要件をシームレスに結び付け、説得力のあるRTOを導き出す力量が問われます。ビジネスの言葉でRTOの意義を説明し、経営層の理解と支持を取り付ける。災害対策を、コストセンターから、価値創造の源泉へと昇華させる。その変革を牽引するのが、真のセキュリティリーダーの役割だと肝に銘じておくべきでしょう。", "wrongReasons": "A：RPO（目標復旧時点）は、障害発生後、復旧すべき時点を指すもので、データのバックアップ頻度などを決める指標となりますが、事業再開の時間とは異なります。\nB：RTA（目標復旧行動）は、BCPの文脈では一般的な用語ではありません。\nD：RCO（目標再開時間）は、RTOとほぼ同義ですが、一般的にはRTOの方がよく使われる表現です。", "trap": "ビジネス視点のRTOと、システム視点のRPOは、ともすれば混同されがちな概念です。確かに両者は表裏一体をなすもので、切っても切り離せない関係にあります。しかし、RTOがダウンタイムの長さ、つまり「どのくらいで再開するか」を問題にするのに対し、RPOはデータ損失の限度、つまり「どの時点まで巻き戻すか」を問題にします。コインの両面のように、車の両輪のように、相互に規定し合いながらも、役割は異なるのです。CISSPたる者は、ビジネスインパクトの文脈でRTOを語りつつ、その実現手段としてRPOを設計する。両者を混同することなく、しかし別個のものとも捉えない。そのバランス感覚こそが、セキュリティのプロに問われる真骨頂だと言えましょう。加えて、RTO/RPOを精緻に定めるだけでなく、それを組織文化に昇華させる実践力も欠かせません。机上の空論に終わらせず、現場の行動を変えていく。その推進力を持って初めて、真のセキュリティリーダーと呼べるのです。皆さんには、RTO/RPOをビジネスと技術の架け橋として活用し、レジリエンス向上をリードする存在となっていただきたい。それこそがCISSPの本懐だと信じています。", "domain": "1"}, {"number": "26", "question": "情報セキュリティにおける「責任追跡性（Accountability）」の説明として、最も適切なものはどれか。", "choices": ["A. 情報資産の機密性を保護すること", "B. システムの可用性を維持すること", "C. 個人情報の不正利用を防止すること", "D. システムの利用者の行動に説明責任を持たせること"], "answer": ["D"], "explanation": "責任追跡性（Accountability）とは、情報システムの利用者が自らの行動に対して説明責任を負うことを保証する原則を指します。つまり、\"誰が\"、\"いつ\"、\"何をしたのか\"を跡付け可能にし、不正行為の抑止と、事後の原因追及を可能にすることが目的です。具体的には、以下のような対策が責任追跡性の確保に寄与します。\\n\\n利用者IDの個人への割り当て\\nログの取得と安全な保管\\n監査証跡の保全\\n不正行為に対する懲戒規定の整備\\n\\nこうした対策を通じて、システム利用者に「監視されている」意識を持たせ、規律あるふるまいを促すのです。?任追跡性は、情報セキュリティの CIA三原則を支える重要な概念の一つだと言えるでしょう。", "wrongReasons": "A：機密性の保護は責任追跡性の目的ではありません。責任追跡性は、利用者の行動の説明責任を確保することに主眼があります。\nB：可用性の維持も、責任追跡性とは直接の関係はありません。\nC：責任追跡性は、個人情報の保護にも寄与しうるが、より広い概念として、システム全体の利用者の行動に説明責任を求めるものです。", "trap": "「監視されている」という表現から、責任追跡性を Spy 的なイメージで捉えがちかもしれません。しかし、その本質は、フェアで透明性の高いシステム利用環境の実現にあります。ログの取得 ≠ 秘密の監視、ID の割り当て ≠ 個人のプライバシー侵害などと短絡するのは賢明とは言えません。むしろ、説明責任の文化は、健全な組織の基盤であり、そのための適正な統制の仕組みという位置づけで責任追跡性を捉える視座が大切です。CISSPには、責任追跡性の意義を正しく伝え、現場に定着させるリーダーシップが望まれます。", "domain": "1"}, {"number": "27", "question": "あるシステム開発プロジェクトでは、セキュリティ要件の実装状況を追跡するために、各要件の実装状況をトラッキングすることにしました。この取り組みが該当するシステム開発のセキュリティ活動は何ですか。", "choices": ["A. 悪用ケース分析", "B. Static Application Security Testing (SAST)", "C. Security Requirements Traceability Matrix (SRTM)", "D. Threat Modeling"], "answer": ["C"], "explanation": "Security Requirements Traceability Matrix (SRTM) は、システム開発におけるセキュリティ要件の追跡を支援するツールです。SRTMを用いることで、個々のセキュリティ要件が、設計、実装、テストのどの段階にあるのかを可視化できます。具体的には以下のような利点があります。\\n\\n各セキュリティ要件の実装もれを防げる\\nセキュリティ要件の変更の影響範囲が分かる\\n設計とセキュリティ要件の対応関係が明確になる\\nテストの十分性を評価できる\\n\\nつまり、SRTMは、セキュリティ要件の網羅的な実装とその検証を確実なものにするためのツールなのです。システム開発の各フェーズでセキュリティ施策の実施状況を追跡的に管理することは、安全で信頼性の高いシステムを効率的に構築する上で不可欠の営みだと言えるでしょう。", "wrongReasons": "A：悪用ケース分析は、システムの設計段階でセキュリティ上の弱点を洗い出すために使われる手法ですが、セキュリティ要件の追跡管理とは異なります。\nB：SAST は、プログラムソースコードを解析して脆弱性を検出する手法を指します。コーディング後の検証行為であり、要件の追跡とは別の取り組みです。\nD：Threat Modeling は、システム設計時に想定される脅威を特定し、適切な対策を講じるためのアプローチです。セキュリティ要件の抽出には寄与しますが、要件の追跡とは異なる行為です。", "trap": "セキュリティ要件の追跡は、システム開発のごく一部の行為に思えるかもしれません。しかし、それは最初から最後までセキュリティ品質を作りこむための要諦なのです。要件定義で机上の空論に終わらせず、設計・実装・テストの各段階で形にしていく。セキュリティをシステムに内在させるための地道な土台作りだと捉えるべきでしょう。また、SRTMを形骸化させず、実効的に運用していくことも肝要です。現場の声に耳を傾け、必要に応じて要件自体の見直しを図る柔軟性も大切。CISSPには、SRTMの意義を開発チーム全体で共有し、セキュリティマインドを根付かせる牽引力が期待されます。", "domain": "1"}, {"number": "28", "question": "事業継続計画（BCP）の策定において、優先的に復旧すべき業務機能を特定し、目標復旧時間（RTO）などを決定するプロセスのことを何というか。", "choices": ["A. リスクアセスメント", "B. ビジネスインパクト分析（BIA）", "C. 脆弱性評価", "D. 処理影響度評価"], "answer": ["B"], "explanation": "ビジネスインパクト分析（Business Impact Analysis：BIA）は、事業継続計画（BCP）策定の出発点となる重要なプロセスです。BIAでは、組織の事業運営にとって不可欠な業務機能を洗い出し、それぞれについて、中断による影響度を評価します。具体的には以下のような観点から分析を行います。\\n\\n業務停止による財務的損失\\n顧客サービスや評判への影響\\n法規制上の義務の履行への影響\\n事業再開までの許容時間の見積もり\\n\\nこうした分析を通じて、復旧優先度の高い重要業務を特定し、目標復旧時間（RTO）や目標復旧時点（RPO）などの指標を設定するのです。BIAは、限られたリソースを真に守るべきものに集中投下するための羅針盤だと言えます。いわば、BCPの取捨選択の基準線を与えてくれる重要なツールなのです。", "wrongReasons": "A：リスクアセスメントは、BCP策定に不可欠のプロセスですが、業務機能の重要度評価とは異なる目的を持ちます。\nC：脆弱性評価は、情報システムの弱点を特定するためのプロセスですが、業務インパクトの分析とは異質の行為です。\nD：処理影響度評価は、情報の機密性、完全性、可用性に基づいて、情報資産の重要度を評価する手法ですが、BIAとは異なる概念です。", "trap": "BIAを、単なる机上の分析と軽視してはなりません。それは、経営層の関与を得て、事業部門と一体となって進める協働作業なのです。平時のオペレーションを前提としたインタビューではなく、非常時のビジネスプライオリティを引き出すことが肝要。短期的な業務効率より、中長期的な企業価値に与えるインパクトで考える。そのためには、現場の意見に真摯に耳を傾けつつも、時に経営の視点から本質を説く活動が欠かせません。定量データに基づく客観的分析に加え、定性的な将来予測を交えた説得力も問われるでしょう。CISSPには、現場とグローバルの視点を往還しつつBIAを推進し、説得力あるRTOの設定につなげる力量が望まれるのです。", "domain": "1"}, {"number": "29", "question": "情報資産の重要度評価において、情報の機密性、完全性、可用性の3つの観点から評価を行う手法を何というか。", "choices": ["A. 情報セキュリティ分類", "B. 情報感度分析", "C. 情報処理影響度評価", "D. 情報資産インパクト分析"], "answer": ["C"], "explanation": "情報処理影響度評価（Information Processing Impact Assessment）は、情報資産の重要性を評価するための手法の一つです。情報の機密性（Confidentiality）、完全性（Integrity）、可用性（Availability）の3つの指標を用いて、情報資産の価値を測定します。\\n\\n機密性：情報が許可されていない個人、エンティティ、プロセスに開示されないレベル\\n完全性：情報が不正確であったり、不完全であったり、改ざんされたりしないレベル\\n可用性：許可されたユーザーが必要な時に情報にアクセスできるレベル\\n\\nこれらの指標に基づいて情報資産に高、中、低のラベルを付与することで、セキュリティ対策の優先度付けに役立てるのです。この評価結果は、アクセス制御ポリシーの策定、バックアップ計画の立案など、様々なセキュリティ施策の基礎データとなります。情報処理影響度評価は、限られた資源を最大の効果につなげるための、情報資産の等級付けの手法だと言えるでしょう。", "wrongReasons": "A：情報セキュリティ分類は、情報の重要度に基づく区分を指しますが、具体的な評価方法は含まれません。\nB：情報感度分析は、情報の秘密度合いに基づく評価手法ですが、完全性や可用性の観点は含みません。\nD：情報資産インパクト分析は造語であり、一般的な用語ではありません。", "trap": "機密性、完全性、可用性の重要性は、情報資産の特性によって大きく異なります。例えば、顧客の個人情報は機密性が何より優先されるでしょう。一方、金融システムのデータベースでは、完全性と可用性がより重視されるはずです。こうした特性の違いを見極め、適切な評価軸を設定することが肝要。また、評価の精度を高めるには、業務部門の協力が不可欠です。技術的知見と、事業理解の双方が問われる難事だと認識すべきでしょう。加えて、評価結果を業務改善につなげる応用力も大切。単に査定して満足するのではなく、PDCAを回す起点として活用する。CISSPには、情報処理影響度評価の真価を、現場の隅々にまで浸透させる布教者としての役割が期待されるのです。", "domain": "1"}, {"number": "30", "question": "事業継続計画（BCP）において、復旧までに対応できない中断期間中の損失を軽減するために用意される代替案や一時的な対処方法を何というか。", "choices": ["A. 回避策", "B. 是正措置", "C. 予防措置", "D. 緩和策"], "answer": ["D"], "explanation": "事業継続計画（BCP）において、緩和策（Mitigation Measures）とは、事業中断の影響を軽減するための施策を指します。災害発生後、事業を完全に復旧させるまでには一定の時間がかかります。その間の損失を最小限に抑えるため、予め用意しておく代替手段や一時的な対処方法が緩和策なのです。具体例としては以下のようなものが挙げられます。\\n\\n手作業でのデータ処理への切り替え\\n代替サプライヤーからの調達\\n競合他社との相互支援協定の締結\\n顧客への代替サービスの提供\\n\\nこうした施策を事前に準備しておくことで、復旧までの空白期間の事業影響を緩和できるのです。緩和策は、本格復旧までの「つなぎ」の役割を果たす、BCP の要ともいえる存在です。非常時のオペレーションを細部まで詰めておく周到さが問われます。", "wrongReasons": "A：回避策は、リスクの発生そのものを防ぐ施策を指しますが、事業中断を前提とした緩和策とは異なります。\nB：是正措置は、問題が発生した後に、その原因を取り除くための施策ですが、事業中断時の損失軽減とは直結しません。\nC：予防措置は、問題の発生を未然に防ぐ施策ですが、すでに発生した事業中断への対処とは異質です。", "trap": "緩和策の策定は、単なる机上の空論に陥ってはなりません。現場の知恵を結集し、実効性の高い代替手順を練り上げることが肝要です。また、策定した緩和策は、定期的な訓練を通じて実効性を検証し、改善を重ねる必要があります。形骸化した緩和策では、いざという時に機能しないからです。加えて、緩和策の発動判断を適切に行うスキルも問われます。事業中断の程度や見込み復旧時間を見極め、費用対効果も勘案しつつ、最適なタイミングで代替手段に切り替える。その的確な状況判断力こそが、CISSPたるものの真骨頂だと心得るべきでしょう。危機対応の要諦は平時にあり。その意識を持って日頃から緩和策の整備に努めることが、セキュリティのプロに課せられた使命だと肝に銘じておきたいものです。", "domain": "1"}, {"number": "31", "question": "あなたは情報セキュリティ管理者として、組織内の機密データの分類を担当しています。次のうち、機密データに該当するのはどれでしょうか。", "choices": ["A. 従業員の個人情報", "B. 顧客の連絡先情報", "C. 公開されている製品カタログ", "D. 社内規定集"], "answer": ["A", "B"], "explanation": "従業員の個人情報と顧客の連絡先情報は、個人を特定可能な情報（PII: Personally Identifiable Information）に該当し、漏洩すると本人およびビジネスへの影響が大きいため、高い機密性が求められます。\\nデータ分類は、組織にとってのデータの価値や機密レベルに応じて行われ、適切なセキュリティコントロールを適用するために重要なプロセスです（参考：NIST SP 800-60）。\\nPIIの不正な開示を防ぐため、強力なアクセス制御や暗号化などの対策が必要とされます。", "wrongReasons": "C：公開されている製品カタログは、すでに一般に公開されている情報であり、機密情報には該当しません。\nD：社内規定集は一般に公開されているものではありませんが、従業員なら誰でもアクセス可能な情報であり、機密データとまではいえません。", "trap": "「非公開」と「機密」の違いを理解する必要があります。機密情報とは、漏洩した場合に個人やビジネスに大きな影響を及ぼす情報を指します。非公開でも機密でない情報は存在します。", "domain": "2"}, {"number": "32", "question": "大量の機密データを格納したハードディスクを廃棄する際、データ消去の方法として適切なのはどれでしょうか。", "choices": ["A. ドライブをフォーマットする", "B. ドライブを物理的に破壊する", "C. ドライブ上のファイルを削除する", "D. ドライブをデフラグする"], "answer": ["B"], "explanation": "機密データを確実に消去するためには、ドライブの物理的破壊が最も効果的です。シュレッダーやメルトダウンなどの方法で、データの復元を不可能にします。\\nドライブの完全な物理的破壊は、データ消去の究極的な方法とされています（参考：NIST SP 800-88）。\\n特に機密性の高いデータを扱うドライブは、再利用せずに物理的に破壊することが推奨されます。", "wrongReasons": "A：フォーマットでは、データの復元が可能な場合があります。\nC：ファイルの削除では、データの復元が可能です。\nD：デフラグはデータを整理するだけで、消去はされません。", "trap": "データ消去の方法には、上書き消去、消磁、物理的破壊などがあります。機密レベルに応じて適切な方法を選択する必要があります。", "domain": "2"}, {"number": "33", "question": "情報セキュリティ管理者であるあなたは、データの機密性を保護するために、従業員が遵守すべき原則を設定しています。次のうち、最も適切な原則はどれでしょうか。", "choices": ["A. 機密データへのアクセスは、業務に必要な場合にのみ許可する。", "B. 機密データは、すべての従業員に公開する。", "C. 機密データは、個人のPCに保存する。", "D. 機密データは、業務に必要かどうかにかかわらず削除する。"], "answer": ["A"], "explanation": "最小権限の原則（Principle of Least Privilege）に基づき、業務に必要な場合にのみ、必要最小限のアクセス権を付与すべきです。不要なアクセス権の付与は、データ漏洩のリスクを高めます。\\nアクセス制御は、機密性を確保するための重要な手段の一つです（参考：NIST SP 800-53）。\\n機密データへのアクセスは、厳密に管理・監視し、アクセスログの定期的なレビューも行うべきです。", "wrongReasons": "B：機密データを全従業員に公開することは、機密性の原則に反しています。\nC：機密データは、セキュリティ管理された中央のストレージに保管し、個人のPCに保存するべきではありません。\nD：業務に必要な機密データを削除してしまうと、業務に支障をきたします。", "trap": "アクセス権の管理は、必要最小限の権限と知る必要性（Need-to-Know）のバランスを考慮する必要があります。", "domain": "2"}, {"number": "34", "question": "データの分類ラベルとして、米国政府が使用している \"Secret\" は、日本の政府機関における分類ではどのレベルに相当しますか。", "choices": ["A. 極秘", "B. 秘", "C. 部外秘", "D. 内部資料"], "answer": ["B"], "explanation": "米国政府の \"Secret\" は、日本の政府機関における「秘」に相当します。\\n「秘」は、秘密保全の必要性が高く、漏えいすると国の安全保障に関し、その機能に多大な影響を及ぼす情報に指定されます。\\n日本の政府機関においては、機密性の高い順に「極秘」「秘」「部外秘」「内部資料」の分類が用いられます。", "wrongReasons": "A：「極秘」は、最高レベルの機密情報で、米国の \"Top Secret\" に相当します。\nC：「部外秘」は、第三者への開示が制限されるレベルですが、\"Secret\" よりは機密性が低いです。\nD：「内部資料」は、政府機関内だけで共有される情報ですが、機密情報としての指定は受けていません。", "trap": "日本と米国の政府機関で使われる分類の名称は異なりますが、機密性のレベルは概ね対応しています。ただし、完全に一致しているわけではありません。", "domain": "2"}, {"number": "35", "question": "機密データを含む電子メールを送信する際に利用すべき技術は次のうちどれでしょうか。", "choices": ["A. S/MIME", "B. IMAP", "C. POP3", "D. SMTP"], "answer": ["A"], "explanation": "S/MIME（Secure/Multipurpose Internet Mail Extensions）は、電子メールのセキュリティを確保するための標準技術です。\\nS/MIMEは、電子メールの内容を暗号化し、改ざんを検知するデジタル署名を提供します。これにより、機密性、完全性、認証、否認防止が実現されます。\\nS/MIMEは、PKI（公開鍵基盤）を使用し、送信者と受信者の両方が信頼できる認証局（CA）から電子証明書を取得する必要があります。", "wrongReasons": "B：IMAPは、メールサーバー上のメールを操作するためのプロトコルですが、セキュリティ機能は提供しません。\nC：POP3は、メールサーバーからメールを取得するためのプロトコルですが、セキュリティ機能は提供しません。\nD：SMTPは、メールを送信するためのプロトコルですが、セキュリティ機能は提供しません。", "trap": "メールの送受信自体は、SMTP、IMAP、POP3などのプロトコルを使用しますが、それらはセキュリティを保証するものではありません。機密データを送信する際は、S/MIMEなどの追加のセキュリティ技術を用いる必要があります。", "domain": "2"}, {"number": "36", "question": "情報資産の価値を評価する際、次のうち最も適切な方法はどれでしょうか。", "choices": ["A. 情報の取得コストに基づいて評価する", "B. 情報の市場価値に基づいて評価する", "C. 情報の再作成コストに基づいて評価する", "D. 情報の主観的な重要性に基づいて評価する"], "answer": ["C"], "explanation": "情報資産の価値を評価する際、その情報を再作成するためのコストに基づいて評価するのが最も適切です。\\n再作成コストには、情報の収集、生成、テスト、文書化などに要する時間と労力が含まれます。\\n再作成コストに基づく評価は、情報の重要性と組織にとっての価値を客観的に測る指標となります（参考：NIST SP 800-60）。\\nこの評価方法は、情報の喪失や破壊によって生じる損失を見積もるのにも役立ちます。", "wrongReasons": "A：情報の取得コストは、情報の価値を必ずしも反映していません。安価に取得できる情報でも、組織にとって非常に重要な場合があります。\nB：市場価値は、組織外の需要に基づくものであり、組織内での情報の重要性とは必ずしも一致しません。\nD：主観的な重要性は、個人の判断に依存するため、組織全体での一貫した評価基準にはなりません。", "trap": "情報資産の価値評価には、定量的な指標（再作成コスト）と定性的な判断（事業への影響）の両方を考慮する必要があります。ただし、定量的な指標の方が客観性が高いと言えます。", "domain": "2"}, {"number": "37", "question": "組織内の機密情報を保護するために、次のうち最も効果的な対策はどれでしょうか。", "choices": ["A. 全従業員にセキュリティ意識向上トレーニングを実施する", "B. 機密情報へのアクセスを厳格に制限する", "C. 機密情報を扱うシステムにファイアウォールを設置する", "D. 機密情報を暗号化して保存する"], "answer": ["A", "B", "D"], "explanation": "機密情報の保護には、人的、技術的、物理的セキュリティの組み合わせが必要です。\\nセキュリティ意識向上トレーニング（A）は、従業員の機密情報の取り扱いに関する理解を深め、不注意によるデータ漏洩を防ぐために重要です。\\nアクセス制限（B）は、最小権限の原則に基づき、機密情報へのアクセスを必要最小限の人に限定することで、不正アクセスのリスクを減らします。\\n暗号化（D）は、万一機密情報が流出した場合でも、その内容を保護するための重要な技術的対策です。特に、保存データの暗号化は必須と言えます。\\nこれらの対策を組み合わせることで、機密情報の機密性、完全性、可用性を総合的に確保できます。", "wrongReasons": "C：ファイアウォールは、ネットワークの境界で不正なトラフィックをブロックするための重要な対策ですが、内部ネットワークからの機密情報の持ち出しを直接防ぐことはできません。", "trap": "機密情報の保護には、単一の対策だけでは不十分です。人的、技術的、物理的セキュリティの各層で、適切な対策を組み合わせる必要があります。", "domain": "2"}, {"number": "38", "question": "情報資産の取り扱いにおいて、資産の所有者（Owner）の責任として最も適切なのはどれでしょうか。", "choices": ["A. 資産の日常的な管理と運用を行う", "B. 資産の分類とラベル付けの基準を決定する", "C. 資産へのアクセス制御ルールを実装する", "D. 資産の定期的なバックアップを実行する"], "answer": ["B"], "explanation": "情報資産の所有者は、その資産の分類とラベル付けの基準を決定する責任を負います。\\n分類とラベル付けは、資産の機密性、完全性、可用性の要件を明確にし、適切なセキュリティ対策を適用するために重要なプロセスです。\\n所有者は、事業上の重要性や法的要件などを考慮して、資産の分類基準を定義します（参考：ISO/IEC 27001）。\\nまた、所有者は資産の最終的な責任を負いますが、日常的な管理はカストディアン（管理者）に委任することが一般的です。", "wrongReasons": "A：資産の日常的な管理と運用は、カストディアン（管理者）の主な責任です。\nC：アクセス制御ルールの実装は、所有者が定めた方針に基づいて、カストディアン（管理者）が行います。\nD：バックアップの実行は、カストディアン（管理者）の重要なタスクの一つです。", "trap": "所有者とカストディアンの役割を明確に理解することが重要です。所有者は資産の分類と方針決定に責任を持ち、カストディアンはその方針に基づいて日常的な管理を行います。", "domain": "2"}, {"number": "39", "question": "情報資産の棚卸（インベントリ）に含めるべき項目として、最も適切なのはどれでしょうか。", "choices": ["A. 資産の所有者と管理者", "B. 資産の取得日と耐用年数", "C. 資産の物理的なサイズと重量", "D. 資産の製造元と販売元"], "answer": ["A"], "explanation": "情報資産の棚卸（インベントリ）では、資産の所有者と管理者を明確にすることが最も重要です。\\n所有者は資産の分類と保護に関する方針決定の責任を負い、管理者は日常的な管理と運用を担当します。\\nインベントリに所有者と管理者を記録することで、各資産の責任の所在が明らかになり、セキュリティ上の問題が発生した際に迅速に対応できます。\\nまた、人事異動などで担当者が変更になった場合にも、引き継ぎをスムーズに行うことができます。", "wrongReasons": "B：取得日と耐用年数は、資産の財務管理上は重要ですが、セキュリティ管理の観点からは二次的な情報です。\nC：物理的なサイズと重量は、物理的セキュリティの要件を検討する際に参考になる情報ですが、情報資産管理では必須ではありません。\nD：製造元と販売元は、資産の調達時には重要な情報ですが、日常的なセキュリティ管理には直接関係しません。", "trap": "情報資産の棚卸では、セキュリティ管理に必要な情報を優先的に記録することが重要です。財務管理や物理的管理に関する情報は、別の台帳で管理することもできます。", "domain": "2"}, {"number": "40", "question": "従業員に対して、機密情報の取り扱いに関するセキュリティ意識向上トレーニングを実施する際、最も重要なのはどれでしょうか。", "choices": ["A. トレーニングを一度だけ実施する", "B. トレーニングを強制力のあるものにする", "C. トレーニングの内容を定期的に更新する", "D. トレーニングの結果をボーナスに反映する"], "answer": ["C"], "explanation": "セキュリティ意識向上トレーニングは、従業員の知識とスキルを継続的に維持・向上するために、定期的に実施することが重要です。\\n情報セキュリティの脅威は常に変化しているため、トレーニングの内容も最新の脅威や対策を反映したものにする必要があります。\\n定期的なトレーニングにより、従業員のセキュリティ意識を高いレベルで維持し、機密情報の適切な取り扱いを徹底することができます。\\nまた、トレーニングの効果を上げるためには、従業員の参加を促す工夫（対話型のワークショップ、クイズなど）も有効です。", "wrongReasons": "A：一度だけのトレーニングでは、従業員のセキュリティ意識を継続的に維持することは困難です。\nB：強制力だけでは、従業員の自発的な取り組みを引き出すことはできません。むしろ、セキュリティ対策への反発を招く可能性があります。\nD：トレーニングの結果をボーナスに直接反映させることは、短期的なインセンティブにはなりますが、長期的な意識向上には必ずしも効果的ではありません。", "trap": "セキュリティ意識向上トレーニングは、単なる知識の伝達ではなく、従業員の行動変容を促すことが目的です。そのためには、継続的で実践的なトレーニングが必要です。", "domain": "2"}, {"number": "41", "question": "機密情報を含むUSBメモリを紛失した場合、最初に行うべき対応はどれでしょうか。", "choices": ["A. 直ちに関連部署に報告する", "B. 紛失した場所を探し回る", "C. 紛失したUSBメモリの中身を確認する", "D. 二度と同じことが起こらないよう誓う"], "answer": ["A"], "explanation": "機密情報の紛失は、重大なセキュリティインシデントです。直ちに関連部署（情報セキュリティ部門や上司など）に報告することが、迅速な対応につながります。\\n報告を受けた関連部署は、紛失したUSBメモリに含まれる情報の特定、漏洩した場合の影響評価、二次被害の防止などの措置を講じることができます。\\nまた、紛失の事実を隠蔽せずに報告することは、組織の方針に従った誠実な対応であり、事後の信頼回復にもつながります。", "wrongReasons": "B：紛失した場所を探すことも重要ですが、最優先されるべきは報告です。探索と並行して、関連部署への報告を怠ってはいけません。\nC：紛失したUSBメモリの中身を確認することは、実際には不可能です。仮に可能だとしても、報告が最優先されるべきです。\nD：二度と同じことが起こらないよう誓うことは大切ですが、それだけでは不十分です。再発防止のためには、組織としての対策（暗号化の徹底、USBメモリの利用制限など）が必要です。", "trap": "機密情報の紛失に気づいたら、パニックに陥って冷静な判断ができなくなることがあります。日頃から、紛失時の報告手順を確認しておくことが重要です。", "domain": "2"}, {"number": "42", "question": "情報資産の分類において、検討すべき要素として最も適切でないものはどれでしょうか。", "choices": ["A. 法的要件", "B. 事業上の重要性", "C. アクセス頻度", "D. 機密性の要求レベル"], "answer": ["C"], "explanation": "情報資産の分類では、機密性、完全性、可用性の3つの観点から、資産の重要性を評価します。\\n法的要件（A）は、個人情報保護法などの法律で定められた要求事項を考慮する必要があります。\\n事業上の重要性（B）は、その資産が事業の継続に不可欠かどうかを判断する基準になります。\\n機密性の要求レベル（D）は、その資産にどの程度の機密性が求められるかを示します。\\n一方、アクセス頻度（C）は、資産の重要性とは直接関係がありません。頻繁にアクセスされる資産が必ずしも重要とは限らず、逆に重要な資産へのアクセスを制限することもあります。", "wrongReasons": "A：法的要件は、資産の分類において考慮すべき重要な要素です。\nB：事業上の重要性は、資産の分類において考慮すべき重要な要素です。\nD：機密性の要求レベルは、資産の分類において考慮すべき重要な要素です。", "trap": "アクセス頻度は、パフォーマンスや可用性の観点からは重要な指標ですが、資産の分類には直接関係しません。分類と性能管理は、別の軸で考える必要があります。", "domain": "2"}, {"number": "43", "question": "情報資産の所有者が、資産の分類見直しを行う際に最も考慮すべきことは何でしょうか。", "choices": ["A. 技術的な制約", "B. 予算の制約", "C. 事業環境の変化", "D. 管理者の意向"], "answer": ["C"], "explanation": "情報資産の分類は、事業環境の変化に応じて見直す必要があります。\\n事業戦略の変更、新しい法規制の施行、セキュリティ脅威の変化などにより、資産の重要性や要求されるセキュリティレベルが変わることがあります。\\n所有者は、こうした変化を敏感に察知し、適切なタイミングで資産の分類を見直すことが求められます。\\n分類の見直しにより、セキュリティ対策の強化や緩和を判断し、事業の継続性と情報保護のバランスを保つことができます。", "wrongReasons": "A：技術的な制約は、分類の判断基準ではなく、分類の結果に基づいてセキュリティ対策を選択する際の考慮要素です。\nB：予算の制約は、分類の判断基準ではなく、分類の結果に基づいてセキュリティ対策を選択する際の考慮要素です。\nD：管理者の意向は、所有者の判断を補佐する役割を果たしますが、最終的な判断は所有者が行うべきです。", "trap": "分類の見直しは、セキュリティ対策の変更につながる可能性があるため、慎重に行う必要があります。一方で、事業環境の変化に適切に対応するためには、迅速な判断も求められます。", "domain": "2"}, {"number": "44", "question": "情報資産の廃棄において、最も適切な方法はどれでしょうか。", "choices": ["A. 資産の分類に関わらず、すべて同じ方法で廃棄する", "B. 資産の分類に応じて、適切な廃棄方法を選択する", "C. 廃棄する資産は、すべて物理的に破壊する", "D. 廃棄する資産は、すべて外部業者に委託する"], "answer": ["B"], "explanation": "情報資産の廃棄方法は、資産の分類に応じて選択する必要があります。\\n機密性の高い資産は、確実にデータを復元できないよう、物理的な破壊（シュレッダー、溶解など）が求められます。\\n一方、公開情報を含む資産は、データの消去（上書き、初期化など）で十分な場合もあります。\\n資産の分類に応じて適切な廃棄方法を選択することで、コストと安全性のバランスを取ることができます。", "wrongReasons": "A：資産の分類に関わらず同じ方法で廃棄すると、過剰な対策（コスト増）や不十分な対策（リスク増）につながります。\nC：すべての資産を物理的に破壊するのは、コストと手間がかかります。機密性の低い資産まで破壊する必要はありません。\nD：すべての資産の廃棄を外部委託するのは、コスト増につながります。また、委託先の管理体制を十分に確認する必要があります。", "trap": "廃棄方法の選択には、資産の分類だけでなく、廃棄のタイミングや方法、コストなども考慮する必要があります。また、法規制や契約上の要求事項にも注意が必要です。", "domain": "2"}, {"number": "45", "question": "情報資産の棚卸（インベントリ）の目的として、最も適切なのはどれでしょうか。", "choices": ["A. セキュリティ対策の実施状況を確認するため", "B. 資産の所在を把握し、適切な管理を行うため", "C. 資産の調達コストを最適化するため", "D. 資産の利用頻度を分析するため"], "answer": ["B"], "explanation": "情報資産の棚卸（インベントリ）の主な目的は、組織が保有する情報資産の所在を把握し、適切な管理を行うことです。\\n棚卸により、資産の種類、数量、保管場所、管理責任者などの情報を一元的に管理できます。\\nこれにより、資産の不正な持ち出しや紛失を防止し、セキュリティインシデントの発生を抑えることができます。\\nまた、棚卸の結果を基に、資産の分類や管理方法の見直しを行うこともできます。", "wrongReasons": "A：セキュリティ対策の実施状況は、脆弱性診断やリスク評価などによって確認します。棚卸はその前提となる情報を提供します。\nC：資産の調達コストの最適化は、棚卸の副次的な効果として期待できますが、主目的ではありません。\nD：資産の利用頻度の分析は、パフォーマンス管理や容量計画の観点から重要ですが、棚卸の主目的ではありません。", "trap": "棚卸は、セキュリティ対策の基礎となる重要な活動ですが、それ自体がセキュリティ対策ではありません。棚卸の結果を活用して、適切な対策を講じることが重要です。", "domain": "2"}, {"number": "46", "question": "情報資産の取り扱いにおいて、最小権限の原則に基づくアクセス制御を実施する主な目的は何でしょうか。", "choices": ["A. 利便性の向上", "B. パフォーマンスの最適化", "C. 不正アクセスのリスク低減", "D. コンプライアンスの強化"], "answer": ["C"], "explanation": "最小権限の原則は、ユーザーに必要最小限のアクセス権限のみを付与することを求めています。\\nこれにより、権限の濫用や不正使用のリスクを最小限に抑えることができます。\\nアクセス権限を最小限に保つことで、万一アカウントが侵害された場合の影響範囲を限定できます。\\nまた、アクセス権限の管理コストも削減できます。", "wrongReasons": "A：最小権限の原則は、利便性よりもセキュリティを優先するものです。必要以上の権限を与えることは、利便性の向上にはつながりません。\nB：アクセス制御とパフォーマンスは直接関係ありません。むしろ、きめ細かいアクセス制御を行うとパフォーマンスが低下する可能性があります。\nD：最小権限の原則は、コンプライアンスの一部ではありますが、主目的はセキュリティリスクの低減です。", "trap": "最小権限の原則を適用すると、ユーザーの利便性が低下する場合があります。セキュリティと利便性のバランスを取ることが重要です。", "domain": "2"}, {"number": "47", "question": "機密情報を含む書類の廃棄において、最も適切な方法はどれでしょうか。", "choices": ["A. シュレッダーで裁断する", "B. 焼却処分する", "C. 溶解処理する", "D. 埋立処分する"], "answer": ["A", "B", "C"], "explanation": "機密情報を含む書類は、復元不可能な方法で廃棄する必要があります。\\nシュレッダーによる裁断は、書類を細かい断片に切り刻むことで、情報の復元を困難にします。\\n焼却処分は、書類を完全に燃やし尽くすことで、情報を完全に破壊します。\\n溶解処理は、書類を化学薬品で溶かすことで、情報を復元不可能にします。\\nこれらの方法は、いずれも機密情報の漏洩を防ぐために有効です。", "wrongReasons": "D：埋立処分は、書類が物理的に破壊されないため、情報が漏洩するリスクがあります。", "trap": "シュレッダーの選択においては、裁断のサイズや方式（クロスカット、マイクロカットなど）に注意が必要です。\\n焼却や溶解処理を外部に委託する場合は、委託先の信頼性を十分に確認する必要があります。", "domain": "2"}, {"number": "48", "question": "情報資産の取り扱いにおいて、資産の所有者が果たすべき役割として最も適切なのはどれでしょうか。", "choices": ["A. 資産の分類の基準を決める", "B. 日常的な運用管理を行う", "C. 技術的なセキュリティ対策を実装する", "D. 資産の棚卸を実施する"], "answer": ["A"], "explanation": "情報資産の所有者は、資産の分類の基準を決定する役割を担います。\\n分類の基準には、機密性、完全性、可用性の要求レベルが含まれます。\\n所有者は、事業上の重要性や法的要件などを考慮して、適切な分類基準を定義します。\\n分類の基準に基づいて、資産の管理方法やセキュリティ対策が決定されます。", "wrongReasons": "B：日常的な運用管理は、資産の管理者（カストディアン）の役割です。\nC：技術的なセキュリティ対策の実装は、IT部門やセキュリティ部門の役割です。\nD：資産の棚卸は、資産管理の一環として実施されますが、所有者の主要な役割ではありません。", "trap": "所有者と管理者の役割を混同しないように注意が必要です。所有者は資産に対する最終的な責任を負いますが、日常的な管理は管理者に委任されることが一般的です。", "domain": "2"}, {"number": "49", "question": "情報資産の取り扱いにおいて、アクセス制御の実施に際して考慮すべき要素として最も適切でないものはどれでしょうか。", "choices": ["A. 職務の分離", "B. 二要素認証", "C. 役職の上下関係", "D. アクセス権限のレビュー"], "answer": ["C"], "explanation": "アクセス制御の実施においては、職務上の必要性に基づいて権限を付与することが重要です。\\n職務の分離（A）は、権限の濫用を防ぐために重要な考慮要素です。\\n二要素認証（B）は、なりすましによる不正アクセスを防ぐために有効な手段です。\\nアクセス権限のレビュー（D）は、不要になった権限を適宜削除するために定期的に実施すべきです。\\n一方、役職の上下関係（C）は、アクセス制御の判断基準としては適切ではありません。上位の役職者が必ずしもすべての情報にアクセスする必要はないためです。", "wrongReasons": "A：職務の分離は、アクセス制御において考慮すべき重要な要素です。\nB：二要素認証は、アクセス制御において考慮すべき重要な要素です。\nD：アクセス権限のレビューは、アクセス制御において考慮すべき重要な要素です。", "trap": "役職の上下関係と職務上の必要性は、しばしば混同されがちです。アクセス制御においては、あくまでも職務上の必要性に基づいて判断すべきです。", "domain": "2"}, {"number": "50", "question": "クラウドサービスを利用する際の情報資産の保護において、最も重要なことは何でしょうか。", "choices": ["A. サービス提供者の信頼性の確認", "B. 強力な暗号化の適用", "C. 詳細なログの取得", "D. 定期的な脆弱性診断の実施"], "answer": ["A"], "explanation": "クラウドサービスでは、情報資産がサービス提供者の管理下に置かれるため、提供者の信頼性が最も重要です。\\n提供者の情報セキュリティ管理策、データ保護方針、事業継続計画などを十分に確認する必要があります。\\nまた、サービスレベルアグリーメント（SLA）において、セキュリティ対策の内容と水準を明確にすべきです。\\n信頼できるサービス提供者を選択することが、クラウド上の情報資産を保護する上で不可欠です。", "wrongReasons": "B：暗号化は重要ですが、鍵の管理を含めて適切に行わないと効果が限定的です。\nC：ログの取得は、事後の追跡や分析には有効ですが、リアルタイムの防御には直結しません。\nD：脆弱性診断は、サービス提供者側で実施することが一般的です。利用者側で実施するのは容易ではありません。", "trap": "クラウドサービスの利用では、サービス提供者との責任分界点を明確にすることが重要です。セキュリティ対策の実施主体や、事故発生時の対応手順などを、事前に取り決めておく必要があります。", "domain": "2"}, {"number": "51", "question": "情報資産の取り扱いにおいて、特権アカウントの管理で最も重要なことは何でしょうか。", "choices": ["A. 特権アカウントの数を最小限に抑える", "B. 特権アカウントの共有を推奨する", "C. 特権アカウントの権限を定期的に拡張する", "D. 特権アカウントのパスワードを定期的に公開する"], "answer": ["A"], "explanation": "特権アカウントは、システムに対する強力な権限を持つため、その数を必要最小限に抑えることが重要です。\\n特権アカウントが増えるほど、管理コストが増大し、不正使用のリスクも高まります。\\n最小権限の原則に基づき、業務上必要なアカウントのみに特権を付与すべきです。\\nまた、特権アカウントの使用状況を監視し、不要になったアカウントは速やかに削除することも重要です。", "wrongReasons": "B：特権アカウントの共有は、アカウントの不正使用を招く恐れがあるため、推奨されません。\nC：特権アカウントの権限は、必要最小限に留めるべきです。定期的な拡張は不要です。\nD：特権アカウントのパスワードは、厳重に管理し、定期的に変更する必要がありますが、公開すべきではありません。", "trap": "特権アカウントの管理には、技術的な対策（強力な認証、アクセス制御など）と、運用的な対策（アカウント管理プロセス、監査など）の両方が必要です。", "domain": "2"}, {"number": "52", "question": "情報資産の分類において、資産の「機密性」を評価する際に考慮すべき要素はどれでしょうか。", "choices": ["A. 資産への認可されたアクセスを維持する必要性", "B. 資産の改ざんや破壊から保護する必要性", "C. 資産の未認可の開示から保護する必要性", "D. 資産へのアクセス拒否から保護する必要性"], "answer": ["C"], "explanation": "情報資産の「機密性」は、未認可の開示からの保護の必要性を評価するものです。\\n機密性の高い情報とは、開示されると組織や個人に重大な損害をもたらす情報を指します。\\n機密性の評価においては、法的要件、契約上の義務、プライバシーリスクなどを考慮します。\\n評価の結果に基づいて、アクセス制御、暗号化、情報漏洩対策などの適切なセキュリティ対策を講じます。", "wrongReasons": "A：認可されたアクセスの維持は、「可用性」の評価において考慮される要素です。\nB：改ざんや破壊からの保護は、「完全性」の評価において考慮される要素です。\nD：アクセス拒否からの保護は、「可用性」の評価において考慮される要素です。", "trap": "機密性、完全性、可用性は、情報セキュリティの三大要素と呼ばれ、それぞれ異なる観点から情報資産を評価します。分類においては、この3つの要素をバランス良く考慮する必要があります。", "domain": "2"}, {"number": "53", "question": "印刷された機密情報を含む書類の保管において、最も適切な方法はどれでしょうか。", "choices": ["A. 施錠可能な場所に保管する", "B. 一般の書類と一緒に保管する", "C. 全従業員がアクセス可能な場所に保管する", "D. 外部の保管サービスを利用する"], "answer": ["A"], "explanation": "機密情報を含む書類は、施錠可能なキャビネットや金庫などに保管することが重要です。\\n施錠により、未認可のアクセスを防止し、機密性を維持することができます。\\nまた、アクセス権限を持つ人を限定し、鍵の管理を徹底することも必要です。\\n書類の保管場所へのアクセスも、入退室管理などの物理的セキュリティ対策で保護すべきです。", "wrongReasons": "B：機密情報を含む書類は、一般の書類と分けて保管すべきです。\nC：全従業員がアクセス可能な場所に保管してはいけません。アクセスは必要最小限の人に限定すべきです。\nD：外部の保管サービスを利用する場合は、サービス提供者の信頼性を十分に確認する必要があります。", "trap": "機密書類の保管は、物理的セキュリティの重要な側面です。デジタルデータの保護とともに、紙の書類の適切な管理にも注意が必要です。", "domain": "2"}, {"number": "54", "question": "情報資産の取り扱いにおいて、資産の「所有者」と「管理者」の主な違いは何でしょうか。", "choices": ["A. 所有者は資産の価値を決定し、管理者は日常的な管理を行う", "B. 所有者は技術的な管理を行い、管理者は方針を決定する", "C. 所有者は資産を利用し、管理者は資産を保護する", "D. 所有者と管理者は同じ役割である"], "answer": ["A"], "explanation": "情報資産の「所有者」は、資産の価値を決定し、分類や保護の方針を決める役割を担います。\\n一方、「管理者」は、所有者の方針に基づいて、資産の日常的な管理や運用を行います。\\n所有者は経営層などの上位の役職者が務めることが多く、管理者はIT部門などの実務層が務めることが一般的です。\\n両者の連携により、資産の価値に見合った適切なセキュリティ対策が実施されます。", "wrongReasons": "B：技術的な管理は管理者の役割であり、方針の決定は所有者の役割です。\nC：所有者も管理者も、ともに資産を保護する責任を持ちます。利用は一般のユーザーの役割です。\nD：所有者と管理者は、異なる役割と責任を持ちます。", "trap": "所有者と管理者の役割分担は、組織によって異なる場合があります。重要なのは、両者の責任と権限を明確にし、密接に連携することです。", "domain": "2"}, {"number": "55", "question": "従業員の私物デバイス（スマートフォン、タブレットなど）を業務に使用させる場合、情報資産を保護するために最も効果的な対策は何でしょうか。", "choices": ["A. 私物デバイスの使用を全面的に禁止する", "B. 私物デバイスに対するセキュリティポリシーを定める", "C. 私物デバイスのセキュリティ対策は従業員に一任する", "D. 私物デバイスには重要な情報を保存させない"], "answer": ["B"], "explanation": "私物デバイスの業務利用（BYOD: Bring Your Own Device）には、利便性とリスクの両面があります。\\nリスクを管理するためには、私物デバイスに対するセキュリティポリシーを定める必要があります。\\nポリシーでは、許可されるデバイスの種類、必要なセキュリティ設定、アプリケーションの制限、データの取り扱い方法などを規定します。\\nまた、モバイルデバイス管理（MDM）ソリューションを導入し、ポリシーの順守状況を監視・制御することも有効です。", "wrongReasons": "A：全面的な禁止は、業務の効率性を損なう可能性があります。リスクとのバランスを取ることが重要です。\nC：セキュリティ対策を従業員に一任するのは、一貫性と実効性に欠けます。組織としての方針が必要です。\nD：重要な情報を保存させないことは対策の一部ですが、それだけでは不十分です。", "trap": "BYODのセキュリティは、技術的な対策だけでなく、従業員の教育と意識向上も重要な要素です。ポリシーの周知徹底と定期的な研修が必要です。", "domain": "2"}, {"number": "56", "question": "機密情報を含むUSBメモリを紛失した場合、組織が優先的に行うべきことは何でしょうか。", "choices": ["A. 紛失したUSBメモリの捜索", "B. 紛失の事実の公表", "C. 影響を受ける可能性のある関係者への通知", "D. USBメモリの使用禁止ポリシーの策定"], "answer": ["C"], "explanation": "機密情報の紛失は、影響を受ける関係者（顧客、従業員など）に深刻な被害をもたらす可能性があります。\\n関係者への迅速な通知により、二次被害を最小限に抑えることができます。\\n通知には、紛失した情報の種類、想定される影響、組織がとる対策などを含めるべきです。\\n関係者とのコミュニケーションを優先することで、信頼の維持と損害の軽減を図ることができます。", "wrongReasons": "A：USBメモリの捜索は重要ですが、関係者への通知よりも優先度は低いです。\nB：紛失の事実を公表することは、組織の信頼性を損なう可能性があります。まずは影響を受ける関係者への個別の通知が優先されるべきです。\nD：USBメモリの使用禁止ポリシーの策定は、再発防止のための長期的な対策ですが、喫緊の優先事項ではありません。", "trap": "情報漏洩インシデントへの対応では、技術的な対策（リモートワイプ、パスワード変更など）と並行して、関係者とのコミュニケーションを適切に行うことが重要です。", "domain": "2"}, {"number": "57", "question": "情報資産の取り扱いにおいて、アクセス制御の実装に関する記述として最も適切なものはどれでしょうか。", "choices": ["A. 全ての従業員に同じ権限を与える", "B. 権限の割り当ては、職務上の必要性に基づいて行う", "C. 一度割り当てた権限は変更しない", "D. アクセス制御は技術的対策のみで実現できる"], "answer": ["B"], "explanation": "アクセス制御の基本原則は、「職務上の必要性に基づく最小権限の原則」です。\\n各ユーザーに与える権限は、その人の職務を遂行するために必要な最小限のものに限定します。\\nこれにより、権限の濫用や不正アクセスのリスクを低減することができます。\\nまた、人事異動や職務変更に伴って、権限の見直しと調整を適宜行うことも重要です。", "wrongReasons": "A：全ての従業員に同じ権限を与えるのは、最小権限の原則に反しています。\nC：一度割り当てた権限を変更しないのは、職務変更に対応できません。適切な権限管理のためには、定期的な見直しと調整が必要です。\nD：アクセス制御は、技術的対策（認証、ファイアウォールなど）だけでなく、運用的対策（権限管理プロセス、教育など）との組み合わせで実現します。", "trap": "最小権限の原則を適用する際には、業務効率とのバランスを考慮する必要があります。必要以上に権限を制限すると、業務に支障をきたす可能性があります。", "domain": "2"}, {"number": "58", "question": "情報資産の分類において、資産の「可用性」を評価する際に考慮すべき要素はどれでしょうか。", "choices": ["A. 情報の開示による影響", "B. 情報の改ざんによる影響", "C. 情報へのアクセス失敗による影響", "D. 情報の保存期間の長さ"], "answer": ["C"], "explanation": "情報資産の「可用性」は、許可された利用者が必要な時に情報やシステムにアクセスできる度合いを示します。\\n可用性の評価では、情報へのアクセスが失敗した場合の業務への影響を考慮します。\\n影響の大きさは、アクセス不能の期間、影響を受けるユーザーの数、業務の重要性などに依存します。\\n可用性の要求レベルが高い情報ほど、冗長化、バックアップ、迅速な復旧手段の確保などの対策が必要になります。", "wrongReasons": "A：情報の開示による影響は、「機密性」の評価で考慮される要素です。\nB：情報の改ざんによる影響は、「完全性」の評価で考慮される要素です。\nD：情報の保存期間の長さは、「可用性」とは直接関係がありません。", "trap": "可用性は、機密性や完全性とのトレードオフの関係にあります。高可用性を追求するあまり、機密性が損なわれたり、完全性の確認が疎かになったりしないように注意が必要です。", "domain": "2"}, {"number": "59", "question": "従業員が私物デバイスを業務に使用する際のセキュリティリスクとして、最も適切なものはどれでしょうか。", "choices": ["A. マルウェアの感染", "B. 物理的な盗難や紛失", "C. 不適切なアプリケーションのインストール", "D. 業務データの意図しない混在"], "answer": ["A", "B", "C", "D"], "explanation": "私物デバイスの業務利用（BYOD）には、様々なセキュリティリスクが伴います。\\nマルウェアの感染（A）は、私物デバイスのセキュリティ対策が不十分な場合に起こりやすく、組織の情報資産に影響を与える可能性があります。\\n物理的な盗難や紛失（B）は、デバイス内の業務データの漏洩につながるリスクがあります。\\n不適切なアプリケーションのインストール（C）は、データ漏洩や悪意ある動作のリスクをもたらします。\\n業務データの意図しない混在（D）は、データ管理の複雑化や誤操作のリスクを高めます。", "wrongReasons": "該当なし（正解が複数選択のため）", "trap": "BYODのリスクは多岐にわたるため、包括的なセキュリティ対策が必要です。技術的対策（MDMの導入など）だけでなく、利用ポリシーの策定、従業員教育なども重要な要素となります。", "domain": "2"}, {"number": "60", "question": "クラウドサービスを利用する際に、情報資産の所有者が果たすべき役割として最も適切なものはどれでしょうか。", "choices": ["A. クラウド上のデータの暗号化", "B. クラウドサービスの可用性の保証", "C. クラウド事業者のセキュリティ対策の評価", "D. クラウドサービスの料金体系の交渉"], "answer": ["C"], "explanation": "クラウドサービスを利用する際、情報資産の所有者は、クラウド事業者のセキュリティ対策を評価し、自社の要件に合致しているかを確認する必要があります。\\n評価には、事業者の情報セキュリティ管理策、データ保護方針、コンプライアンス認証状況などが含まれます。\\nまた、サービスレベルアグリーメント（SLA）において、セキュリティ対策の詳細と履行を明示的に規定することも重要です。\\n所有者は、これらの評価結果を基に、クラウドサービスの利用可否を判断し、リスクが受容可能であることを確認します。", "wrongReasons": "A：クラウド上のデータの暗号化は、クラウド事業者との役割分担によりますが、多くの場合、事業者側で実施されます。\nB：クラウドサービスの可用性は、事業者が責任を負うべき領域です。所有者は、SLAで定められた可用性の基準が満たされているかを監視します。\nD：クラウドサービスの料金体系の交渉は、調達部門などが主導することが一般的です。所有者の主な役割ではありません。", "trap": "クラウドサービスの利用では、所有者と事業者の責任分界点を明確にすることが重要です。セキュリティ対策だけでなく、データ管理、インシデント対応、監査などの役割分担を契約で定義する必要があります。", "domain": "2"}, {"number": "61", "question": "多数の遠隔地オフィスとつながる本社ネットワークのセキュリティを設計しています。オフィスワーカーはVPN接続時に本社リソースにシームレスにアクセスできる必要があります。同時に、本社セキュリティチームは全体を一元的に管理したいと考えています。この目的に適したネットワーク設計はどれですか？", "choices": ["A. 本社・遠隔地ともインターネットに直接接続し、各拠点にファイアウォールを設置", "B. 本社にファイアウォールを集中配置し、拠点との間をスポーク＆ハブ方式で結ぶ", "C. 本社にファイアウォールと認証サーバーを設置し、遠隔地はVPNで接続する", "D. 全拠点を専用線で結び、ルーティングとフィルタリングは各拠点に任せる"], "answer": ["C"], "explanation": "本設問のポイントは、「遠隔地からの透過的アクセス」と「一元管理」の両立です。\\nこれを満たすのはハブ＆スポーク型のVPN設計です（NIST SP 800-77）。\\n本社にVPNサーバーとファイアウォール、認証基盤を集中配置します。\\n遠隔地はVPNクライアントで本社VPNサーバーに接続し、シングルサインオンを実現します。\\n本社のファイアウォールがVPNトンネルのエンドポイントとなり、集中管理が可能になります。", "wrongReasons": "A：拠点に個別のファイアウォールを置くと一元管理が難しくなります。\nB：スポーク＆ハブ方式にVPNの要素がないため、セキュアな遠隔アクセスには不十分です。\nD：専用線はコストが高く、各拠点の設定に依存するため管理が複雑になります。", "trap": "ハブ＆スポーク、VPN、集中管理の関係を正しく理解する必要があります。\\n「透過的なアクセス」を実現するには、VPNによるオーバーレイ構成が有効です。", "domain": "3"}, {"number": "62", "question": "ウェブアプリケーションのセキュアなソフトウェア開発でもっとも重要な要素は以下のどれですか？（複数選択可）", "choices": ["A. プログラミング言語の選択", "B. ディザスタリカバリ対策の実装", "C. フロントエンドとバックエンドの分離", "D. 最新パッチの適用", "E. 優秀な開発者の雇用"], "answer": ["A", "C", "D"], "explanation": "セキュアコーディングの3本柱は、「適切な言語選択」「アーキテクチャ設計」「脆弱性管理」です（OWASP ASVS 4.0）。\\n言語にはそれぞれ固有の脆弱性があり、要件に合った選択が重要です（CWE Top 25）。\\nフロントエンドとバックエンドを分離することで、サーバー側の耐性を高められます。\\n最新セキュリティパッチの適用は当然必須で、脆弱性対策の基本中の基本です（PCI DSS 3.2.1）。", "wrongReasons": "B：ディザスタリカバリはBCP/DRの領域で、コーディングの話題ではありません。\nE：開発者のスキルは大切ですが、それ単独では脆弱性を防げません。", "trap": "セキュアコーディングは、言語・設計・運用の総合力が問われる分野です。\\n一つの施策で完璧にはなりません。複数の対策を組み合わせる必要があります。", "domain": "3"}, {"number": "63", "question": "ISO/IEC 15408で規定されている、セキュリティ保証レベルに関する記述として正しいものを選択してください。", "choices": ["A. EAL7は設計仕様レベルのテストが義務付けられている", "B. EAL4は広範囲な脆弱性検査が要求される", "C. EAL2はセキュリティ機能仕様テストが必要だが、方法は問わない", "D. EAL5は形式検証・解析に加えて、生産設計情報の提供も求められる"], "answer": ["D"], "explanation": "D：EAL5は構造化手法で半形式的に設計された高度なセキュリティ保護を規定しています。\\n形式検証・半形式的解析に加えて、プロダクトの実装情報も開示が必要です（ISO/IEC 15408-3）。\\nこれは、EAL5以上の製品がミッションクリティカルな用途に使われることを想定しているためです。", "wrongReasons": "A：EAL7は形式設計とプログラミングのレベル。設計仕様テストだけでは十分でない。\nB：EAL4は開発環境の管理も必要。脆弱性チェックは要求されるが十分条件ではない。\nC：EAL2はセキュリティ機能仕様の構造化テストが求められる。方法の自由度は低い。", "trap": "EALの数値が上がるほど、形式的な検証や厳格なプロセスが要求されます。\\n選択肢Dのような開発・製造情報の公開要件があるのはEAL5以上だけです。", "domain": "3"}, {"number": "64", "question": "ウォークスルーによる脆弱性検査で、もっとも重視すべき項目は次のどれですか？", "choices": ["A. 部屋のレイアウト", "B. 業務フロー", "C. 非常口", "D. 設備のメンテナンス状況"], "answer": ["C"], "explanation": "ウォークスルー検査の目的は、設備の物理的脆弱性を発見し改善することです。\\n中でも、非常口の管理不備は火災や自然災害時の安全性を大きく損ないます。\\n施錠不全、警報未接続、避難経路の不備などがよく指摘されるポイントです（NFPA 101）。\\n非常時の人命に直結する重大リスクであり、最優先で確認すべき項目と言えます。", "wrongReasons": "A：部屋の配置も大切ですが、避難安全性への影響は比較的小さいでしょう。\nB：業務フローはウォークスルーの主眼ではありません。別の機会に確認します。\nD：メンテナンス不備は徐々にリスクを高めますが、即時の危険性は非常口ほど高くありません。", "trap": "ウォークスルーでは「目視」で確認できる物理的な項目に注力します。\\n建物や設備の「安全性」と「セキュリティ」の両面をバランスよくチェックする必要があります。", "domain": "3"}, {"number": "65", "question": "オペレーションフロアにロボット製造ラインを新設した工場では、安全とセキュリティの両立が課題になっています。\\nこの状況に関する記述のうち、適切でないものを選んでください。", "choices": ["A. CCTV網の死角を減らすため、ロボットアームにカメラを設置する", "B. 制御システムには、工場ネットワークから切り離した独立系統を利用する", "C. 工場の物理アクセス制御にあたっては、ロボット導入に合わせて最優先で見直す", "D. 非常停止スイッチは不正な操作を防ぐため、限定メンバー以外は操作できないようにする"], "answer": ["D"], "explanation": "安全とセキュリティは両立が難しい面もありますが、安全確保を最優先すべきです。\\n緊急時には、訓練を受けていない人も機械を停止できる必要があります（ISO 13849）。\\n非常停止スイッチは「行き止り」「識別可能」「アクセスのしやすさ」といった要件を満たすことが求められます。\\nフェールセーフの観点から、なるべく多様な操作員による稼働監視が望ましいのです。", "wrongReasons": "A：機密性に配慮しつつ安全を確保する工夫として評価できます。\nB：ネットワーク分離はICSセキュリティの基本です（NIST SP 800-82）。\nC：生産設備の導入に合わせて、入退管理の方針も更新すべきですね。", "trap": "セキュリティ強化のために安全性を犠牲にするのは本末転倒です。\\n「安全は全員参加」の考え方に立ち、フェールセーフ/フォールトトレラントな設計を心がけましょう。", "domain": "3"}, {"number": "66", "question": "暗号化通信プロトコルTLSのメッセージの暗号化に使われるのはどれですか？", "choices": ["A. 共通秘密鍵", "B. 乱数", "C. 公開鍵", "D. 対称鍵"], "answer": ["D"], "explanation": "TLSにおけるデータのやり取りではセッション毎に生成される対称鍵を使用します。\\n対称鍵は高速でセッションごとに異なるものなので、セッションの機密性を保証します。\\n対称鍵は公開鍵暗号でサーバーから送られ、サーバー・クライアントの間で共有されます（RFC5246）。\\nこれにより、対称鍵の機密性を保護しつつ、安全かつ高速なデータ通信を実現しています。", "wrongReasons": "A：共通秘密鍵は公開鍵暗号系で利用される概念で、対称鍵暗号では扱いません。\nB：乱数はセッション鍵の生成に使われますが、データの暗号化自体に使うことはありません。\nC：公開鍵は署名検証や鍵共有に利用されますが、データのやり取りには使われません。", "trap": "TLSでは、鍵交換に公開鍵暗号、データ暗号化に対称鍵暗号を使い分けています。\\n鍵の種類と使い分けを正しく理解することが重要です。", "domain": "3"}, {"number": "67", "question": "リスク分析における「可用性」の評価対象に含まれないものはどれか？", "choices": ["A. Hot site 切り替え時の復旧目標時間（RTO）", "B. システム停止時の業務上の損害金", "C. データのセキュリティレベル分類", "D. 単一障害点（SPOF）の有無"], "answer": ["C"], "explanation": "可用性は、「許容できる時間内に、必要なサービスを提供できるか」という観点で評価されます（ISO/IEC 27000）。\\n評価項目には、目標復旧時間、障害発生時の損害額、単一障害点の有無などが含まれます。\\n一方、データのセキュリティレベル分類は「機密性」に関わる項目で、可用性とは直接関係しません。\\n機密性は情報資産の観点から評価しますが、可用性はシステムやサービスの稼働状況に着目します。", "wrongReasons": "A：Hot site 切り替え時の復旧目標時間（RTO）は可用性の重要な評価項目です。\nB：システム停止時の損害金額は、可用性の重要性を経済的に評価する指標です。\nD：単一障害点（SPOF）の有無は、システム設計上の可用性リスクを示す重要な指標です。", "trap": "「機密性」「完全性」「可用性」はCIAの3要素として一括りにされがちですが、評価の視点は異なります。\\n機密性＝情報、完全性＝データ、可用性＝サービス、と対象を意識的に使い分けるとよいでしょう。\\nそれぞれの関心事を正しく理解し、適切な評価項目を設定することが肝要です。", "domain": "3"}, {"number": "68", "question": "クライアント証明書を用いた認証を行う際の注意点として適切でないものを選択してください。", "choices": ["A. クライアント証明書はサーバー証明書と同じ認証局により発行されること", "B. 証明書の有効期限が切れていないことを確認すること", "C. 失効リストを使って証明書の失効状況を確認すること", "D. クライアント証明書は公開鍵のみを含むこと"], "answer": ["D"], "explanation": "クライアント証明書は公開鍵と秘密鍵のペアから成ります（RFC 5246）。\\n公開鍵は証明書に含まれ、秘密鍵はクライアントが安全に保管します。\\nサーバーは証明書中の公開鍵を使ってクライアントを認証します。\\nつまり、秘密鍵を含まない証明書では認証が成立しません。", "wrongReasons": "A：クライアント証明書とサーバー証明書は、信頼できる同一の認証局から発行されるべきです。\nB：有効期限切れの証明書は使用できません。有効性チェックは必須です。\nC：証明書失効リスト（CRL）を使って失効状況を確認することも重要な手順です。", "trap": "クライアント認証は、サーバー認証の逆方向の認証と捉えるとわかりやすいです。\\nサーバー証明書がサーバーの正当性を証明するのに対し、クライアント証明書はクライアントの正当性を示します。", "domain": "3"}, {"number": "69", "question": "情報セキュリティに関する管理策のPDCAサイクルについて説明した記述として最も適切なものを次から選びなさい。", "choices": ["A. Plan: 目標達成を望む項目を選択し、監視プランを策定する。", "B. Do: 管理策を現場の状況に合わせて設計し、適切に実装する。", "C. Check: 実施済み管理策の有効性を測定し、効果が不十分な場合は改善を指示する。", "D. Act: 有効性が実証された管理策を、企業の情報セキュリティポリシーに反映する。"], "answer": ["C"], "explanation": "PDCAサイクルの「C（Check）」は、管理策の有効性を測定・評価する工程です。\\n実施後のレビューとフィードバックが重要で、不十分な点は改善を求めるのが原則です。\\nこれは、ISO/IEC 27001の規格要求事項でも明確に規定されています。\\n客観的なモニタリングと測定により、セキュリティ対策のレベルを継続的に引き上げていくことが目的です。", "wrongReasons": "A：Planの説明として不完全。目的・目標・評価基準の設定などが必要。\nB：Doはポリシーや計画に基づいた実行の段階。実施内容の再設計は本来の趣旨ではない。\nD：Actでは方針の見直しも検討されるが、ポリシーへの反映だけが目的ではない。", "trap": "PDCAには「戦略的」なマネジメント手法と「現場主導」の2つのアプローチがあります。\\nここでは前者の視点から見た「Check」の意義を説明しています。\\n管理策のPDCAを論じる際には、経営層の視点と実務担当者の視点を使い分ける必要があります。", "domain": "3"}, {"number": "70", "question": "工場の制御システムを企業LANに接続する場合に考慮すべきリスクとして適切ではないものを選びなさい。", "choices": ["A. 制御ネットワークを標的としたマルウェア感染", "B. 工場システムの設計情報の外部流出", "C. 制御用通信プロトコルの脆弱性悪用", "D. 工場の制御フロアへの物理的侵入"], "answer": ["D"], "explanation": "制御システムをビジネス系LANと接続する際の主なリスクは「ネットワークを介した攻撃」です。\\n具体的には、制御ネットワークを狙ったマルウェア（Stuxnet等）や、独自プロトコルの脆弱性を突く攻撃などが懸念されます（IEC 62443）。\\nまた、制御システムの設計情報などの機密データが外部に漏洩するリスクも高まります。\\n一方、物理的侵入のリスクは、ネットワーク接続の有無に関わらず存在するものです。", "wrongReasons": "A：制御系を狙ったサイバー攻撃の代表例。Stuxnet、Industroyer等の実例もある。\nB：ネットワーク経由での情報漏洩は、制御システム固有の脅威シナリオ。\nC：制御系の独自プロトコルはセキュリティ考慮が不十分で、脆弱性の温床に。", "trap": "制御システムのセキュリティを議論する際は「ネットワークセキュリティ」の視点が重要です。\\n工場システムに特化した攻撃手法や、独自プロトコルのリスクなどを想定する必要があります。\\n物理セキュリティも重要ですが、LANとの接続如何に関わらず検討すべき課題と捉えましょう。", "domain": "3"}, {"number": "71", "question": "クロスサイトスクリプティング(XSS)の脆弱性対策として、開発者がコーディング時に実施すべき対処方法として適切なものは次のどれですか？", "choices": ["A. マルチファクター認証を導入する", "B. リクエストパラメーターを適切にエスケープする", "C. Cookieの保存期間を短くする", "D. DNS設定でSPFレコードを定義する"], "answer": ["B"], "explanation": "XSSは、Webアプリケーションが悪意のあるスクリプトをブラウザ側で実行してしまう脆弱性です。\\n根本的な対策は、開発者が外部からの入力値を適切にエスケープ処理することです（OWASP Top 10:2021）。\\n具体的には、HTMLタグやJavaScriptの特殊文字をエンコードし、スクリプトとして実行されないようにします。\\nこうしたコーディングレベルの対処は、XSSを防ぐために最も効果的かつ本質的なアプローチと言えます。", "wrongReasons": "A：認証強化はセッションハイジャック対策にはなりますが、XSS対策とは無関係です。\nC：Cookieの有効期限を短くすることで被害を最小限に抑えられますが、根本的解決にはなりません。\nD：SPFレコードはメール送信元の正当性を検証する仕組みで、XSSのような脆弱性とは関係ありません。", "trap": "XSSは古くから知られる脆弱性ですが、依然としてWebアプリケーションに多く見られます。\\n対処方法は単純ですが、開発者のセキュアコーディングスキルが問われる典型的な例題と言えます。\\n認証やCookieの設定など、周辺のセキュリティ対策とXSS対策を混同しないよう注意しましょう。", "domain": "3"}, {"number": "72", "question": "NIST SP 800-61によるインシデントハンドリングの説明として、適切ではないものを次から選びなさい。", "choices": ["A. 準備段階では、インシデント対応チームの結成、必要な機器の調達を行う。", "B. 検知と分析段階では、発生したインシデントの種類や影響範囲を特定する。", "C. 封じ込め、根絶、回復の段階では、ネットワークの隔離、マルウェアの駆除などの作業を行う。", "D. 事後対応では、攻撃者を特定して法的措置を講じることが主な目的となる。"], "answer": ["D"], "explanation": "NIST SP 800-61は、インシデントハンドリングのベストプラクティスを示したガイドラインです。\\n事後対応で重視されるのは、インシデントからの教訓を踏まえた再発防止策の策定です。\\n具体的には、対応プロセスのレビュー、ポリシーや手順書の見直し、ツールの改善などが行われます。\\n攻撃者の特定や法的措置は重要ですが、組織の役割や方針によっては必ずしも優先事項とは限りません。", "wrongReasons": "A：準備段階の活動内容として、チーム編成や機器調達は妥当な記述です。\nB：検知と分析は、インシデントの正確な把握のために不可欠なプロセスです。\nC：封じ込めから回復までの一連の手順は、NIST SP 800-61に沿った内容です。", "trap": "インシデントレスポンスの目的は、被害を最小限に抑え、早期の復旧を果たすことにあります。\\n事後対応では、技術的な対策よりも、組織的な課題の改善に重点が置かれます。\\n攻撃者の追跡は重要ですが、インシデントレスポンスの文脈では二次的な目標と捉えるべきでしょう。", "domain": "3"}, {"number": "73", "question": "オリジナル ソフトウェアの開発プロジェクトにおけるチェックポイントに含まれないものはどれか？", "choices": ["A. アーキテクチャの決定", "B. ソースコードの完成", "C. アルゴリズムの選択", "D. コンパイルとリンク"], "answer": ["D"], "explanation": "ソフトウェア開発のマイルストーンにおけるチェックポイントは、主に設計・実装段階の節目に設けられます。\\nアーキテクチャの決定やアルゴリズムの選択は、設計レベルの重要な意思決定ポイントと言えます。\\nソースコードの完成は、実装フェーズの終了を示す重要なマイルストーンです。\\n一方、コンパイルやリンクは、ソースコードを実行可能な形式に変換する作業工程で、チェックポイントには該当しません（ISO/IEC/IEEE 12207）。", "wrongReasons": "A：ソフトウェアアーキテクチャは、システムの基本設計を規定する重要な意思決定です。\nB：ソースコードの完成は、実装フェーズの終了条件となる重要なマイルストーンです。\nC：採用するアルゴリズムの選択は、性能や信頼性に大きな影響を与えます。設計上の重要な判断ポイントです。", "trap": "コンパイルやリンクは、プログラミング言語によっては開発者の意識から隠蔽されがちな工程です。\\nしかし、厳密に言えばこれらは「機械的な変換作業」に過ぎず、開発プロセスのマイルストーンとは言えません。\\n着目すべきはソフトウェアの「設計」と「実装」の局面で、そこにチェックポイントを設けることが重要です。", "domain": "3"}, {"number": "74", "question": "ソフトウェア開発におけるフェイルセーフ設計の説明として適切なものを選びなさい。", "choices": ["A. 障害発生時に、システムを常に安全側へと導くような設計思想。", "B. プログラムに競合条件が生じないように、排他制御を徹底する設計思想。", "C. 初期不良の発見を目的として、出荷前に一定期間の連続運転試験を行うこと。", "D. 平均故障間隔を極力長くするため、システムに冗長性を持たせる設計思想。"], "answer": ["A"], "explanation": "フェイルセーフ（Fail-safe）とは、「故障しても安全」という意味の設計概念です。\\nシステムに異常や故障が発生した際、暴走や予期せぬ動作を起こさず、常に安全側に制御するように設計します。\\n電車のブレーキシステムやエレベーターの非常停止装置など、安全確保が最優先される局面で採用されます（IEC 61508）。\\n安全性を犠牲にしてまでシステムの可用性を追求するのは、本末転倒だと言えるでしょう。", "wrongReasons": "B：競合条件の排除は並行処理の安全性に関わる概念で、フェイルセーフとは関係がありません。\nC：バーンイン（Burn-in）と呼ばれる、初期故障を排除するための長時間運転試験のことを指しています。\nD：フォールトトレラントの説明です。冗長化により故障の影響を最小限に抑える設計概念ですが、フェイルセーフとは異なります。", "trap": "フェイルセーフとフォールトトレラントは、ともに高信頼性システムを実現するための設計思想です。\\nただしフェイルセーフが「安全性」を最優先するのに対し、フォールトトレラントは「可用性」の維持を重視する点が異なります。\\n安全かつ高可用なシステムを目指す際は、両者をバランス良く適用することが肝要と言えます。", "domain": "3"}, {"number": "75", "question": "Winny事件（2004年）の教訓から学ぶべき、P2Pファイル共有のリスクに関する記述として適切でないものを選択してください。", "choices": ["A. 完全な匿名性が保証されず、警察の捜査によりユーザーが特定される可能性がある。", "B. 個人情報を含むファイルがノード上に残り、意図せずに流出する危険性がある。", "C. 著作権法違反となるファイルを共有した場合、利用者に刑事責任が問われかねない。", "D. 悪意あるユーザーが故意にウイルス付きのファイルを共有し、感染を広げる可能性がある。"], "answer": ["A"], "explanation": "Winny事件では、ノード上に残された情報をもとに、ファイル共有ユーザーの一部が警察に特定され再試行S続ける編集ました。\\nこれは、Winnyの設計思想である「完全な匿名性の確保」が現実には達成されていなかったことを意味します。\\nむしろ本事件の教訓は、P2Pネットワークにおける匿名性の限界と、情報流出リスクの高さにあると言えます。\\n選択肢B、C、Dが示すような諸問題は、Winny事件で実際に表面化した課題であり、P2Pの本質的なリスクと言えるでしょう。", "wrongReasons": "B：個人情報の意図せざる流出は、Winny事件において現実のものとなった重大なリスクです。\nC：Winnyでは著作権侵害となるファイル共有が横行し、実際に利用者が逮捕される事態となりました。\nD：Winnyを通じたウイルス拡散は、本事件後も深刻な問題となっています。", "trap": "選択肢Aは一見、P2Pの匿名性リスクを指摘しているように見えます。\\nしかし、Winny事件の本質は、「匿名性の確保が不完全であった」点にあります。\\nつまり本事件の教訓は、「匿名性は保証されない」のではなく、「匿名性の実現は極めて困難」だということなのです。", "domain": "3"}, {"number": "76", "question": "オープンソースソフトウェアに関する記述として最も適切なものを選択してください。", "choices": ["A. オープンソースライセンスを採用することで、知的財産権の保護を完全に放棄したことになる。", "B. ソースコードを公開するリスクはあるが、品質の高さや迅速なバグ修正などのメリットも多い。", "C. オープンソースは無償で提供されるため、商用ソフトウェアよりもコストを大幅に削減できる。", "D. オープンソースを利用すれば、開発者はソフトウェアの動作保証責任を完全に免除される。"], "answer": ["B"], "explanation": "オープンソースのメリットとして、コードの透明性、不具合の早期発見と修正、技術コミュニティの支援などが挙げられます。\\n実際、Linux、Apache、GitHubなど、オープンソースは現代のIT業界を支える重要なインフラとなっています。\\n一方、ソースコードの流用や改変に伴うリスク、開発者コミュニティの分裂、サポートの不確実性など、課題も少なくありません。\\nオープンソースの活用には、こうしたトレードオフを踏まえ、自社に適した選択を行うことが肝要だと言えます。", "wrongReasons": "A：オープンソースライセンスにも様々な種類があり、知的財産権の保護レベルはケースバイケースです。\nC：オープンソースは必ずしも無償ではなく、商用サポートを提供するビジネスモデルも存在します。\nD：オープンソースを利用する際の責任は、ライセンス形態によって異なります。無保証が原則とは限りません。", "trap": "オープンソースには「無償」「無保証」「パブリックドメイン」といったイメージが付きまといがちです。\\nしかし実際には、ライセンスの種類によって、知財保護のレベルや利用条件、責任分界点は大きく異なります。\\n法的リスクを正しく認識し、自社に最適なオープンソース活用を図ることが重要だと言えるでしょう。", "domain": "3"}, {"number": "77", "question": "以下の図に示されている論理アーキテクチャは、ディジタル署名のどの構成要素を示しているか？\\n（画像：デジタル署名の一部を示す図）", "choices": ["A. 署名アルゴリズム", "B. メッセージダイジェスト", "C. タイムスタンプ", "D. 公開鍵証明書"], "answer": ["B"], "explanation": "図は、デジタル署名生成の一連の流れを示したものです。\\n署名対象のデータに対してハッシュ関数を適用し、メッセージダイジェストを生成する様子が描かれています。\\nメッセージダイジェストとは、データを一定長の擬似乱数列に変換したもので、改ざん検知に用いられます。\\nつまり本図は、デジタル署名の構成要素の中でも、署名プロセスの根幹をなすメッセージダイジェストを表現していると言えます。", "wrongReasons": "A：署名アルゴリズムの選択は重要ですが、本図ではその詳細には触れられていません。\nC：タイムスタンプはデジタル署名と並行して付与される場合もありますが、ここでは言及されていません。\nD：署名者の公開鍵証明書は署名検証に不可欠ですが、署名値の生成プロセスには直接関与しません。", "trap": "デジタル署名は複数の要素が連携して実現される技術であり、一つの図で全体像を示すのは困難です。\\n特に署名値の生成と検証は、理論的には対称的なプロセスですが、実装上は異なるステップを踏むことが多いです。\\n出題者の意図を正確に読み取り、問われている論点に的確に答える姿勢が肝要と言えるでしょう。", "domain": "3"}, {"number": "78", "question": "オブジェクト指向設計の原則のうち、最も重要と考えられるものはどれか？", "choices": ["A. カプセル化", "B. 継承", "C. 多態性", "D. 抽象化"], "answer": ["A"], "explanation": "オブジェクト指向設計の根幹をなすのは「カプセル化」の概念です。\\nカプセル化とは、データとそれを操作する手続きを一つのオブジェクトとして密封し、内部実装を隠蔽することを指します。\\nこれにより、オブジェクトの利用者は内部構造を意識せずにインターフェースを通じてオブジェクトを操作できます。\\nカプセル化はソフトウェアの品質を左右する重要な原則であり、保守性、拡張性、再利用性などの面で多大な効果を発揮します（CERT Oracle Secure Coding Standard for Java）。", "wrongReasons": "B：継承は、オブジェクト間の関係を規定する重要な概念ですが、カプセル化ほどの普遍性はありません。\nC：多態性（ポリモーフィズム）は、オブジェクトの柔軟性を高める有用な機能ですが、必ずしも必須ではありません。\nD：抽象化は、オブジェクト指向分析において重視される概念ですが、オブジェクト指向「設計」の文脈では、カプセル化ほどの重みを持ちません。", "trap": "オブジェクト指向の基本概念は、それぞれ密接に関連し合っており、一概に優劣を付けがたい面があります。\\nしかし、オブジェクト指向の設計・実装を貫く最も基本的な原理は「カプセル化」だと言えます。\\nこれは、オブジェクト指向の祖とされるアラン・ケイ自身も、カプセル化の重要性を随所で強調していることからもわかります。", "domain": "3"}, {"number": "79", "question": "製品の開発時におけるセキュアコーディングの主な目的として適切なものを、1つ選びなさい。", "choices": ["A. ライブラリ、フレームワーク、APIの脆弱性対策", "B. ペネトレーションテストによる製品の堅牢性評価", "C. 潜在的な欠陥や脆弱性の早期発見と除去", "D. 開発者の倫理意識向上とコンプライアンス教育"], "answer": ["C"], "explanation": "セキュアコーディングとは、ソフトウェアの設計・実装段階でセキュリティ上の欠陥を作り込まないための手法です。\\n具体的には、バッファオーバーフロー、SQLインジェクション、クロスサイトスクリプティングなどの脆弱性を予防することが目的となります。\\nOWASP Top 10やCWE/SANSのトップ25など、代表的な脆弱性のリストに基づいてコーディングを行うのが一般的です。\\nつまりセキュアコーディングの主眼は、開発プロセスの上流で脆弱性を発見・除去し、出荷後の手戻りを防ぐことにあると言えます。", "wrongReasons": "A：使用するライブラリ等の脆弱性対策は重要ですが、セキュアコーディング自体の主目的ではありません。\nB：ペネトレーションテストは脆弱性評価の手法であり、セキュアコーディングとは異なる位相の活動です。\nD：開発者教育はセキュアコーディングの実践に不可欠ですが、あくまで手段であって目的ではありません。", "trap": "セキュアコーディングは、個々の脆弱性対策とセキュア開発生サイクル（S-SDLC）全体の両方に関わる概念です。\\n設問の意図を適切に汲み取るには、セキュアコーディングを、S-SDLCの中に適切に位置付けることが重要です。\\n「コーディング」という言葉から、ともすれば脆弱性対策に偏った議論になりがちですが、本来の目的は開発プロセス全体の改善にあることを意識しましょう。", "domain": "3"}, {"number": "80", "question": "以下のセキュアソフトウェア開発成熟度モデル（Maturity Models）のうち、OpenSAMM(ソフトウェア保証成熟度モデル)に含まれるものをすべて選びなさい。（複数選択可）", "choices": ["A. 戦略・指標（Governance）", "B. 建設（Construction）", "C. 検証（Verification）", "D. 運用（Operations）"], "answer": ["A", "B", "C",
